# Shared Node bootstrap for the cockpit frontend (Program 15).
name: Bootstrap Node
description: Node (pinned by src/frontend/.nvmrc) + npm cache + npm ci in src/frontend

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        # Single source of truth for the node version: src/frontend/.nvmrc
        # (nvm + mise read it locally; setup-node reads it here). Bump the
        # .nvmrc, not this file — keeps local == CI reproducible.
        node-version-file: src/frontend/.nvmrc
        cache: npm
        cache-dependency-path: src/frontend/package-lock.json

    - name: Install frontend dependencies
      shell: bash
      working-directory: src/frontend
      run: npm ci
