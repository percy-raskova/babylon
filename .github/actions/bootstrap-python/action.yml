# Shared Python bootstrap (Program 15). ONE provisioner: mise installs the
# exact [tools] pins from .mise.toml (python 3.12 + poetry 2.2.1), so CI and
# local dev run the identical toolchain. The venv cache key carries every
# invalidating input: OS, python, poetry, lock hash, and a -vN generation
# counter (bump it to evict a poisoned cache fleet-wide).
name: Bootstrap Python
description: mise toolchain + in-project venv cache + poetry install

inputs:
  gdal:
    description: >-
      Install GeoDjango system libraries (GEOS/GDAL/PROJ) — needed by anything
      importing Django settings, including mypy (django-stubs plugin loads
      settings at startup)
    required: false
    default: "false"
  docs:
    description: Install the docs dependency group
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up tools with mise
      uses: jdx/mise-action@v4
      with:
        cache: true

    - name: Configure in-project venv
      shell: bash
      run: poetry config virtualenvs.in-project true

    - name: Load cached venv
      id: venv-cache
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-py3.12-poetry2.2.1-v3-${{ inputs.docs }}-${{ hashFiles('poetry.lock') }}

    - name: Install dependencies (cache miss)
      if: steps.venv-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ "${{ inputs.docs }}" = "true" ]; then
          poetry install --no-interaction --no-root --with docs
        else
          poetry install --no-interaction --no-root
        fi

    - name: Install project
      shell: bash
      run: |
        if [ "${{ inputs.docs }}" = "true" ]; then
          poetry install --no-interaction --with docs
        else
          poetry install --no-interaction
        fi

    # GeoDjango: settings/base.py uses the postgis backend, which loads
    # GEOS/GDAL/PROJ at import — pytest touching Django settings AND mypy
    # (django-stubs plugin) die with ImproperlyConfigured without these.
    - name: Install GeoDjango system libraries
      if: inputs.gdal == 'true'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binutils libproj-dev gdal-bin
