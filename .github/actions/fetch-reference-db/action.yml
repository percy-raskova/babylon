# CI reference-data subset (Program 15 Phase 6, owner item 40). Downloads the
# Michigan-scoped subset release asset and places it where the code expects
# the reference DB. INTEGRITY CONTRACT: the sha256 is verified BEFORE first
# open on both the download and cache-restore paths — babylon's readers set
# journal_mode=WAL on connect, which rewrites the file bytes, so any
# verification after first use is meaningless (learned the hard way; see the
# generator's _vacuum_output docstring).
name: Fetch Reference DB
description: Download + verify the CI reference-subset SQLite artifact

inputs:
  tag:
    description: Data-release tag holding the subset asset
    required: false
    # v2 (2026-07-11): + fact_faf_commodity_flow FULL — the headless runner's
    # hydration path reads it (Determinism Bundle died without it on the v1
    # proving run).
    # v3 (2026-07-15, Wave 6 data wires): + fact_bls_unemployment_decomposition
    # FULL (BLS LAUS U-3, read by SQLiteBLSUnemploymentSource) + hickel/ricci
    # schema-only tables (hydrator SELECTs them unconditionally).
    # v4 (2026-07-16, Wave 6 census wires): + fact_census_housing FULL
    # (skip -> full; SQLiteCensusHousingSource renter share) +
    # fact_census_income FULL (michigan -> full; SQLiteCensusIncomeSource
    # bracket ratio). tiger tarball unchanged from v3.
    # v5 (2026-07-16, empirical-invariants program): + fact_fred_wealth_shares
    # FULL (skip -> full; un-orphaned by test_fred_wealth_shares.py, the Fed
    # DFA redundant-source leg) + fact_ricci_unequal_exchange now POPULATED
    # (29 Ricci TOTAL transfer rows via tools/ingest/ricci_unequal.py + RICnn
    # dim_country region rows). tiger tarball unchanged from v3.
    # v6 (2026-07-17, ADR075 ruling-1 + ADR076 execution): -24 objects (16
    # ruling-1 amputations incl. the 522MB __pre_086 backup + 8 demotions to
    # data-artifacts.yaml, ricci mirror among them); + fact_productivity_annual
    # FULL (17,336 BLS rows — view_surplus_value/view_imperial_rent alive) +
    # housing pair michigan-scoped (repaired view_rent_crisis) + the five
    # Program 22 minerals surfaces FULL. Release also carries the four ADR076
    # parquet artifacts (manifest-pinned in data-artifacts.yaml). tiger
    # tarball unchanged from v3.
    # v7 (2026-07-20, parquet-canonical cutover): subset now DERIVED from the
    # rebuilt build product (product sha f760bab5..., sqlite 3.53.1,
    # double-build byte-identical; qa:regression 6/6 pre- and post-flip);
    # release adds full per-table parquet (80 files) + canonical schema.sql,
    # all manifest-pinned — the manifest-driven step below fetches them
    # without any action-input bump. ingest_checkpoint left the governed
    # estate (loaders recreate on demand). tiger tarball unchanged from v3.
    default: ci-data-v7
  asset:
    description: Asset filename within the release
    required: false
    default: reference-subset-20260720-v7.sqlite
  sha256:
    description: Expected sha256 of the asset (pin — bump with the tag)
    required: false
    default: f193d44e1b11d4eee9675cbb129b72bd6cd3c05e50a90c3bdd136cb54d56b32f
  tiger-asset:
    description: TIGER county-shapefile tarball within the release (the
      headless runner reads data/tiger/county/tl_2024_us_county.shp — proving
      run 2 died FileNotFoundError without it)
    required: false
    default: tiger-county-2024.tar.gz
  tiger-sha256:
    description: Expected sha256 of the TIGER tarball
    required: false
    default: 516fe00e77ca374e5400c8d73ac830e126a576cebbb967651c2f72e0cf574095

runs:
  using: composite
  steps:
    - name: Restore cached subset
      id: refdb-cache
      uses: actions/cache@v6
      with:
        path: ~/refdb/${{ inputs.asset }}
        key: refdb-${{ inputs.tag }}-${{ inputs.sha256 }}

    - name: Download release asset (cache miss)
      if: steps.refdb-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p ~/refdb
        gh release download '${{ inputs.tag }}' \
          --repo "$GITHUB_REPOSITORY" \
          --pattern '${{ inputs.asset }}' \
          --output ~/refdb/'${{ inputs.asset }}'

    - name: Verify sha256 (hard fail — download AND cache-restore paths)
      shell: bash
      run: |
        echo '${{ inputs.sha256 }}  '"$HOME"'/refdb/${{ inputs.asset }}' | sha256sum -c -

    - name: Install as data/sqlite/marxist-data-3NF.sqlite
      shell: bash
      run: |
        mkdir -p data/sqlite
        # Copy, not move: the cached original must stay byte-pristine —
        # the first reader flips it to WAL and rewrites it.
        cp ~/refdb/'${{ inputs.asset }}' data/sqlite/marxist-data-3NF.sqlite
        ls -la data/sqlite/

    - name: Restore cached TIGER tarball
      id: tiger-cache
      uses: actions/cache@v6
      with:
        path: ~/refdb/${{ inputs.tiger-asset }}
        key: refdb-${{ inputs.tag }}-${{ inputs.tiger-sha256 }}

    - name: Download TIGER tarball (cache miss)
      if: steps.tiger-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release download '${{ inputs.tag }}' \
          --repo "$GITHUB_REPOSITORY" \
          --pattern '${{ inputs.tiger-asset }}' \
          --output ~/refdb/'${{ inputs.tiger-asset }}'

    - name: Verify + extract TIGER county shapefile
      shell: bash
      run: |
        echo '${{ inputs.tiger-sha256 }}  '"$HOME"'/refdb/${{ inputs.tiger-asset }}' | sha256sum -c -
        mkdir -p data/tiger/county
        tar xzf ~/refdb/'${{ inputs.tiger-asset }}' -C data/tiger/county
        ls -la data/tiger/county/

    # ADR076: the release also carries the dist-tier parquet artifacts. The
    # pins live in data-artifacts.yaml (single source of truth) — this step
    # is manifest-driven, so a regenerated artifact never needs an action-
    # input bump; the manifest commit IS the pin bump. stdlib-only parsing:
    # the manifest is machine-generated by tools/make_data_artifacts.py.
    #
    # Parquet-canonical pipeline (2026-07-19 plan, Task 9): the manifest's
    # top-level `schema:` block (schema.sql — the canonical DDL, written by
    # tools/extract_reference_schema.py) is fetched + sha-verified the same
    # way as an `artifacts:` entry, once it exists. Section-scoped parsing
    # (not one flat regex pass) so the `product:` block's own `sha256:` key
    # (the built-DB pin, not a fetchable dist file) is never mistaken for a
    # fetch target. Pre-cutover, the manifest has no `schema:` block, so this
    # addition is a no-op (empty list) — inert until the cutover commit lands.
    - name: Fetch + verify dist-tier data artifacts (manifest-driven)
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        python3 - <<'PY' > /tmp/artifact-list
        import re
        section = None
        sha = None
        schema_sha = schema_file = None
        for line in open("data-artifacts.yaml", encoding="utf-8"):
            stripped = line.rstrip("\n")
            m = re.match(r"^(schema|product|artifacts):", stripped)
            if m:
                section = m.group(1)
                continue
            if section == "schema":
                m = re.match(r"^  file: (dist/\S+)$", stripped)
                if m:
                    schema_file = m.group(1)
                m = re.match(r"^  sha256: ([0-9a-f]{64})$", stripped)
                if m:
                    schema_sha = m.group(1)
            elif section == "artifacts":
                m = re.match(r"    sha256: ([0-9a-f]{64})$", stripped)
                if m:
                    sha = m.group(1)
                m = re.match(r"    home: (dist/\S+)$", stripped)
                if m and sha:
                    print(sha, m.group(1))
                    sha = None
        if schema_file and schema_sha:
            print(schema_sha, schema_file)
        PY
        mkdir -p dist/data-artifacts
        while read -r sha home; do
          name="$(basename "$home")"
          gh release download '${{ inputs.tag }}' \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$name" \
            --output "$home"
          echo "$sha  $home" | sha256sum -c -
        done < /tmp/artifact-list
        ls -la dist/data-artifacts/
