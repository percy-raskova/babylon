# CI reference-data subset (Program 15 Phase 6, owner item 40). Downloads the
# Michigan-scoped subset release asset and places it where the code expects
# the reference DB. INTEGRITY CONTRACT: the sha256 is verified BEFORE first
# open on both the download and cache-restore paths — babylon's readers set
# journal_mode=WAL on connect, which rewrites the file bytes, so any
# verification after first use is meaningless (learned the hard way; see the
# generator's _vacuum_output docstring).
name: Fetch Reference DB
description: Download + verify the CI reference-subset SQLite artifact

inputs:
  tag:
    description: Data-release tag holding the subset asset
    required: false
    # v2 (2026-07-11): + fact_faf_commodity_flow FULL — the headless runner's
    # hydration path reads it (Determinism Bundle died without it on the v1
    # proving run).
    # v3 (2026-07-15, Wave 6 data wires): + fact_bls_unemployment_decomposition
    # FULL (BLS LAUS U-3, read by SQLiteBLSUnemploymentSource) + hickel/ricci
    # schema-only tables (hydrator SELECTs them unconditionally).
    # v4 (2026-07-16, Wave 6 census wires): + fact_census_housing FULL
    # (skip -> full; SQLiteCensusHousingSource renter share) +
    # fact_census_income FULL (michigan -> full; SQLiteCensusIncomeSource
    # bracket ratio). tiger tarball unchanged from v3.
    default: ci-data-v4
  asset:
    description: Asset filename within the release
    required: false
    default: reference-subset-20260716.sqlite
  sha256:
    description: Expected sha256 of the asset (pin — bump with the tag)
    required: false
    default: 7363f1d96f0e87db8feac84a116223b648b5c7592a5eb71ce0a497c33336401f
  tiger-asset:
    description: TIGER county-shapefile tarball within the release (the
      headless runner reads data/tiger/county/tl_2024_us_county.shp — proving
      run 2 died FileNotFoundError without it)
    required: false
    default: tiger-county-2024.tar.gz
  tiger-sha256:
    description: Expected sha256 of the TIGER tarball
    required: false
    default: 516fe00e77ca374e5400c8d73ac830e126a576cebbb967651c2f72e0cf574095

runs:
  using: composite
  steps:
    - name: Restore cached subset
      id: refdb-cache
      uses: actions/cache@v6
      with:
        path: ~/refdb/${{ inputs.asset }}
        key: refdb-${{ inputs.tag }}-${{ inputs.sha256 }}

    - name: Download release asset (cache miss)
      if: steps.refdb-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p ~/refdb
        gh release download '${{ inputs.tag }}' \
          --repo "$GITHUB_REPOSITORY" \
          --pattern '${{ inputs.asset }}' \
          --output ~/refdb/'${{ inputs.asset }}'

    - name: Verify sha256 (hard fail — download AND cache-restore paths)
      shell: bash
      run: |
        echo '${{ inputs.sha256 }}  '"$HOME"'/refdb/${{ inputs.asset }}' | sha256sum -c -

    - name: Install as data/sqlite/marxist-data-3NF.sqlite
      shell: bash
      run: |
        mkdir -p data/sqlite
        # Copy, not move: the cached original must stay byte-pristine —
        # the first reader flips it to WAL and rewrites it.
        cp ~/refdb/'${{ inputs.asset }}' data/sqlite/marxist-data-3NF.sqlite
        ls -la data/sqlite/

    - name: Restore cached TIGER tarball
      id: tiger-cache
      uses: actions/cache@v6
      with:
        path: ~/refdb/${{ inputs.tiger-asset }}
        key: refdb-${{ inputs.tag }}-${{ inputs.tiger-sha256 }}

    - name: Download TIGER tarball (cache miss)
      if: steps.tiger-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release download '${{ inputs.tag }}' \
          --repo "$GITHUB_REPOSITORY" \
          --pattern '${{ inputs.tiger-asset }}' \
          --output ~/refdb/'${{ inputs.tiger-asset }}'

    - name: Verify + extract TIGER county shapefile
      shell: bash
      run: |
        echo '${{ inputs.tiger-sha256 }}  '"$HOME"'/refdb/${{ inputs.tiger-asset }}' | sha256sum -c -
        mkdir -p data/tiger/county
        tar xzf ~/refdb/'${{ inputs.tiger-asset }}' -C data/tiger/county
        ls -la data/tiger/county/
