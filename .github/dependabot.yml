# Dependabot configuration for Babylon
# Docs: https://docs.github.com/en/code-security/dependabot
#
# Promotion model (Program 15, Phase 3): Dependabot never opens PRs against
# `main`. Every ecosystem below targets `dev`. `dev`'s required-checks
# ruleset is what makes `.github/workflows/dependabot-automerge.yml`
# truthful — a PR can only auto-merge once it has actually satisfied the
# checks the ruleset requires, not merely because the workflow ran.
# `main` never receives a Dependabot PR directly; it only receives changes
# via the fast-forward promotion (`tools/promote.sh`) once `dev` is green.

version: 2
updates:
  # ==========================================================================
  # Python dependencies (Poetry)
  # ==========================================================================
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "python"
    groups:
      # Group all minor/patch updates into a single PR (reduces noise)
      python-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Security updates get their own group (higher priority)
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
      # Majors arrive as ONE reviewable PR per ecosystem (never auto-merged —
      # the automerge workflow only takes minor/patch). An agent unbundles
      # locally if one member is red.
      python-majors:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"

  # ==========================================================================
  # GitHub Actions
  # ==========================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
    groups:
      # Group all GitHub Actions updates together
      github-actions-all:
        patterns:
          - "*"

  # ==========================================================================
  # Frontend dependencies (npm)
  # ==========================================================================
  - package-ecosystem: "npm"
    directory: "/src/frontend"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Group all minor/patch updates into a single PR (reduces noise)
      frontend-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Security updates get their own group (higher priority)
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"
      # Majors as one reviewable PR (see python-majors rationale above).
      frontend-majors:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"

  # ==========================================================================
  # Postgres base image (Docker) — monthly: base-image bumps are deliberate,
  # engine-adjacent events (see the Phase-3 postgis bump protocol).
  # ==========================================================================
  - package-ecosystem: "docker"
    directory: "/docker/postgres"
    target-branch: "dev"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "docker"
    # PG-major bumps (16 -> 17, alpine, etc.) are OWNER ITEM 45: a Postgres/
    # PostGIS major can alter geometry float behavior under the byte-identical
    # determinism bundle and needs the full protocol (qa:e2e-regression on the
    # new image + pg_upgrade path + testcontainers lockstep). Not a casual PR.
    ignore:
      - dependency-name: "postgis/postgis"
        update-types: ["version-update:semver-major"]

  # ==========================================================================
  # Ansible deploy tooling (pip) — monthly: infra tooling, not runtime deps.
  # ==========================================================================
  - package-ecosystem: "pip"
    directory: "/deploy/ansible"
    target-branch: "dev"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "infra"
    groups:
      # Infra tooling travels as (at most) two PRs: minors+patches, majors.
      ansible-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      ansible-majors:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
