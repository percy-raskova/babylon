# Dependabot configuration for Babylon
# Docs: https://docs.github.com/en/code-security/dependabot
#
# Promotion model (Program 15, Phase 3): Dependabot never opens PRs against
# `main`. Every ecosystem below targets `dev`. `dev`'s required-checks
# ruleset is what makes `.github/workflows/dependabot-automerge.yml`
# truthful — a PR can only auto-merge once it has actually satisfied the
# checks the ruleset requires, not merely because the workflow ran.
# `main` never receives a Dependabot PR directly; it only receives changes
# via the fast-forward promotion (`tools/promote.sh`) once `dev` is green.
#
# CONFIG-AUTHORITY INVARIANT (2026-07-12): Dependabot reads THIS FILE — every
# `target-branch` and every `ignore` below — from the repository's DEFAULT
# branch ONLY. The default branch is now `dev` (changed from `main` on
# 2026-07-12) precisely so rule/ignore edits take effect the moment they land
# on `dev`, with no promotion required. If the default branch is ever moved
# back to `main`, edits here go INERT until promoted — the Program-15
# "promote before closing" gotcha. Keep the default branch = the branch you
# edit this file on.

version: 2
updates:
  # ==========================================================================
  # Python dependencies (Poetry)
  # ==========================================================================
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "python"
    groups:
      # Group all minor/patch updates into a single PR (reduces noise)
      python-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Security updates get their own group (higher priority)
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
      # Majors arrive as ONE reviewable PR per ecosystem (never auto-merged —
      # the automerge workflow only takes minor/patch). An agent unbundles
      # locally if one member is red.
      python-majors:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
    # Deferred majors (OWNER ITEM 55 — django 6 + mypy 2 modernization). This is
    # a deliberate railed batch (manage.py check + web suites + typecheck across
    # 567 files), not a drive-by bump: django-stubs 6 + drf-stubs cap `mypy<2.2`
    # via the compatible-mypy extras, so django 6 and mypy 2 are UNSATISFIABLE
    # together on the current stubs. Hold the three majors until item 55 ships.
    # `ignore` suppresses both version- and security-update PRs for the pinned
    # MAJOR only — minor/patch security fixes within 5.x / 1.x still flow.
    # UNBLOCK: delete these three entries when item 55 is executed.
    ignore:
      - dependency-name: "django"
        update-types: ["version-update:semver-major"]
      - dependency-name: "django-stubs"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mypy"
        update-types: ["version-update:semver-major"]

  # ==========================================================================
  # GitHub Actions
  # ==========================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
    groups:
      # Group all GitHub Actions updates together
      github-actions-all:
        patterns:
          - "*"

  # ==========================================================================
  # Frontend dependencies (npm)
  # ==========================================================================
  - package-ecosystem: "npm"
    directory: "/src/frontend"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Group all minor/patch updates into a single PR (reduces noise)
      frontend-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Security updates get their own group (higher priority)
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"
      # Majors as one reviewable PR (see python-majors rationale above).
      frontend-majors:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
    # Deferred major: TypeScript 7. It removed `baseUrl` (our tsconfig relies on
    # it) and `typescript-eslint ^8` has no TS7 support yet — taking it breaks
    # both the tsc build and the eslint typecheck. Hold the major until
    # typescript-eslint ships TS7 support; 5.x patches still flow.
    # UNBLOCK: delete this entry once typescript-eslint supports TypeScript 7.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ==========================================================================
  # Postgres base image (Docker) — monthly: base-image bumps are deliberate,
  # engine-adjacent events (see the Phase-3 postgis bump protocol).
  # ==========================================================================
  - package-ecosystem: "docker"
    directory: "/docker/postgres"
    target-branch: "dev"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "docker"
    # PG-major bumps (16 -> 17, alpine, etc.) are OWNER ITEM 45: a Postgres/
    # PostGIS major can alter geometry float behavior under the byte-identical
    # determinism bundle and needs the full protocol (qa:e2e-regression on the
    # new image + pg_upgrade path + testcontainers lockstep). Not a casual PR.
    ignore:
      - dependency-name: "postgis/postgis"
        update-types: ["version-update:semver-major"]
