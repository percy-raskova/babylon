name: CI

# Simplified CI pipeline for Babylon game project
# Philosophy: Block on correctness (bugs, types, tests), not style
# Style enforcement is handled by pre-commit hooks locally
# See: docs/concepts/vibe-coding/ for development methodology

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up tools with mise
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      # Correctness checks - these block merges
      - name: Lint with Ruff
        run: poetry run ruff check .

      - name: Type check with MyPy
        run: poetry run mypy src

      - name: Run tests
        # Fast correctness gate (exclude AI suite and RED-phase tests)
        run: poetry run pytest --ignore=tests/unit/ai -m "not red_phase" --tb=short -q

      # Coverage gate for simulation-critical code
      # Enforces 80% coverage on engine/systems and formulas modules
      - name: Coverage Gate (Simulation Code)
        run: |
          poetry run pytest --ignore=tests/unit/ai -m "not red_phase" \
            --cov=src/babylon/engine/systems \
            --cov-fail-under=80 \
            --cov-report=term-missing:skip-covered \
            -q --tb=no
        # Blocks merge if simulation code coverage drops below 80%

      # Code complexity analysis - see ADR028 in ai-docs/decisions.yaml
      - name: Code Complexity Report
        run: poetry run radon cc src/ -a -s --show-complexity
        continue-on-error: true  # Informational only, never blocks

      - name: Code Complexity Gate
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        run: poetry run xenon --max-absolute C src/
        # Blocks merge to main if any function exceeds CC 15 (grade C boundary)

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Security audit
        run: poetry run pip-audit --ignore-vuln CVE-2026-3219

  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    # Only build docs on main branch - saves CI time on dev/feature branches
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --with docs

      - name: Install project
        run: poetry install --no-interaction --with docs

      - name: Run doctest examples
        run: poetry run pytest --doctest-modules src/babylon/formulas -v

      - name: Build documentation
        run: |
          cd docs
          poetry run sphinx-build -b html . _build/html

  # Style check - informational only, doesn't block merges
  # Pre-commit hooks handle formatting locally
  style:
    name: Style Check (Informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Check formatting
        run: poetry run ruff format --check .

  # Mutation testing - validates test quality for critical math
  # Only runs on PRs to main - uses incremental testing on changed files
  mutation:
    name: Mutation Testing (Test Quality)
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for diff

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      # Detect changed simulation files for incremental mutation testing
      - name: Get changed simulation files
        id: changed
        run: |
          # Get files changed in this PR that are in simulation-critical paths
          CHANGED=$(git diff --name-only origin/main...HEAD | \
            grep -E '^src/babylon/engine/systems/.*\.py$' | \
            grep -v '__pycache__' | \
            grep -v '__init__' | \
            tr '\n' ',' | sed 's/,$//')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          if [ -n "$CHANGED" ]; then
            echo "📝 Changed simulation files: $CHANGED"
          else
            echo "📝 No simulation files changed in this PR"
          fi

      # Run incremental mutation testing on changed files only
      # See ADR028 in ai-docs/decisions.yaml
      - name: Run Mutation Tests (Incremental)
        if: steps.changed.outputs.files != ''
        run: |
          echo "🧬 Running mutation testing on changed files..."
          poetry run mutmut run \
            --paths-to-mutate="${{ steps.changed.outputs.files }}" \
            --runner="poetry run pytest tests/unit/engine tests/unit/formulas -x -q --tb=no"

      - name: Show Mutation Results
        if: steps.changed.outputs.files != '' && always()
        run: |
          echo ""
          echo "📊 Mutation Testing Results:"
          poetry run mutmut results

      - name: Skip Message
        if: steps.changed.outputs.files == ''
        run: echo "✅ No simulation-critical files changed - skipping mutation testing"

  ai-tests:
    name: AI Tests (Separate Suite)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run AI unit tests
        run: poetry run pytest tests/unit/ai --tb=short -q

  # Postgres integration leg (remediation C.4) — runs the web bridge suites
  # that every other job skips (they gate on POSTGRES_HOST). Uses the
  # repo-canonical compose service: docker/postgres/Dockerfile is
  # postgis/postgis:16-3.4 + pgvector. A GitHub services: block cannot build
  # that Dockerfile, and a stock postgis image lacks pgvector, which aborts
  # PostgresRuntime.init_schema at `CREATE EXTENSION vector`
  # (src/babylon/persistence/postgres_schema.py) — so compose is a step here.
  postgres-integration:
    name: Postgres Integration (web bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Start isolated Postgres (compose, port 5433)
        run: docker compose up -d --wait babylon-pg

      - name: Run web integration suites (direct-host + testcontainers)
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: babylon_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        run: poetry run pytest tests/integration/web/ --tb=short -q

      - name: Stop Postgres
        if: always()
        run: docker compose down -v

  # Playwright E2E leg (remediation C.5) — boots the REAL stack (compose
  # Postgres → migrate → seed wayne_county → Django dev server) and runs the
  # browser suite against it. Vite is started by Playwright's own webServer
  # block (reuseExistingServer is disabled under CI). Scoped to an explicit
  # spec list: visual.spec.ts (snapshot variance) and the long owner-run
  # live-data specs stay out even though SPEC061_TEST_SESSION_ID is set.
  playwright-e2e:
    name: Playwright E2E (real loop)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      # GeoDjango: settings/base.py uses the postgis backend, which loads
      # GEOS/GDAL/PROJ at first connection (Django docs' minimal set).
      - name: Install GeoDjango system libraries
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binutils libproj-dev gdal-bin

      # .mise.toml provisions no node — set it up explicitly. The local
      # node_modules symlink convention does not exist in CI: npm ci.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: web/frontend
        run: npx playwright install --with-deps chromium

      - name: Start isolated Postgres (compose, port 5433)
        run: docker compose up -d --wait babylon-pg

      - name: Django migrate
        working-directory: web
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: babylon_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        run: poetry run python manage.py migrate

      # RUN_MAIN=true is required: game/apps.py skips EngineBridge init for
      # DEBUG-mode management commands otherwise and the seed refuses the stub.
      - name: Seed wayne_county session
        working-directory: web
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: babylon_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          RUN_MAIN: "true"
        run: |
          SEED_OUT=$(poetry run python manage.py seed_initial_game --scenario wayne_county --player admin)
          echo "$SEED_OUT"
          SESSION_ID=$(echo "$SEED_OUT" | grep -oE 'Game session created: [0-9a-f-]{36}' | awk '{print $4}')
          test -n "$SESSION_ID"
          echo "SPEC061_TEST_SESSION_ID=$SESSION_ID" >> "$GITHUB_ENV"

      # --noreload never sets RUN_MAIN itself; without it /api/* silently
      # serves the StubEngineBridge fallback (game/apps.py + game/api.py).
      - name: Start Django backend
        working-directory: web
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: babylon_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          RUN_MAIN: "true"
        run: |
          nohup poetry run python manage.py runserver 8000 --noreload > ../django-ci.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health/ && break
            sleep 1
          done
          curl -sf http://localhost:8000/health/

      - name: Run Playwright suite (Vite auto-started by webServer)
        working-directory: web/frontend
        env:
          CI: "true"
        run: >-
          npx playwright test
          e2e/real-loop.spec.ts
          e2e/end-turn-flow.spec.ts
          e2e/verb-submit.spec.ts
          e2e/auth.spec.ts
          e2e/briefing-map-smoke.spec.ts
          e2e/map-lens-cycling.spec.ts

      - name: Upload Playwright report + Django log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/frontend/playwright-report/
            django-ci.log

      - name: Stop Postgres
        if: always()
        run: docker compose down -v

  # Cockpit scaffold (spec-110, src/frontend) — build/typecheck/test gate.
  # No backend or e2e leg yet: B1 is scaffold-only (no feature porting), so
  # there is no real cockpit flow to drive against a live Django server.
  cockpit-frontend:
    name: Cockpit Frontend (src/frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install cockpit frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Type check
        working-directory: src/frontend
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        working-directory: src/frontend
        run: npx vitest run

      - name: Build
        working-directory: src/frontend
        run: npm run build
