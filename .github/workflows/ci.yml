name: CI

# Program 15 (The Gauntlet): the DEV FAST LANE.
#
# Tier model: push to dev = fast iteration with sanity checks (~8-10 min wall);
# push to main = the full pipeline (main.yml); deep/slow legs run on a schedule
# (nightly.yml). PRs to either branch get this fast lane; PRs to main
# additionally trigger main.yml.
#
# House rules (Constitution III.11 — Loud Failure):
#   - every job carries timeout-minutes (a hang must die loudly, not run 56min);
#   - no continue-on-error except jobs explicitly named "(advisory)";
#   - steps invoke the same mise tasks devs run locally — one invocation
#     source of truth (the bootstrap composite pins the identical toolchain).

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Fast Gate (hygiene, lint, format, imports, types, lock)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # gdal:true — mypy's django-stubs plugin loads Django settings at
      # startup, and the postgis backend imports GEOS/GDAL/PROJ.
      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"

      # Incremental mypy state. Key ends in the commit SHA so every run saves
      # a fresh snapshot; restore-keys fall back to the newest same-lock cache.
      # Speed only — mypy's verdict is identical warm or cold.
      - name: Cache mypy incremental state
        uses: actions/cache@v6
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}-

      - name: Repo hygiene gate
        run: mise run check:hygiene

      - name: Seam continuity gate (Sensor 1 — VIII.12)
        run: mise run check:seams

      - name: Data-coverage sentinel (static — declared sources exist)
        run: mise run check:coverage

      - name: Lint (ruff check)
        run: mise run lint:check

      - name: Format (ruff format --check — blocking)
        run: mise run format:check

      - name: Import-boundary contracts
        run: mise run lint:imports

      - name: Type check (mypy strict)
        run: mise run typecheck

      - name: Poetry lock consistency
        run: poetry check --lock

  test-unit:
    name: Unit Tests (xdist, coverage gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"

      - name: Unit shard (excludes ai/slow/reference-DB; engine/systems cov >= 80%)
        run: mise run test:unit-ci

      - name: Upload test results + coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-ci-results
          path: reports/test-results/unit-ci/
          retention-days: 14

  qa-regression:
    name: Determinism Gate (byte-identical dense goldens)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # No gdal: the 5 regression scenarios are synthetic in-memory factories
      # (no Django, no reference DB, no Postgres) — proven by the Phase-0
      # probe: byte-identical on hosted runners across CPU/glibc/Python.
      - uses: ./.github/actions/bootstrap-python

      - name: qa:regression (5 scenarios vs committed baselines)
        run: mise run qa:regression

  frontend:
    name: Frontend (tsc, eslint, prettier, vitest, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/bootstrap-node

      - name: Check (tsc + eslint + prettier + vitest)
        working-directory: src/frontend
        run: npm run check

      - name: Build
        working-directory: src/frontend
        run: npm run build

      - name: npm audit (prod deps, high+)
        working-directory: src/frontend
        run: npm audit --omit=dev --audit-level=high

  security:
    # Blocking since 2026-07-11: item 41 closed the CVE wave (73 -> 5, the
    # residue in security/pip-audit-ignores.toml with reasons + expiries).
    name: Security Audit (pip-audit policy — blocking since item-41)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/bootstrap-python

      - name: pip-audit (policy wrapper — ignores carry reason + expiry)
        run: mise run security:pip-audit

  gitleaks:
    name: Secret Scan (gitleaks, full history)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-config:
    name: IaC Config Scan (trivy, HIGH+CRITICAL blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: .pre-commit-cache
          trivyignores: .trivyignore
          cache: "true"
