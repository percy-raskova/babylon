# Copilot Coding Agent Setup
# Pre-installs dependencies for GitHub Copilot's ephemeral environment
# Docs: docs.github.com/en/copilot/customizing-copilot/
#       customizing-the-development-environment-for-copilot-coding-agent

name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies (dev + server)
        run: uv sync --frozen --extra server

      - name: Install mise (task runner)
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install pre-commit hooks
        run: uv run pre-commit install --install-hooks

      - name: Verify environment
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== uv version ==="
          uv --version
          echo "=== Installed packages ==="
          uv tree | head -50
          echo "=== Available mise tasks ==="
          mise tasks 2>/dev/null || echo "mise tasks not available"
          echo "=== Quick sanity check ==="
          uv run python -c "import babylon; print(f'babylon version: {babylon.__version__}')"
