name: Infra Live (ephemeral)

# Program 15 Phase 5, owner ruling 1 (2026-07-11): every main push gets
# secretless static validation (infra-validate in main.yml); the REAL
# provision-and-destroy test runs here — manually via workflow_dispatch,
# plus a weekly cron. Costs real money (one cx32 for ~minutes) and real
# API calls, hence never wired to push events.
#
# Ephemeral guarantees:
#   - server_name_prefix=ci-ephemeral + manage_cloudflare=false: production
#     DNS/zone settings/R2 are NEVER touched by these applies.
#   - terraform state lives on the runner disk only and dies with the run;
#     destroy runs under if: always() so a failed smoke still tears down.
#   - the weekly sweeper deletes any ci-ephemeral-* server older than 2h —
#     the backstop for a runner that died between apply and destroy.
#
# Secrets (repo Settings → Actions → Secrets — operator console task):
#   HCLOUD_TOKEN, CI_SSH_PRIVATE_KEY, CI_SSH_PUBLIC_KEY.
# The preflight fails loud with instructions when any are absent.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC — weekly live proof + sweep

permissions:
  contents: read

concurrency:
  group: infra-ephemeral
  cancel-in-progress: false

jobs:
  ephemeral:
    name: Apply → Configure → Smoke → Destroy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: infra-ephemeral
    env:
      TF_IN_AUTOMATION: "true"
      # Ephemeral workspace — never the tracked deploy/terraform dir wholesale;
      # state is created fresh on the runner and discarded with it.
      TF_VAR_manage_cloudflare: "false"
      TF_VAR_server_name_prefix: ci-ephemeral
      # Hetzner enforces name uniqueness per project: the default ssh-key name
      # would collide with production's key and abort the apply.
      TF_VAR_ssh_key_name: ci-ephemeral-ssh-key
      # Required-but-unused: every cloudflare resource is count=0 under
      # manage_cloudflare=false, so the provider never calls the API; the
      # variables merely have no defaults. If this assumption ever breaks,
      # the apply fails loudly here, never against the production zone.
      TF_VAR_cloudflare_api_token: ci-dummy-never-used
      TF_VAR_cloudflare_account_id: ci-dummy
      TF_VAR_cloudflare_zone_id: ci-dummy
    steps:
      - name: Preflight — required secrets present (fail loud)
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}
          CI_SSH_PUBLIC_KEY: ${{ secrets.CI_SSH_PUBLIC_KEY }}
        run: |
          missing=""
          [ -z "$HCLOUD_TOKEN" ] && missing="$missing HCLOUD_TOKEN"
          [ -z "$CI_SSH_PRIVATE_KEY" ] && missing="$missing CI_SSH_PRIVATE_KEY"
          [ -z "$CI_SSH_PUBLIC_KEY" ] && missing="$missing CI_SSH_PUBLIC_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing — add them under" \
              "Settings → Secrets and variables → Actions (operator console" \
              "task from Program 15 Phase 5), then re-dispatch."
            exit 1
          fi

      - uses: actions/checkout@v7

      - uses: ./.github/actions/bootstrap-python

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: SSH key material
        env:
          CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}
          CI_SSH_PUBLIC_KEY: ${{ secrets.CI_SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$CI_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$CI_SSH_PUBLIC_KEY" > ~/.ssh/id_ed25519.pub
          chmod 600 ~/.ssh/id_ed25519

      - name: Terraform init (fresh runner-local state)
        working-directory: deploy/terraform
        run: terraform init -input=false

      - name: Terraform apply (ephemeral)
        id: apply
        working-directory: deploy/terraform
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_public_key_path: ~/.ssh/id_ed25519.pub
        run: |
          terraform apply -auto-approve -input=false
          terraform output -json server_ips > /tmp/server_ips.json
          IP=$(jq -r 'to_entries[0].value' /tmp/server_ips.json)
          test -n "$IP" && test "$IP" != "null"
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Wait for SSH
        run: |
          IP='${{ steps.apply.outputs.ip }}'
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 -i ~/.ssh/id_ed25519 "root@$IP" true && break
            sleep 10
          done
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 -i ~/.ssh/id_ed25519 "root@$IP" true

      - name: Generate inventory + install collections
        working-directory: deploy/terraform
        run: |
          terraform output -raw ansible_inventory_yaml > ../ansible/inventory-ci.yml
          poetry run ansible-galaxy collection install -r ../requirements.yml

      - name: Ansible bootstrap + site
        working-directory: deploy/ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_PRIVATE_KEY_FILE: ~/.ssh/id_ed25519
        run: |
          poetry run ansible-playbook -i inventory-ci.yml playbooks/bootstrap.yml
          poetry run ansible-playbook -i inventory-ci.yml site.yml

      - name: Health smoke
        run: |
          IP='${{ steps.apply.outputs.ip }}'
          for i in $(seq 1 18); do
            curl -sf --max-time 5 "http://$IP/health/" && exit 0
            sleep 10
          done
          echo "::error::/health/ never came up on $IP"
          curl -sv --max-time 10 "http://$IP/health/" || true
          exit 1

      - name: Terraform destroy (always)
        if: always() && steps.apply.outcome != 'skipped'
        working-directory: deploy/terraform
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_public_key_path: ~/.ssh/id_ed25519.pub
        run: terraform destroy -auto-approve -input=false

  # Backstop for runners that died between apply and destroy: anything named
  # ci-ephemeral-* older than 2h is an orphan by definition — kill it.
  sweeper:
    name: Orphan Sweeper (ci-ephemeral-*, >2h)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs: [ephemeral]
    steps:
      - name: Preflight — HCLOUD_TOKEN present
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          if [ -z "$HCLOUD_TOKEN" ]; then
            echo "::error::HCLOUD_TOKEN secret missing — sweeper cannot run."
            exit 1
          fi

      - uses: hetznercloud/setup-hcloud@v2

      - name: Sweep orphans
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          cutoff=$(date -u -d '2 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          orphans=$(hcloud server list -o json \
            | jq -r --arg cutoff "$cutoff" \
              '.[] | select(.name | startswith("ci-ephemeral-")) | select(.created < $cutoff) | .name')
          if [ -z "$orphans" ]; then
            echo "No orphans."
            exit 0
          fi
          for name in $orphans; do
            echo "::warning::Destroying orphaned ephemeral server: $name"
            hcloud server delete "$name"
          done
