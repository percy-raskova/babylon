name: Installer

# The Patches one-liner installer must behave identically on a player's box
# and on a stock ubuntu runner (NORTH_STAR: "installed by one shell script").
# Two jobs:
#   installer-smoke — static + dry-run harness; pure shell, no services, no
#     nix: deliberately act-compatible so `mise run ci:local:install` is a
#     faithful local rehearsal (gh act, catthehacker act-latest image).
#   installer-e2e — the real `sh install.sh --yes` against the signed cache.
#     BLOCKED until the owner-run CACHE_KEY keygen ceremony (ADR104 C1):
#     the placeholder guard makes a real install die by design, so the job
#     is workflow_dispatch-only until the key is minted. Uses the
#     Determinate nix-installer-action (works under act; cachix's action
#     does not) so install.sh's own container-hostile nix bootstrap is
#     skipped via its `command -v nix` seam.
# House rules: timeout-minutes everywhere, no continue-on-error.

on:
  push:
    branches: [dev, main]
    paths:
      - "install.sh"
      - "tools/installer_smoke.sh"
      - "tests/install/**"
      - ".github/workflows/installer.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "install.sh"
      - "tools/installer_smoke.sh"
      - "tests/install/**"
      - ".github/workflows/installer.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer-smoke:
    name: Installer smoke (shellcheck + dry-run harness)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Harness (bash -n, shellcheck, placeholder guard, dry-run legs)
        # bash, not sh: the harness uses `set -o pipefail`, which ubuntu's dash rejects
        run: bash tools/installer_smoke.sh

  # Enable beyond workflow_dispatch after the CACHE_KEY ceremony: flip the
  # placeholder assertion in the harness, add this job to the push/PR path
  # triggers, and it becomes the "same one-liner runs green on a stock
  # ubuntu runner" acceptance gate.
  installer-e2e:
    name: Installer e2e (real nix profile install from the signed cache)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v8

      - name: One-liner install (non-interactive)
        run: sh install.sh --yes

      - name: Doctor
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh 2>/dev/null || true
          babylon doctor
