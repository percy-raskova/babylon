name: Nightly

# Program 15 (The Gauntlet): scheduled deep coverage so the heavy legs never
# lapse between promotions. Daily: the non-unit shard + security against dev
# HEAD. Weekly (Sunday): the Python 3.13 forward-compat suite and simulation
# trace/sweep artifacts — absorbing the retired extended-analysis.yml.
# (Mutation testing was retired from CI 2026-07-16 — local-only, see below.)
#
# NOTE: scheduled workflows execute the workflow file from the DEFAULT branch,
# so this file is inert until the first dev→main promotion (Phase 8). Every
# job checks out ref: dev explicitly — nightly verdicts are about dev HEAD.

on:
  schedule:
    - cron: "0 6 * * *"   # daily deep legs, 06:00 UTC
    - cron: "0 4 * * 0"   # weekly leg, Sunday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  # ── Daily: deep legs against dev HEAD ────────────────────────────────────
  test-rest:
    name: Non-Unit Tests (dev HEAD)
    if: github.event.schedule != '0 4 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"
      - name: Heavy shard (includes slow)
        run: mise run test:rest-ci
      - name: Upload test results + coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-rest-results
          path: reports/test-results/rest-ci/
          retention-days: 14

  security:
    name: Security Audit (pip-audit policy — blocking since item-41, dev HEAD)
    if: github.event.schedule != '0 4 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
      - name: pip-audit (policy wrapper — ignores carry reason + expiry)
        run: mise run security:pip-audit

  postgres-integration:
    name: Postgres Integration (dev HEAD)
    if: github.event.schedule != '0 4 * * 0' && vars.CI_REFDB_READY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"
      - uses: ./.github/actions/postgres-up
      - uses: ./.github/actions/fetch-reference-db
      - name: Django migrate (fresh compose DB)
        working-directory: web
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: babylon_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        run: poetry run python manage.py migrate
      # The engine-runtime tables (node_state, edge_state, dynamic_*, …) are
      # NOT Django's — locally test:int-pg applies POSTGRES_SCHEMA_DDL via
      # db:bootstrap after db:up. This step was missing since the workflow's
      # maiden run (2026-07-12), so every session-hydrating test failed with
      # UndefinedTable: node_state (37 of 69 in run 29512575415).
      - name: Babylon runtime schema bootstrap (node_state et al.)
        run: mise run db:bootstrap
      - name: Run web integration suites
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: babylon_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        run: poetry run pytest tests/integration/web/ -o addopts="" -vv -ra -l --tb=long --durations=0
      # Audit 2026-07-16: qa:tick-budget (spec-104, ratified per-system wallclock
      # budget) was built and wired into NO workflow — engine perf regressions
      # were architecturally ungated. This job already has Postgres + the
      # reference DB. Advisory first ("advisory" in the name = non-blocking per
      # promote.sh convention); promote to blocking once noise is characterized.
      - name: qa:tick-budget (advisory — per-system wallclock vs ratified budget)
        continue-on-error: true
        env:
          BABYLON_TEST_PG_DSN: "dbname=babylon_test host=localhost port=5433 user=test password=test"
        run: mise run qa:tick-budget
      - name: Stop Postgres
        if: always()
        run: docker compose down -v

  # The requires_reference_db suites run here against the ci-data-v1 subset
  # artifact (item 40) — tests/unit's marked files are excluded from the
  # dev unit shard and tests outside unit are excluded from test-rest by
  # the marker, so this job is their ONE home on the main tier.
  refdata-tests:
    name: Reference-Data Tests (dev HEAD, pinned ci-data subset)
    if: github.event.schedule != '0 4 * * 0' && vars.CI_REFDB_READY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"
      - uses: ./.github/actions/fetch-reference-db
      - name: Run requires_reference_db suites
        run: >-
          poetry run pytest tests -m requires_reference_db
          --ignore=tests/integration/web
          -o addopts="" -vv -ra -l --tb=long --durations=0

  # ── Weekly (Sunday): forward-compat, sim artifacts, mutation ─────────────
  py313-forward-compat:
    name: Python 3.13 Suite (forward compat)
    if: github.event.schedule == '0 4 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      # Documented exception to the mise-pinned toolchain: this leg exists
      # precisely to run a DIFFERENT python than .mise.toml pins.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Poetry
        run: pipx install poetry==2.2.1
      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry env use python3.13
          poetry install --no-interaction
      - name: Install GeoDjango system libraries
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binutils libproj-dev gdal-bin
      # Max verbosity by owner ruling (2026-07-11): CI logs are agent-read.
      - name: Full suite on 3.13
        run: >-
          poetry run pytest tests --ignore=tests/unit/ai --ignore=tests/integration/web
          -o addopts="" -vv -ra -l --tb=long --durations=0
          -m "not red_phase and not requires_reference_db"

  sim-artifacts:
    name: Simulation Trace + Sweep Artifacts
    if: github.event.schedule == '0 4 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
      # sim:trace's headless runner requires the reference DB at
      # data/sqlite/marxist-data-3NF.sqlite — exactly where this action
      # installs the pinned ci-data subset. Without it the leg died at
      # startup (ReferenceDataMissingError) on every dispatch. Whether the
      # subset's rows satisfy the trace scenario is a data-coverage question
      # this step surfaces honestly instead of masking behind a missing file.
      - uses: ./.github/actions/fetch-reference-db
      # …and the Postgres RUNTIME (spec-087: the headless runner writes its
      # dynamic_* tables through a psycopg pool; _open_pool hard-requires
      # BABYLON_PG_DSN/BABYLON_TEST_PG_DSN). Same provisioning trio as the
      # postgres-integration job; DSN form matches test:int-pg's export.
      - uses: ./.github/actions/postgres-up
      - name: Babylon runtime schema bootstrap
        run: mise run db:bootstrap
      - name: Simulation trace
        env:
          BABYLON_TEST_PG_DSN: "dbname=babylon_test host=localhost port=5433 user=test password=test"
        run: mise run sim:trace
      - name: Parameter sweep
        env:
          BABYLON_TEST_PG_DSN: "dbname=babylon_test host=localhost port=5433 user=test password=test"
        run: mise run sim:sweep
      - name: Stop Postgres
        if: always()
        run: docker compose down -v
      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: sim-analysis-${{ github.run_id }}
          path: results/
          retention-days: 90

  # Mutation testing RETIRED from CI (owner ruling 2026-07-16): the leg never
  # completed on a hosted runner (dangling babylon-data symlink, then
  # pytest-django's babylon_web scan inside mutmut's run context) and a
  # 120-minute advisory job is the wrong place to calibrate it. It runs
  # LOCALLY (tools/run_mutmut.py --critical) after the planned test refactor.
