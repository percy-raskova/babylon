name: Nightly

# Program 15 (The Gauntlet): scheduled deep coverage so the heavy legs never
# lapse between promotions. Daily: the non-unit shard + security against dev
# HEAD. Weekly (Sunday): the Python 3.13 forward-compat suite and simulation
# trace/sweep artifacts — absorbing the retired extended-analysis.yml.
# (Mutation testing was retired from CI 2026-07-16 — local-only, see below.)
#
# NOTE: scheduled workflows execute the workflow file from the DEFAULT branch,
# so this file is inert until the first dev→main promotion (Phase 8). Every
# job checks out ref: dev explicitly — nightly verdicts are about dev HEAD.

on:
  schedule:
    # Owner ruling 2026-07-20: weekly tempo. The deep legs (formerly nightly)
    # now run Wednesdays; the Sunday leg keeps its slot. workflow_dispatch
    # remains the on-demand path (post-merge verification etc.).
    - cron: "0 6 * * 3"   # weekly deep legs, Wednesday 06:00 UTC
    - cron: "0 4 * * 0"   # weekly leg, Sunday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  # ── Daily: deep legs against dev HEAD ────────────────────────────────────
  test-rest:
    name: Non-Unit Tests (dev HEAD)
    if: github.event.schedule != '0 4 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"
      - name: Heavy shard (includes slow)
        env:
          # Self-salvage caps (2026-07-16 wedge incident): a hung shard SIGINTs
          # itself inside the job budget and still uploads summary + junit.
          BABYLON_REST_SHARD_TIMEOUT: 25m
          BABYLON_SLOWUNIT_TIMEOUT: 8m
        run: mise run test:rest-ci
      - name: Upload test results + coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-rest-results
          path: reports/test-results/rest-ci/
          retention-days: 14

  security:
    name: Security Audit (pip-audit policy — blocking since item-41, dev HEAD)
    if: github.event.schedule != '0 4 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
      - name: pip-audit (policy wrapper — ignores carry reason + expiry)
        run: mise run security:pip-audit

  postgres-integration:
    name: Postgres Integration (dev HEAD)
    if: github.event.schedule != '0 4 * * 0' && vars.CI_REFDB_READY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"
      - uses: ./.github/actions/postgres-up
      - uses: ./.github/actions/fetch-reference-db
      - name: Django migrate (fresh compose DB)
        working-directory: web
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: babylon_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        run: poetry run python manage.py migrate
      # The engine-runtime tables (node_state, edge_state, dynamic_*, …) are
      # NOT Django's — locally test:int-pg applies POSTGRES_SCHEMA_DDL via
      # db:bootstrap after db:up. This step was missing since the workflow's
      # maiden run (2026-07-12), so every session-hydrating test failed with
      # UndefinedTable: node_state (37 of 69 in run 29512575415).
      - name: Babylon runtime schema bootstrap (node_state et al.)
        run: mise run db:bootstrap
      - name: Run web integration suites
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: babylon_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        run: poetry run pytest tests/integration/web/ -o addopts="" -vv -ra -l --tb=long --durations=0
      # Audit 2026-07-16: qa:tick-budget (spec-104, ratified per-system wallclock
      # budget) was built and wired into NO workflow — engine perf regressions
      # were architecturally ungated. This job already has Postgres + the
      # reference DB. Advisory first ("advisory" in the name = non-blocking per
      # promote.sh convention); promote to blocking once noise is characterized.
      - name: qa:tick-budget (advisory — per-system wallclock vs ratified budget)
        continue-on-error: true
        env:
          BABYLON_TEST_PG_DSN: "dbname=babylon_test host=localhost port=5433 user=test password=test"
        run: mise run qa:tick-budget
      - name: Stop Postgres
        if: always()
        run: docker compose down -v

  # The requires_reference_db suites run here against the ci-data-v1 subset
  # artifact (item 40) — tests/unit's marked files are excluded from the
  # dev unit shard and tests outside unit are excluded from test-rest by
  # the marker, so this job is their ONE home on the main tier.
  refdata-tests:
    name: Reference-Data Tests (dev HEAD, pinned ci-data subset)
    if: github.event.schedule != '0 4 * * 0' && vars.CI_REFDB_READY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"
      - uses: ./.github/actions/fetch-reference-db
      - name: Catalog sentinel (DB probe — catalog↔DB reconciliation)
        run: poetry run python tools/sentinel_check.py catalog --check
      - name: Run requires_reference_db suites
        run: >-
          poetry run pytest tests -m requires_reference_db
          --ignore=tests/integration/web
          -o addopts="" -vv -ra -l --tb=long --durations=0
  # The byte-identity contract is defined ONLY under the pinned sqlite (the
  # builder hard-gates on PINNED_SQLITE_VERSION), so this leg runs inside the
  # infra flake's dataBuild devshell — the ADR098 declared follow-up, landed
  # 2026-07-20; the old OFF-PIN warn-and-skip path is deleted with it. Its own
  # job (not a refdata-tests step): the full rebuild took ~12 min on the dev
  # box and hosted runners are slower — a 25-minute shared budget can't hold
  # both it and the test suites, and a separate job gives clean attribution.
  rebuild-verify:
    name: Rebuild-Verify Reference DB (byte-identity, dataBuild devshell)
    if: github.event.schedule != '0 4 * * 0' && vars.CI_REFDB_READY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      # babylon is public but the infra submodule is private — GITHUB_TOKEN is
      # repo-scoped, so the fetch authenticates with a dedicated READ-ONLY
      # deploy key (babylon-infra → settings → deploy keys, installed
      # 2026-07-20). The key touches disk only for this fetch. The checked-out
      # gitlink IS the environment pin: bumping it is the pin ceremony, and the
      # flake's nixpkgs-data input remains the sole pinning authority.
      - name: Fetch infra submodule (read-only deploy key)
        env:
          INFRA_DEPLOY_KEY: ${{ secrets.INFRA_SUBMODULE_DEPLOY_KEY }}
        run: |
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "$INFRA_DEPLOY_KEY" > ~/.ssh/infra_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          # --global, not local: `git submodule update` spawns a fresh clone
          # subprocess that never reads the superproject's local config — a
          # local insteadOf silently doesn't apply and the clone dies asking
          # for https credentials (proven on the maiden run, job 88509068677).
          git config --global \
            url."git@github.com:percy-raskova/babylon-infra.git".insteadOf \
            "https://github.com/percy-raskova/babylon-infra.git"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/infra_deploy_key -o IdentitiesOnly=yes" \
            git submodule update --init infra
          rm -f ~/.ssh/infra_deploy_key
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
      # Sources for the rebuild: the manifest-driven step of this action
      # fetches every `artifacts:` entry + schema.sql into their dist/ homes —
      # exactly what build_reference_db.py reads. (The subset DB and TIGER
      # tarball it also installs are unused here; the shared action keeps the
      # fetch logic single-sourced.)
      - uses: ./.github/actions/fetch-reference-db
      - name: Rebuild under the pinned devshell + compare product sha
        run: |
          # Post-cutover the product block is load-bearing — its absence is a
          # manifest regression, not a pre-cutover state (III.11: fail loud).
          if ! grep -q '^product:' data-artifacts.yaml; then
            echo "::error::data-artifacts.yaml has no product block — manifest regression"
            exit 1
          fi
          nix develop ./infra#dataBuild --command \
            python3 tools/build_reference_db.py --out /tmp/rebuilt.sqlite
          nix develop ./infra#dataBuild --command python3 - <<'EOF'
          import hashlib
          import pathlib
          import sys

          import yaml

          want = yaml.safe_load(pathlib.Path("data-artifacts.yaml").read_text())["product"]["sha256"]
          got = hashlib.sha256(pathlib.Path("/tmp/rebuilt.sqlite").read_bytes()).hexdigest()
          print(f"registry={want}\nrebuilt ={got}")
          sys.exit(0 if want == got else 1)
          EOF

  pacing-gate:
    name: G1 Pacing Gate (520-tick nationwide null-play, dev HEAD)
    if: github.event.schedule != '0 4 * * 0'
    runs-on: ubuntu-latest
    # Measured: a 20-tick `us` sample cost 117.49s wall-clock on the dev box;
    # linear-fit extrapolation to 520 ticks ~= 49 minutes (see the test's
    # docstring for the full model). No Postgres — but since PR #221 (#39,
    # Amendment U) this leg DOES need the reference DB: SubstrateSystem's
    # one-time ScaleAdjunction lattice build reads dim_county /
    # bridge_county_metro / dim_metro_area (all shipped FULL in the ci-data
    # subset). Without it, sqlalchemy auto-creates an empty sqlite and the
    # run dies 'no such table: dim_county' at tick 0 (2026-07-20 red,
    # run 29781894207). Territories/businesses still come from the
    # committed JSON artifact, not the data drive.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
        with:
          gdal: "true"
      - uses: ./.github/actions/fetch-reference-db
      - name: G1 standing pacing gate (mise run qa:pacing)
        run: mise run qa:pacing
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-pacing-gate-results
          path: reports/test-results/pacing/
          retention-days: 14

  # ── Weekly (Sunday): forward-compat, sim artifacts, mutation ─────────────
  py313-forward-compat:
    name: Python 3.13 Suite (forward compat)
    if: github.event.schedule == '0 4 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      # Documented exception to the mise-pinned toolchain: this leg exists
      # precisely to run a DIFFERENT python than .mise.toml pins.
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install Poetry
        run: pipx install poetry==2.2.1
      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry env use python3.13
          poetry install --no-interaction
      - name: Install GeoDjango system libraries
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binutils libproj-dev gdal-bin
      # Max verbosity by owner ruling (2026-07-11): CI logs are agent-read.
      - name: Full suite on 3.13
        run: >-
          poetry run pytest tests --ignore=tests/unit/ai --ignore=tests/integration/web
          -o addopts="" -vv -ra -l --tb=long --durations=0
          -m "not red_phase and not requires_reference_db and not pacing_gate"

  sim-artifacts:
    name: Simulation Trace + Sweep Artifacts
    if: github.event.schedule == '0 4 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
      - uses: ./.github/actions/bootstrap-python
      # sim:trace's headless runner requires the reference DB at
      # data/sqlite/marxist-data-3NF.sqlite — exactly where this action
      # installs the pinned ci-data subset. Without it the leg died at
      # startup (ReferenceDataMissingError) on every dispatch. Whether the
      # subset's rows satisfy the trace scenario is a data-coverage question
      # this step surfaces honestly instead of masking behind a missing file.
      - uses: ./.github/actions/fetch-reference-db
      # …and the Postgres RUNTIME (spec-087: the headless runner writes its
      # dynamic_* tables through a psycopg pool; _open_pool hard-requires
      # BABYLON_PG_DSN/BABYLON_TEST_PG_DSN). Same provisioning trio as the
      # postgres-integration job; DSN form matches test:int-pg's export.
      - uses: ./.github/actions/postgres-up
      - name: Babylon runtime schema bootstrap
        run: mise run db:bootstrap
      - name: Simulation trace
        env:
          BABYLON_TEST_PG_DSN: "dbname=babylon_test host=localhost port=5433 user=test password=test"
        run: mise run sim:trace
      - name: Parameter sweep
        env:
          BABYLON_TEST_PG_DSN: "dbname=babylon_test host=localhost port=5433 user=test password=test"
        run: mise run sim:sweep
      - name: Stop Postgres
        if: always()
        run: docker compose down -v
      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: sim-analysis-${{ github.run_id }}
          path: results/
          retention-days: 90

  # Mutation testing RETIRED from CI (owner ruling 2026-07-16): the leg never
  # completed on a hosted runner (dangling babylon-data symlink, then
  # pytest-django's babylon_web scan inside mutmut's run context) and a
  # 120-minute advisory job is the wrong place to calibrate it. It runs
  # LOCALLY (tools/run_mutmut.py --critical) after the planned test refactor.
