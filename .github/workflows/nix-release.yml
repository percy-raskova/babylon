# Nix release channel — the player-channel §7 job, now LIVE: the flake exists
# (flake.nix at repo root, ADR094 Task 1), so this workflow is no longer
# aspirational. It builds the closure players receive, gates it on the closure
# regression suite, then signs and pushes it to the R2 binary cache.
#
# Secrets required (game repo) — all four are BD-owed ceremonies, carried but
# NOT performed by ADR104 (ai/decisions/ADR104_nix_bootstrap_installer.yaml);
# full mint/wire steps: ai/_inbox/PROGRAM_v1_0_0_ceremony_runbook.md.
#   R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY
#       R2 API token scoped "Object Read & Write" to the babylon-cache bucket
#       ONLY (dash → R2 → Manage API tokens). Not an account-wide token.
#       Minted in Runbook C2(a); wired to this repo in Runbook C4(a).
#   CF_ACCOUNT_ID
#       same account id as the workers; forms the S3 endpoint below.
#       Found in Runbook C2(b); wired to this repo in Runbook C4(a).
#   NIX_CACHE_SIGNING_KEY
#       secret half of the ed25519 keypair minted by
#       `nix key generate-secret --key-name babylon-cache-1` (Runbook C1) —
#       NOT a babylon-infra script. The public half is baked into install.sh's
#       CACHE_KEY (same runbook). OWNER-RUN keygen is still pending — until all
#       four secrets exist, the "Verify release secrets are present" step below
#       refuses the publish loudly rather than let this workflow attempt one.
#
# Free-tier ledger for this job: R2 storage 10 GB free (a ~1.2 GB closure per
# release → ~8 releases resident; `nix store` paths dedupe across releases, and
# stale releases can be pruned from the bucket). Class A ops 1M/month free —
# one `nix copy` is one PUT per store path (~hundreds), noise. Egress: free.
name: nix-release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    # Determinism gate ON the built closure (Amendment Q / Amendment-L discipline).
    # Runs tools/regression_test.py with the venv's python — the same 5-scenario
    # baseline compare as main.yml's qa-regression, which needs NO Postgres.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build the closure
        run: nix build .#babylon --print-build-logs

      - name: Regression gate on the closure (5 scenarios vs committed baselines)
        run: ./result/bin/python tools/regression_test.py compare

  nix-release:
    needs: [regression]
    runs-on: ubuntu-latest
    # House rule (Constitution III.11): every job carries timeout-minutes —
    # a hang must die loudly, not run to the 360min default.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build the closure players receive
        run: nix build .#babylon

      - name: Regression gate ON the closure (Amendment Q extended)
        run: nix flake check

      # Constitution III.11 (Loud Failure): a missing ceremony secret must
      # never let the push step run half-configured into a confusing S3/DNS
      # error. Refuse loud and exit before spending the copy attempt.
      - name: Verify release secrets are present (BD ceremony gate, ADR104)
        env:
          HAS_SIGNING_KEY: ${{ secrets.NIX_CACHE_SIGNING_KEY != '' }}
          HAS_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID != '' }}
          HAS_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY != '' }}
          HAS_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID != '' }}
        run: |
          missing=""
          [ "$HAS_SIGNING_KEY" = "true" ] || missing="$missing NIX_CACHE_SIGNING_KEY"
          [ "$HAS_R2_ACCESS_KEY_ID" = "true" ] || missing="$missing R2_ACCESS_KEY_ID"
          [ "$HAS_R2_SECRET_ACCESS_KEY" = "true" ] || missing="$missing R2_SECRET_ACCESS_KEY"
          [ "$HAS_CF_ACCOUNT_ID" = "true" ] || missing="$missing CF_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Refusing to publish — missing repo secret(s):$missing"
            echo "::error::These are BD-owed ceremonies (ADR104; see"
            echo "::error::ai/_inbox/PROGRAM_v1_0_0_ceremony_runbook.md Runbooks C1"
            echo "::error::keygen, C2 R2 token mint, C4 'gh secret set' wiring)."
            echo "::error::The closure already built and gated clean above; only"
            echo "::error::sign-and-push is blocked until the owner runs the ceremony."
            exit 1
          fi

      - name: Sign and push to the babylon-cache R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          umask 077
          printf '%s' "${{ secrets.NIX_CACHE_SIGNING_KEY }}" > /tmp/cache-key
          ENDPOINT="${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          STORE_URI="s3://babylon-cache?scheme=https&endpoint=${ENDPOINT}"
          STORE_URI="${STORE_URI}&region=auto&secret-key=/tmp/cache-key&compression=zstd"
          nix copy --to "$STORE_URI" .#babylon
          rm -f /tmp/cache-key

      # Players then substitute from the Worker front-door, no compiling:
      #   extra-substituters = https://cache.babylon.percypedia.biz
      #   extra-trusted-public-keys = babylon-cache-1:<PUBKEY>
      #
      # Bonus artifact only — the real publish already happened above.
      # `nix bundle`'s default out-link is the installable's base name
      # ("babylon" for `.#babylon`, per `nix bundle --help`). Failure here
      # must still be LOUD (Constitution III.11): `continue-on-error` shows
      # a visible warning in the run UI instead of a silent `|| true` no-op
      # that would look identical to success.
      - name: AppImage demo artifact (zero-install path)
        id: appimage_demo
        continue-on-error: true
        run: nix bundle --bundler github:ralismark/nix-appimage .#babylon

      - name: Upload AppImage demo artifact
        if: steps.appimage_demo.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: babylon-appimage-demo-linux-x86_64
          path: babylon
          if-no-files-found: warn
