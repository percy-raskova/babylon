name: Release

# Program 15 Phase 8, owner ruling 4 (2026-07-11): releases are TAG-DRIVEN.
# Version bumps are a deliberate act on dev — `mise run bump` wraps
# `cz bump` so the bump commit + vX.Y.Z tag ride the ff promotion; pushing
# the tag fires this workflow. The old push-to-main auto-bump is retired:
# with dev 762 conventional commits ahead, an unguarded ff would have
# auto-published a giant surprise release on arrival (the exact failure
# mode that stale-froze main last time).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)publish a GitHub release for"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          case "$TAG" in
            v*) ;;
            *) echo "::error::'$TAG' is not a v* tag"; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Pinned to the version poetry.lock resolves (bare pip install would
      # silently pull whatever is latest on PyPI at run time).
      - name: Install Commitizen
        run: pip install commitizen==4.15.1

      - name: Extract release notes for this tag
        id: notes
        run: |
          TAG='${{ steps.tag.outputs.tag }}'
          # The bump commit (made by `mise run bump` on dev) already updated
          # CHANGELOG.md; extract this version's section for the release body.
          cz changelog "${TAG#v}" --dry-run > release-notes.md || {
            echo "::warning::cz changelog extraction failed — falling back to full CHANGELOG.md"
            cp CHANGELOG.md release-notes.md
          }
          head -5 release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
