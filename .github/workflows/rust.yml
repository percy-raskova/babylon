name: Rust (hypergraph-rs)

# The hypergraph-rs workspace (standalone XGI port) — path-filtered so the
# Python fast lane never pays for Rust compilation, and Rust changes never
# wait on the Python legs. House rules (Constitution III.11 — Loud Failure):
#   - every job carries timeout-minutes (a hang dies loudly);
#   - no continue-on-error;
#   - steps invoke the same mise tasks devs run locally — one invocation
#     source of truth (rustup reads hypergraph-rs/rust-toolchain.toml, the
#     identical pin for CI and local dev).

on:
  push:
    branches: [dev]
    paths:
      - "hypergraph-rs/**"
      - ".mise.toml"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "hypergraph-rs/**"
      - ".mise.toml"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-gate:
    name: Rust gate (fmt, clippy -D warnings, test, doc)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Cache cargo registry + target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hypergraph-rs

      # Pre-warm the pinned toolchain (components + wasm32 target) so a
      # download failure surfaces here, not mid-gate.
      - name: rustup toolchain (hypergraph-rs/rust-toolchain.toml)
        working-directory: hypergraph-rs
        run: rustup show active-toolchain

      - name: "Full gate (identical to local — mise run rust:check)"
        run: mise run rust:check

  rust-msrv:
    name: MSRV floor (rust-version 1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Cache cargo registry + target dir (MSRV-keyed)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hypergraph-rs
          key: msrv

      - name: "MSRV floor check (identical to local — mise run rust:msrv)"
        run: mise run rust:msrv
