"""

[tasks."test:cov"]
description = "Tests + coverage (XML + JSON + HTML) → reports/test-results/cov/"
run = """
mkdir -p reports/test-results/cov
poetry run pytest \
  --ignore=tests/unit/ai \
  -vv --tb=long --showlocals --show-capture=all --capture=tee-sys -r aR --durations=25 \
