# SIMULATION (Namespaced)
# =============================================================================

[tasks."sim:run"]
description = "Self-contained in-memory smoke test (two-node Worker vs Owner, one tick) — verifies your install. For the full Postgres-backed run see sim:e2e-michigan."
run = "poetry run python -m babylon"

[tasks."sim:trace"]
