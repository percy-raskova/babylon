# Mise Task Runner Configuration for Babylon
# https://mise.jdx.dev/
#
# Task Namespace Convention (ADR035):
#   check         - Fast CI gate (lint + format + typecheck + unit tests)
#   test:*        - Test runners by scope
#   sim:*         - Simulation execution and analysis
#   tune:*        - Parameter optimization
#   qa:*          - Quality assurance and verification
#   demo:*        - Integration demos and persona testing
#   data:*        - Data pipeline operations
#   docs:*        - Documentation building
#   mutate:*      - Mutation testing
#   midi:*        - Music generation
#   web:*         - Web app local development (Django + Vite)

[tools]
python = "3.12"
poetry = "2.2.1"  # pinned fleet-wide (CI + local) since the PEP-621 migration

[env]
PYTHONPATH = "src"
BABYLON_ENV = "development"
# Agent ergonomics: uncolored tool output (kills ANSI-strip pipelines)
NO_COLOR = "1"
# Soundfont for MIDI conversion
SOUNDFONT = "/usr/share/sounds/sf2/FluidR3_GM.sf2"
MUSIC_DIR = "assets/music"
AUDIO_OUTPUT_DIR = "assets/audio"

# =============================================================================
# INSTALLATION
# =============================================================================

[tasks.install]
description = "Install all dependencies"
run = "poetry install --with dev"

[tasks.setup]
description = "One-shot bootstrap for a fresh clone: toolchain + deps + hooks + tuned Postgres 16 + canonical schema (spec-087 FR-008)"
run = """
set -e
mise install
poetry install --with dev
poetry run pre-commit install
mise run db:up
mise run db:bootstrap
if [ ! -f data/sqlite/marxist-data-3NF.sqlite ]; then
  echo "WARN: reference DB missing at data/sqlite/marxist-data-3NF.sqlite"
  echo "      (headless runs need it; see project/04-data-program-098.md)"
fi
echo ""
echo "Setup complete. Smoke-test with: mise run qa:e2e-regression"
"""

# =============================================================================
# CODE QUALITY
# =============================================================================

[tasks.lint]
description = "Run ruff linter with auto-fix"
run = "poetry run ruff check src tests --fix"

[tasks.format]
description = "Run ruff formatter"
run = "poetry run ruff format src tests"

[tasks.typecheck]
description = "Run mypy type checker"
run = "poetry run mypy src"

[tasks."lint:yaml"]
description = "Lint YAML files"
run = "poetry run yamllint -c .yamllint.yaml ."

[tasks."lint:md"]
description = "Lint Markdown files"
run = "npx markdownlint --config .markdownlint.yaml '**/*.md' --ignore 'CHANGELOG.md' --ignore 'brainstorm/**' --ignore '.venv/**'"

[tasks."lint:complexity"]
description = "Show code complexity report (radon)"
run = "poetry run radon cc src/ -a -s --show-complexity"

[tasks."lint:complexity-check"]
description = "Run complexity gate (xenon) - fails if CC > 15"
run = "poetry run xenon --max-absolute C src/"

[tasks.check]
description = "Fast CI gate: hygiene + lint + imports + format + typecheck + unit tests"
depends = ["check:hygiene", "lint", "lint:imports", "format", "typecheck", "test:unit"]

[tasks."check:quick"]
description = "Quality gate without the test leg: lint + format + typecheck"
depends = ["lint", "format", "typecheck"]

[tasks."check:hygiene"]
description = "Repo-hygiene gate: root allowlist, ignore-consistency, blob sizes (program 14)"
run = "poetry run python tools/check_repo_hygiene.py"

[tasks."lint:imports"]
description = "Import-boundary contracts: kernel < models/formulas < domain < engine (program 14)"
run = "poetry run lint-imports"

[tasks."ci:local"]
description = "Run a GitHub Actions job locally via gh-act (program 15) — e.g. mise run ci:local -- -W .github/workflows/ci.yml -j fast-gate. Install once: gh extension install https://github.com/nektos/gh-act"
run = "gh act -P ubuntu-latest=ghcr.io/catthehacker/ubuntu:act-latest --container-architecture linux/amd64"

[tasks.commit]
description = "Hook-safe commit: pre-run hooks on staged files, re-stage their fixes, commit, verify HEAD moved"
usage = 'arg "<message>" help="Conventional commit message"'
run = '''
set -e
if git diff --cached --quiet; then
  echo "nothing staged — git add first"; exit 1
fi
# First pass absorbs the 'files were modified by this hook' abort;
# re-stage hook fixes for EXACTLY the staged set (not the whole tree);
# the commit itself re-runs hooks and must pass.
poetry run pre-commit run || true
for f in $(git diff --cached --name-only); do
  if [ -e "$f" ]; then git add -- "$f"; fi
done
git commit -m "$usage_message"
git log --oneline -1
git status --short | grep -v "^??" || true
'''

# =============================================================================
# TESTING (Namespaced)
# =============================================================================

# -----------------------------------------------------------------------------
# Verbose machine-readable test runs.
# Every test:* task writes JUnit XML + JSON + self-contained HTML to
# reports/test-results/<task>/ for AI-agent and tool consumption.
# Verbose flags (per pytest C7 docs, max standard expressiveness):
#   -vv                      full assertion diffs (no truncation)
#   --tb=long                long tracebacks
#   --showlocals             include local variables in tracebacks
#   --show-capture=all       captured stdout/stderr/log on failure
#   --capture=tee-sys        capture stdout/stderr AND pass through to console
#   -r aR                    summary of all outcomes (incl. xfailed/xpassed reasons)
#   --durations=25           top 25 slowest tests
# JUnit XML config (pyproject.toml [tool.pytest.ini_options]):
#   junit_family=xunit2, junit_logging=all, junit_log_passing_tests=true,
#   junit_duration_report=call, junit_suite_name="babylon"
# See CLAUDE.md "Test Reports for AI Agents" section for the JSON schema.
# -----------------------------------------------------------------------------

[tasks."test:unit"]
description = "Unit tests (fast) → reports/test-results/unit/"
run = """
mkdir -p reports/test-results/unit
poetry run pytest tests/unit -m 'not red_phase' \
  -vv --tb=long --showlocals --show-capture=all --capture=tee-sys -r aR --durations=25 \
  --junit-xml=reports/test-results/unit/junit.xml \
  --json-report --json-report-file=reports/test-results/unit/report.json --json-report-indent=2 \
  --html=reports/test-results/unit/report.html --self-contained-html
"""

[tasks."test:fast"]
description = "Unit tests excluding slow-marked → reports/test-results/fast/"
run = """
mkdir -p reports/test-results/fast
poetry run pytest tests/unit -m 'not slow' \
  -vv --tb=long --showlocals --show-capture=all --capture=tee-sys -r aR --durations=25 \
  --junit-xml=reports/test-results/fast/junit.xml \
  --json-report --json-report-file=reports/test-results/fast/report.json --json-report-indent=2 \
  --html=reports/test-results/fast/report.html --self-contained-html
"""

[tasks."test:slow"]
description = "Slow-marked tests only → reports/test-results/slow/"
run = """
mkdir -p reports/test-results/slow
poetry run pytest -m 'slow' \
  -vv --tb=long --showlocals --show-capture=all --capture=tee-sys -r aR --durations=25 \
  --junit-xml=reports/test-results/slow/junit.xml \
  --json-report --json-report-file=reports/test-results/slow/report.json --json-report-indent=2 \
  --html=reports/test-results/slow/report.html --self-contained-html
"""

[tasks."test:int"]
description = "Integration tests (mechanics & systems) → reports/test-results/int/"
run = """
mkdir -p reports/test-results/int
poetry run pytest tests/integration \
  -vv --tb=long --showlocals --show-capture=all --capture=tee-sys -r aR --durations=25 \
  --junit-xml=reports/test-results/int/junit.xml \
  --json-report --json-report-file=reports/test-results/int/report.json --json-report-indent=2 \
  --html=reports/test-results/int/report.html --self-contained-html
"""

[tasks."test:scenario"]
description = "Scenario tests (slow, full arcs) → reports/test-results/scenario/"
run = """
mkdir -p reports/test-results/scenario
poetry run pytest tests/scenarios \
  -vv --tb=long --showlocals --show-capture=all --capture=tee-sys -r aR --durations=25 \
  --junit-xml=reports/test-results/scenario/junit.xml \
  --json-report --json-report-file=reports/test-results/scenario/report.json --json-report-indent=2 \
  --html=reports/test-results/scenario/report.html --self-contained-html
"""

[tasks."test:all"]
description = "All non-AI tests → reports/test-results/all/"
run = """
mkdir -p reports/test-results/all
poetry run pytest \
  --ignore=tests/unit/ai \
  -vv --tb=long --showlocals --show-capture=all --capture=tee-sys -r aR --durations=25 \
  --junit-xml=reports/test-results/all/junit.xml \
  --json-report --json-report-file=reports/test-results/all/report.json --json-report-indent=2 \
  --html=reports/test-results/all/report.html --self-contained-html
"""

[tasks."test:ai"]
description = "AI/narrative evaluation tests (slow) → reports/test-results/ai/"
run = """
mkdir -p reports/test-results/ai
poetry run pytest tests/unit/ai \
  -vv --tb=long --showlocals --show-capture=all --capture=tee-sys -r aR --durations=25 \
  --junit-xml=reports/test-results/ai/junit.xml \
  --json-report --json-report-file=reports/test-results/ai/report.json --json-report-indent=2 \
