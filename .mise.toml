mkdir -p results
poetry run python tools/parameter_analysis.py trace \
  --csv results/trace.csv \
  --json results/trace.json \
  --ticks ${usage_ticks}
"""

[tasks."sim:sweep"]
description = "Run parameter sweep analysis"
run = """
mkdir -p results
poetry run python tools/parameter_analysis.py sweep \
  --param economy.extraction_efficiency \
  --start 0.05 --end 0.50 --step 0.05 \
  --csv results/sweep.csv
"""

[tasks."sim:profile"]
description = "Profile simulation with cProfile"
usage = '''
arg "[ticks]" help="Number of ticks to profile" default="100"
arg "[scope]" help="Predefined scope name (default: detroit-tri-county)" default="detroit-tri-county"
'''
run = "poetry run python tools/profiler.py --ticks ${usage_ticks} --scope ${usage_scope}"

[tasks."sim:monte-carlo"]
description = "Monte Carlo uncertainty quantification"
usage = '''
arg "[samples]" help="Number of samples" default="100"
arg "[seed]" help="Random seed (optional)"
'''
run = """
mkdir -p results
poetry run python tools/monte_carlo.py \
  --samples ${usage_samples} \
  ${usage_seed:+--seed ${usage_seed}} \
  --csv results/monte_carlo.csv
"""

[tasks."sim:e2e-michigan"]
description = "Headless 520-tick Michigan + Canada e2e (spec-065); refreshes tests/baselines/michigan-e2e.json via --write-baseline"
run = "poetry run python -m babylon.engine.headless_runner --scope michigan-canada --ticks 520 --write-baseline tests/baselines/michigan-e2e.json"

[tasks."sim:e2e-bg"]
description = "Daemonize sim:e2e-michigan with pidfile + log under .sim-pids/ (watch via sim:status)"
run = '''
mkdir -p .sim-pids
if [ -f .sim-pids/e2e.pid ] && kill -0 "$(cat .sim-pids/e2e.pid)" 2>/dev/null; then
  echo "already running: PID $(cat .sim-pids/e2e.pid)"; exit 1
fi
nohup poetry run python -m babylon.engine.headless_runner --scope michigan-canada --ticks 520 \
  --write-baseline tests/baselines/michigan-e2e.json > .sim-pids/e2e.log 2>&1 &
echo $! > .sim-pids/e2e.pid
echo "started PID $(cat .sim-pids/e2e.pid) — log .sim-pids/e2e.log"
'''

[tasks."sim:status"]
description = "One-shot status SCOPED to the most-recently-writing session: tick/520, session bytes/tick, dialectics signals — plus a whole-DB accumulation line (spec-089 5.4: no cross-session avg artifact)"
run = '''
if [ -f .sim-pids/e2e.pid ] && kill -0 "$(cat .sim-pids/e2e.pid)" 2>/dev/null; then
  ps -o pid,pcpu,etime -p "$(cat .sim-pids/e2e.pid)" | tail -1
else
  echo "(no daemonized run; the tick/size numbers below are SCOPED to the most-recently-writing session)"
fi
# The one session that most recently committed a tick. All per-session
# lines key off this UUID so the readout can never divide the whole
# multi-session DB by one session's tick count (the spec-101 P1 artifact).
LAST=$(PGPASSWORD=test psql -h localhost -p 5433 -U test -d babylon_test -tAc \
  "SELECT session_id FROM tick_commit ORDER BY created_at_utc DESC LIMIT 1;" 2>/dev/null)
if [ -n "$LAST" ]; then
  PGPASSWORD=test psql -h localhost -p 5433 -U test -d babylon_test -tc "
  SELECT 'session ' || left('$LAST', 8) || ': tick ' || max(tick)
         || '/520 (' || round(100.0*max(tick)/520, 1) || '%), session '
         || pg_size_pretty((SELECT COALESCE(sum(pg_total_relation_size(c.oid)), 0)
              FROM pg_class c WHERE c.relname LIKE '%_p_' || replace('$LAST','-',''))::bigint)
         || ', ' || pg_size_pretty(((SELECT COALESCE(sum(pg_total_relation_size(c.oid)), 0)
              FROM pg_class c WHERE c.relname LIKE '%_p_' || replace('$LAST','-',''))
              / (max(tick)+1))::bigint) || '/tick (this session)'
  FROM tick_commit WHERE session_id = '$LAST';" 2>/dev/null || true
  PGPASSWORD=test psql -h localhost -p 5433 -U test -d babylon_test -tc "
  SELECT 'live counties: ' ||
         (SELECT count(*) FROM dynamic_consciousness_state
          WHERE session_id = '$LAST'
            AND tick=(SELECT max(tick) FROM dynamic_consciousness_state WHERE session_id = '$LAST')) ||
         ', contradiction_field rows (this session): ' ||
         (SELECT count(*) FROM contradiction_field WHERE session_id = '$LAST');" 2>/dev/null || true
  PGPASSWORD=test psql -h localhost -p 5433 -U test -d babylon_test -tc "
  SELECT 'max_tension t' || tick || ': ' || round(max(tension)::numeric, 4)
  FROM dynamic_relationship_state
  WHERE session_id = '$LAST'
    AND tick IN (SELECT DISTINCT tick FROM dynamic_relationship_state
                 WHERE session_id = '$LAST' ORDER BY tick DESC LIMIT 3)
  GROUP BY tick ORDER BY tick;" 2>/dev/null || true
else
  echo "(no committed sessions in babylon_test)"
fi
# Loudness: surface accumulation instead of laundering it into an average.
PGPASSWORD=test psql -h localhost -p 5433 -U test -d babylon_test -tc "
SELECT 'sessions holding rows: ' || count(DISTINCT session_id)
       || ' — db (ALL sessions) ' || pg_size_pretty(pg_database_size('babylon_test'))
       || ' (run: mise run sim:archive -- list)'
FROM tick_commit;" 2>/dev/null || true
PGPASSWORD=test psql -h localhost -p 5433 -U test -d babylon_test -tc "
SELECT '  ' || relname || ': ' || pg_size_pretty(pg_total_relation_size(relid)) || ', ' || n_live_tup || ' rows'
FROM pg_stat_user_tables
WHERE relname LIKE 'dynamic_%' OR relname IN ('boundary_flow_register','conservation_audit_log','contradiction_field')
ORDER BY pg_total_relation_size(relid) DESC LIMIT 6;" 2>/dev/null || true
'''

[tasks."sim:watch"]
description = "Live 30s refresh of sim:status"
run = "watch -n 30 mise run sim:status"

[tasks."sim:probe"]
description = "Single-county Postgres tick probe; use: mise run sim:probe -- --county 26163 --ticks 3"
run = "poetry run python tools/tick_probe.py"

[tasks."sim:archive"]
description = "Archive sessions to local Parquet + purge Postgres (spec-088); use: mise run sim:archive -- list | archive --all | archive --session <uuid>"
run = "poetry run python tools/archive_sessions.py"

[tasks."sim:archived"]
description = "Show the local archive root contents (one dir per archived session)"
run = '''
ROOT="${BABYLON_ARCHIVE_ROOT:-/media/user/data/babylon-archives}"
if [ -d "$ROOT" ]; then
  echo "archive root: $ROOT"
  du -sh "$ROOT"/*/ 2>/dev/null | sort -rh | head -25 || echo "(empty)"
else
  echo "archive root $ROOT does not exist yet (created on first sim:archive)"
fi
'''

