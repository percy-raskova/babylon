# -----------------------------------------------------------------------------
# Test report helpers
# -----------------------------------------------------------------------------

[tasks."test:q"]
description = "Quiet scoped pytest for the inner loop (kept cache => --lf works); use: mise run test:q -- <paths>"
run = "poetry run pytest -q --no-header -r fEX -o cache_dir=.pytest_cache/q"

[tasks."test:failed"]
description = "Re-run only the failures recorded by the last test:q run (no-op when all green)"
run = '''
code=0
poetry run pytest -q --no-header -r fEX -o cache_dir=.pytest_cache/q --lf --lfnf none || code=$?
if [ "$code" -eq 5 ]; then echo "(no failures recorded — nothing to re-run)"; exit 0; fi
exit "$code"
'''

[tasks."test:clean"]
description = "Wipe test artifacts: reports/, .pytest_cache, htmlcov, .coverage*, __pycache__ (idempotent)"
run = """
# Test reports + per-task subdirectories
rm -rf reports/test-results
# Pytest's own cache
rm -rf .pytest_cache
# Coverage HTML + state files (.coverage and .coverage.<host>.<pid>.<rand>)
rm -rf htmlcov
rm -f .coverage .coverage.*
# Bytecode caches across the project — but NOT inside .venv (preserves
# venv-compiled stdlib/dep bytecode so the next test run isn't slow)
find . -type d -name __pycache__ \
  -not -path './.venv/*' \
  -not -path './node_modules/*' \
  -not -path './src/frontend/node_modules/*' \
  -exec rm -rf {} + 2>/dev/null || true
# Recreate the reports root for next run
mkdir -p reports/test-results
echo "Cleaned: reports/test-results/, .pytest_cache/, htmlcov/, .coverage*, __pycache__/ (excluding .venv, node_modules)"
echo "Preserved: .hypothesis/ (counterexample DB), .mypy_cache, .ruff_cache (use 'mise run clean' for those)"
"""

[tasks."test:show"]
description = "Open the most recent HTML test report in the default browser"
run = """
report=$(ls -t reports/test-results/*/report.html 2>/dev/null | head -1)
if [ -z "$report" ]; then
  echo "No HTML report found. Run mise run test:unit (or another test:* task) first." >&2
  exit 1
fi
xdg-open "$report" 2>/dev/null || open "$report"
"""

[tasks."test:summary"]
description = "Print a one-screen text summary of the most recent JSON test report"
run = """
report=$(ls -t reports/test-results/*/report.json 2>/dev/null | head -1)
if [ -z "$report" ]; then
  echo "No JSON report found. Run mise run test:unit first." >&2
  exit 1
fi
poetry run python -c "
import json, sys
r = json.load(open('$report'))
s = r.get('summary', {})
print(f\\"Report:   $report\\")
print(f\\"Created:  {r.get('created', 'unknown')}\\")
print(f\\"Duration: {r.get('duration', 0):.2f}s\\")
print(f\\"Exitcode: {r.get('exitcode', '?')}\\")
print(f\\"Counts:   pass={s.get('passed', 0)}  fail={s.get('failed', 0)}  skip={s.get('skipped', 0)}  xfail={s.get('xfailed', 0)}  xpass={s.get('xpassed', 0)}  err={s.get('error', 0)}\\")
fails = [t for t in r.get('tests', []) if t.get('outcome') in ('failed', 'error')]
if fails:
    print(f'\\\\nFailures ({len(fails)}, showing up to 10):')
    for t in fails[:10]:
        print(f\\\"  {t['outcome']:7s} {t['nodeid']}\\\")
"
"""

