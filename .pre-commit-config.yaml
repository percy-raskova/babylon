# Pre-commit hooks for Babylon
# Install: uv run pre-commit install --hook-type commit-msg --hook-type pre-commit --hook-type pre-push
# Run manually: uv run pre-commit run --all-files

default_stages: [pre-commit]

repos:
  # ==========================================================================
  # RUFF - Linting and Formatting
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff (format)

  # ==========================================================================
  # MYPY - Type Checking
  # ==========================================================================
  - repo: local
    hooks:
      - id: mypy
        name: mypy (typecheck, CI parity)
        entry: uv run mypy src
        language: system
        pass_filenames: false
        files: '^(src/.*\.py|pyproject\.toml)$'

  # ==========================================================================
  # FAST TESTS - Run on every commit
  # ==========================================================================
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast push gate — NOT CI-predictive)
        entry: uv run pytest tests/unit/formulas tests/unit/engine -q --tb=no -m "not red_phase and not slow"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # COMPLEXITY + MAINTAINABILITY GATES - Catch quality regressions before CI
  # ==========================================================================
  - repo: local
    hooks:
      - id: import-boundaries
        name: import-linter (layer boundaries, program 14)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: radon-mi
        name: radon (maintainability index >= B)
        entry: >-
          bash -c 'set -euo pipefail; output="$(uv run radon mi src/babylon -s)";
          echo "$output"; if echo "$output" | grep -Eq " - [CDEF]"; then
          echo "radon: maintainability rank below B detected"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # SEMGREP - Architectural Pattern Enforcement
  # ==========================================================================
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.153.0
    hooks:
      - id: semgrep
        name: semgrep (patterns)
        args: [--config, .semgrep.yml, --severity, ERROR, --error, --quiet, src/]
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # FRONTEND - src/frontend (the cockpit, spec-110; THE frontend since the
  # spec-112 cutover deleted web/frontend)
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier (cockpit format)
        files: ^src/frontend/src/.*\.(ts|tsx|css)$
        # Version must track src/frontend/package.json's prettier (CI checks
        # with that one) — a mismatch makes this hook fight `npm run check`.
        additional_dependencies: ["prettier@3.9.5"]

  - repo: local
    hooks:
      - id: cockpit-typecheck
        name: tsc (cockpit typecheck)
        entry: bash -c 'cd src/frontend && npx tsc --noEmit'
        language: node
        pass_filenames: false
        files: ^src/frontend/src/.*\.(ts|tsx)$

      - id: cockpit-eslint
        name: eslint (cockpit lint)
        entry: bash -c 'cd src/frontend && npx eslint src/'
        language: node
        pass_filenames: false
        files: ^src/frontend/src/.*\.(ts|tsx)$

      - id: cockpit-vitest
        name: vitest (cockpit tests)
        entry: bash -c 'cd src/frontend && npx vitest run'
        language: node
        pass_filenames: false
        files: ^src/frontend/src/.*\.(ts|tsx)$
        stages: [pre-push]

  # ==========================================================================
  # COMMITIZEN - Conventional Commits
  # ==========================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.11.0
    hooks:
      - id: commitizen
        name: commitizen (commit message)
        stages: [commit-msg]

  # ==========================================================================
  # BASELINE CEREMONY - §6.5 Provenance & Ceremony (owner ruling 2026-07-20)
  # Commits touching tests/baselines/** must declare their ceremony with a
  # `Baselines: blessed(<slug>)` trailer. The commit-msg leg is best-effort
  # (an --amend or pathspec commit can slip past it, since it only inspects
  # the index at commit time). The pre-push leg below closes that gap
  # locally by re-running the CHECKER'S OWN --range MODE against the
  # upstream ref, mirroring the CI ceremony-gate job (which diffs the PR's
  # base..head) so a slipped amend is caught before it ever leaves the box —
  # not a substitute for the CI leg, which stays authoritative.
  # ==========================================================================
  - repo: local
    hooks:
      - id: baseline-ceremony
        name: baseline ceremony declaration (§6.5)
        entry: python3 tools/check_baseline_ceremony.py --commit-msg-file
        language: system
        always_run: true
        stages: [commit-msg]

      - id: baseline-ceremony-range
        name: baseline ceremony range check (§6.5, pre-push CI mirror)
        entry: >-
          bash -c 'set -euo pipefail;
          git fetch -q origin dev 2>/dev/null || true;
          base="$(git merge-base HEAD origin/dev 2>/dev/null || git merge-base HEAD dev 2>/dev/null || echo "")";
          if [ -z "$base" ]; then exit 0; fi;
          python3 tools/check_baseline_ceremony.py --range "${base}..HEAD"'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # GENERAL HYGIENE
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # tests/unit/tui/**/__snapshots__/**/*.raw: pytest-textual-snapshot
        # goldens are byte-exact comparison targets (Constitution III.12) —
        # Rich's SVG export legitimately emits a pure-whitespace @font-face
        # continuation line, and stripping it desyncs the golden from every
        # future live render (discovered Program 24 P2 WO-16: this hook
        # silently corrupted a freshly-regenerated state-page golden,
        # leaving an always-red test behind it). Every Lane-P snapshot WO
        # ships a golden under this same path shape.
        exclude: ^tests/unit/tui/.*__snapshots__/.*\.raw$
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom tags in GitHub Actions
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1024']
        # src/frontend/public/geo/*.topojson: vendored cartography (owner-approved
        # per-case 2026-07-11) — TIGER 2024 county/state/AIANNH meshes, simplified +
        # budgeted in public/geo/README.md, regenerable via tools/build_geo_assets.mjs;
        # served at runtime by Vite, so LFS pointers would break dev/deploy.
        # uv.lock: single-lock fork (ADR095 D3) — uv's lock format embeds wheel
        # hashes per-platform (301 resolved packages), landing ~1030 KB, just over
        # the 1024 KB gate; poetry.lock was ~808 KB for the same dependency set.
        # Generated + regenerated by `uv lock`, never hand-edited.
        exclude: ^tests/baselines/.*\.json$|^src/babylon/data/game/balkanization/seed_influences\.json$|^src/frontend/public/geo/.*\.topojson$|^uv\.lock$
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main, --branch, dev]

  # ==========================================================================
  # SECRETS - Gitleaks
  # ==========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ==========================================================================
  # DEPENDENCY LOCK CONSISTENCY
  # ==========================================================================
  - repo: local
    hooks:
      - id: uv-lock-consistency
        name: uv lock --check
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: '^(pyproject\.toml|uv\.lock)$'

  # ==========================================================================
  # YAML LINTING - Advanced YAML validation
  # ==========================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        name: yamllint (yaml lint)
        args: [-c, .yamllint.yaml]

  # ==========================================================================
  # DOCUMENTATION LINTING - RST and Markdown
  # ==========================================================================
  - repo: https://github.com/rstcheck/rstcheck
    rev: v6.2.5
    hooks:
      - id: rstcheck
        name: rstcheck (rst syntax)
        additional_dependencies:
          - rstcheck[sphinx,toml]
        args: [--config, pyproject.toml]

  - repo: https://github.com/PyCQA/doc8
    rev: v2.0.0
    hooks:
      - id: doc8
        name: doc8 (rst style)

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        name: markdownlint (md lint)
        args: [--config, .markdownlint.yaml]
        exclude: |
          (?x)^(
            \.specify/.*|
            specs/.*|
            \.agents/.*|
            CONSTITUTION\.md
          )$

  # ==========================================================================
  # WORKFLOW / SHELL / DOCKER LINTING
  # ==========================================================================
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: '\.sh$'

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        files: 'Dockerfile'
        # Same threshold as CI's hadolint job: warnings visible, errors block.
        args: [--failure-threshold, error]

  # ==========================================================================
  # GIT LFS - Pointer integrity (pre-push; catches accidentally-materialized
  # LFS-tracked blobs before they hit the remote)
  # ==========================================================================
  - repo: local
    hooks:
      - id: lfs-pointer-check
        name: git-lfs pointer integrity
        entry: git lfs fsck --pointers
        language: system
        pass_filenames: false
        stages: [pre-push]
