# Pre-commit hooks for Babylon
# Install: poetry run pre-commit install --hook-type commit-msg --hook-type pre-commit --hook-type pre-push
# Run manually: poetry run pre-commit run --all-files

repos:
  # ==========================================================================
  # RUFF - Linting and Formatting
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff (format)

  # ==========================================================================
  # MYPY - Type Checking
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        name: mypy (typecheck)
        additional_dependencies:
          - pydantic>=2.0
          - types-requests
          - types-tqdm
          - types-networkx
          - types-PyYAML
          - types-jsonschema
          - types-ratelimit
          - types-docutils
          - sqlalchemy>=2.0
          - chromadb>=1.0
          - python-dotenv>=1.0
          - xgi>=0.10
          - pandas>=2.0
          - scipy>=1.11
          - openpyxl>=3.1
          - aiohttp>=3.0
          - backoff>=2.0
          - ratelimit>=2.0
          - openai>=2.0
          - sphinx>=7
          - pyproj>=3.5
          - shapely>=2.0
          - polars>=1.0
          - psycopg>=3.0
          - psycopg-pool>=3.0
          - django>=5.0,<6.0
          - djangorestframework>=3.15
          - django-cors-headers>=4.0
          - django-stubs[compatible-mypy]>=5.0
          - djangorestframework-stubs[compatible-mypy]>=3.15
        args: [--config-file=pyproject.toml]
        exclude: ^tests/|^examples/|^src/babylon/rag/|^src/babylon/__main__.py|^src/babylon/metrics/|^tools/|^assets/music/|^specs/

  # ==========================================================================
  # FAST TESTS - Run on every commit
  # ==========================================================================
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast tests)
        entry: poetry run pytest tests/unit/formulas tests/unit/engine -q --tb=no -m "not red_phase and not slow"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # COMPLEXITY + MAINTAINABILITY GATES - Catch quality regressions before CI
  # ==========================================================================
  - repo: local
    hooks:
      - id: complexity-check
        name: complexity (CC > 15)
        entry: poetry run ruff check src/ --select=C90 --no-fix
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: xenon-complexity
        name: xenon (module/function complexity budget)
        entry: poetry run xenon --max-absolute B --max-modules A --max-average A src/babylon
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: radon-mi
        name: radon (maintainability index >= B)
        entry: >-
          bash -c 'set -euo pipefail; output="$(poetry run radon mi src/babylon -s)";
          echo "$output"; if echo "$output" | grep -Eq " - [CDEF]"; then
          echo "radon: maintainability rank below B detected"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: radon-metrics
        name: radon (raw/halstead metrics report)
        entry: bash -c 'poetry run radon raw src/babylon -s && poetry run radon hal src/babylon -s'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # SEMGREP - Architectural Pattern Enforcement
  # ==========================================================================
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.153.0
    hooks:
      - id: semgrep
        name: semgrep (patterns)
        args: [--config, .semgrep.yml, --severity, ERROR, --error, --quiet, src/]
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ==========================================================================
  # FRONTEND - TypeScript/React Linting, Formatting, and Type Checking
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier (frontend format)
        files: ^web/frontend/src/.*\.(ts|tsx|css)$

  - repo: local
    hooks:
      - id: frontend-typecheck
        name: tsc (frontend typecheck)
        entry: bash -c 'cd web/frontend && npx tsc --noEmit'
        language: node
        pass_filenames: false
        files: ^web/frontend/src/.*\.(ts|tsx)$

      - id: frontend-eslint
        name: eslint (frontend lint)
        entry: bash -c 'cd web/frontend && npx eslint src/'
        language: node
        pass_filenames: false
        files: ^web/frontend/src/.*\.(ts|tsx)$

      - id: frontend-vitest
        name: vitest (frontend tests)
        entry: bash -c 'cd web/frontend && npx vitest run'
        language: node
        pass_filenames: false
        files: ^web/frontend/src/.*\.(ts|tsx)$
        stages: [pre-push]

  # ==========================================================================
  # COMMITIZEN - Conventional Commits
  # ==========================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.11.0
    hooks:
      - id: commitizen
        name: commitizen (commit message)
        stages: [commit-msg]

  # ==========================================================================
  # GENERAL HYGIENE
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom tags in GitHub Actions
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  # ==========================================================================
  # YAML LINTING - Advanced YAML validation
  # ==========================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        name: yamllint (yaml lint)
        args: [-c, .yamllint.yaml]

  # ==========================================================================
  # DOCUMENTATION LINTING - RST and Markdown
  # ==========================================================================
  - repo: https://github.com/rstcheck/rstcheck
    rev: v6.2.5
    hooks:
      - id: rstcheck
        name: rstcheck (rst syntax)
        additional_dependencies:
          - rstcheck[sphinx,toml]
        args: [--config, pyproject.toml]

  - repo: https://github.com/PyCQA/doc8
    rev: v2.0.0
    hooks:
      - id: doc8
        name: doc8 (rst style)

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        name: markdownlint (md lint)
        args: [--config, .markdownlint.yaml]
        exclude: |
          (?x)^(
            \.specify/.*|
            specs/.*|
            \.agents/.*
          )$

  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.22  # Pinned: plugins not yet compatible with 1.0.0
    hooks:
      - id: mdformat
        name: mdformat (md format)
        additional_dependencies:
          - mdformat-gfm
          - mdformat-frontmatter
          - mdformat-footnote
        exclude: |
          (?x)^(
            ai-docs/.*|
            thoughts/.*|
            specs/.*|
            \.specify/.*|
            CHANGELOG\.md|
            CLAUDE\.md|
            CONTRIBUTORS\.md|
            \.venv/.*|
            build/.*|
            docs/_build/.*|
            docs/api/.*|
            reports/.*|
            \.claude/.*|
            \.github/project/.*|
            docs/concepts/vibe-coding/.*|
            src/babylon/data/corpus/.*|
            \.agents/.*
          )$
