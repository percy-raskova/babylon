# =============================================================================
# NAICS to Marxian Department Mapping
# =============================================================================
#
# Maps NAICS codes to Marxian reproduction schema departments by END-USE
# DESTINATION, not production process.
#
# Departments:
#   I   = Means of Production (consumed productively by capital)
#   IIa = Necessary Consumption (wage goods for proletariat reproduction)
#   IIb = Luxury Consumption (surplus value sink, bourgeois consumption)
#   III = Social Reproduction (produces labor power itself)
#
# Logic: NAICS classifies by process; we classify by buyer/destination.
# A commodity enters Dept I if capital buys it for production, Dept IIa if
# workers buy it to survive, Dept IIb if bourgeoisie consumes it from surplus.
#
# Split coefficients: When a NAICS sector produces for multiple destinations,
# weights sum to 1.0. Weights are initial estimates; calibrate against BEA
# Use Tables for final demand by sector.
#
# Sources:
#   - NotebookLM synthesis of Marx Vol II reproduction schemas
#   - Fortunati (1995) on reproductive labor
#   - BLS NAICS 2022 structure
# =============================================================================

version: "1.0"
notes:
  - "Split coefficients are initial estimates. Calibrate against BEA Use Tables."
  - "Government (NAICS 92) excluded - outside M-C-M' circuit."
  - "Unpaid domestic labor not captured here; separate metric tensor calculation."

# =============================================================================
# DEFAULT MAPPINGS BY 2-DIGIT SECTOR
# =============================================================================
# These apply when no more specific code is matched. Lookup proceeds from
# most specific (6-digit) to least specific (2-digit).

defaults:
  # -------------------------------------------------------------------------
  # DEPARTMENT I: Means of Production
  # -------------------------------------------------------------------------
  # Commodities consumed productively by capital to create new value.
  # These re-enter the production cycle as constant capital (c).

  "11":  # Agriculture, Forestry, Fishing and Hunting
    dept_I: 0.7    # Raw materials for industry
    dept_IIa: 0.3  # Food directly consumed by workers

  "21":  # Mining, Quarrying, and Oil and Gas Extraction
    dept_I: 1.0    # Pure means of production

  "22":  # Utilities
    dept_I: 0.6    # Industrial power consumption
    dept_IIa: 0.4  # Residential utilities (worker reproduction)

  "23":  # Construction
    dept_I: 0.7    # Industrial/commercial infrastructure
    dept_IIa: 0.25 # Workforce housing
    dept_IIb: 0.05 # Luxury residential

  # -------------------------------------------------------------------------
  # MANUFACTURING (31-33): Mixed by subsector
  # -------------------------------------------------------------------------
  # Manufacturing is the most heterogeneous sector. Default to Dept I
  # (most manufacturing output is intermediate goods), with overrides below.

  "31":  # Food, Beverage, Textile, Apparel
    dept_IIa: 0.85 # Wage goods (food, basic clothing)
    dept_IIb: 0.15 # Premium food/beverages, luxury apparel

  "32":  # Wood, Paper, Printing, Petroleum, Chemicals, Plastics
    dept_I: 0.8    # Intermediate industrial inputs
    dept_IIa: 0.15 # Consumer goods (paper products, plastics)
    dept_IIb: 0.05 # Luxury chemicals (perfumes, cosmetics)

  "33":  # Metals, Machinery, Electronics, Transport Equipment
    dept_I: 0.7    # Capital goods, machinery, equipment
    dept_IIa: 0.2  # Consumer durables (appliances, basic vehicles)
    dept_IIb: 0.1  # Luxury vehicles, electronics

  # -------------------------------------------------------------------------
  # CIRCULATION: Wholesale, Retail, Transport, Warehousing
  # -------------------------------------------------------------------------
  # Circulation doesn't create value but realizes it. Map by what they move.

  "42":  # Wholesale Trade
    dept_I: 0.7    # Industrial distribution
    dept_IIa: 0.25 # Consumer goods distribution
    dept_IIb: 0.05 # Luxury goods distribution

  "44":  # Retail Trade (part 1)
    dept_IIa: 0.75 # Consumer necessities
    dept_IIb: 0.25 # Non-essential retail

  "45":  # Retail Trade (part 2)
    dept_IIa: 0.6  # Consumer goods
    dept_IIb: 0.4  # More discretionary

  "48":  # Transportation
    dept_I: 0.6    # Freight movement
    dept_IIa: 0.35 # Worker commuting
    dept_IIb: 0.05 # Luxury travel

  "49":  # Warehousing and Postal
    dept_I: 0.7    # Industrial logistics
    dept_IIa: 0.3  # Consumer package delivery

  # -------------------------------------------------------------------------
  # INFORMATION AND FINANCE: Circulation and Overhead
  # -------------------------------------------------------------------------

  "51":  # Information
    dept_I: 0.4    # Business software, data services
    dept_IIa: 0.4  # Consumer media, communications
    dept_IIb: 0.2  # Premium content, luxury media

  "52":  # Finance and Insurance
    dept_I: 0.3    # Business finance, commercial lending
    dept_IIa: 0.4  # Consumer banking, basic insurance
    dept_IIb: 0.3  # Wealth management, luxury financial services

  "53":  # Real Estate and Rental
    dept_I: 0.3    # Commercial/industrial property
    dept_IIa: 0.5  # Workforce housing
    dept_IIb: 0.2  # Luxury residential, vacation properties

  # -------------------------------------------------------------------------
  # PROFESSIONAL AND BUSINESS SERVICES
  # -------------------------------------------------------------------------

  "54":  # Professional, Scientific, Technical Services
    dept_I: 0.7    # Business services (legal, accounting, consulting)
    dept_IIa: 0.2  # Consumer legal, tax prep
    dept_IIb: 0.1  # Luxury professional services

  "55":  # Management of Companies
    dept_I: 1.0    # Pure overhead capital

  "56":  # Administrative, Support, Waste Management
    dept_I: 0.6    # Business support services
    dept_IIa: 0.4  # Consumer services (travel agencies, etc.)

  # -------------------------------------------------------------------------
  # EDUCATION AND HEALTHCARE
  # -------------------------------------------------------------------------

  "61":  # Educational Services
    dept_III: 1.0  # Produces labor power (training future workers)

  "62":  # Health Care and Social Assistance
    dept_IIa: 0.7  # Basic healthcare (worker maintenance)
    dept_IIb: 0.2  # Elective/luxury healthcare
    dept_III: 0.1  # Childcare component (see 6244 override)

  # -------------------------------------------------------------------------
  # LEISURE AND HOSPITALITY: Largely Luxury
  # -------------------------------------------------------------------------

  "71":  # Arts, Entertainment, Recreation
    dept_IIa: 0.3  # Mass entertainment, basic recreation
    dept_IIb: 0.7  # Luxury leisure

  "72":  # Accommodation and Food Services
    dept_IIa: 0.6  # Fast food, budget accommodation (worker sustenance)
    dept_IIb: 0.4  # Fine dining, luxury hotels

  # -------------------------------------------------------------------------
  # OTHER SERVICES
  # -------------------------------------------------------------------------

  "81":  # Other Services (except Public Administration)
    dept_IIa: 0.5  # Basic repair, personal services
    dept_IIb: 0.3  # Luxury personal services
    dept_III: 0.2  # Private households (see 814 override)

