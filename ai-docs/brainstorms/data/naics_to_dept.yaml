# =============================================================================
# EXCLUDED SECTORS
# =============================================================================
# These are outside the M-C-M' circuit or require special handling.

excluded:
  "92":    # Public Administration
    reason: "State sector outside capitalist reproduction circuit"
    notes: "Could map to IIa if modeling state workers' reproduction needs"

  "99":    # Unclassified
    reason: "No meaningful mapping possible"

# =============================================================================
# VALIDATION RULES
# =============================================================================
# For DepartmentMapper implementation

validation:
  # Weights must sum to 1.0 (within tolerance)
  weight_sum_tolerance: 0.001

  # Valid department keys
  valid_departments:
    - dept_I
    - dept_IIa
    - dept_IIb
    - dept_III

  # Lookup priority: most specific first
  lookup_order:
    - 6  # 6-digit NAICS (e.g., 336111)
    - 5  # 5-digit NAICS (e.g., 33611)
    - 4  # 4-digit NAICS (e.g., 3361)
    - 3  # 3-digit NAICS (e.g., 336)
    - 2  # 2-digit sector (e.g., 33)
