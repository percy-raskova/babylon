ADR039_spec_061_real_backend_wireup:
  status: "accepted"
  date: "2026-05-12"
  title: "Spec 061: Real Backend Wire-Up — cutover, model pin, hybrid retry, custom DRF handler"
  context: |
    The Babylon v2 frontend was running on hardcoded fixture data
    imported from `web/frontend/src/fixtures/v2-mock-data.ts`. The
    backend's MockEngineBridge wrote per-session snapshot blobs into
    `game_session.snapshot_json`, parallel to (and incompatible with)
    the real EngineBridge's normalized snapshot tables. The
    `document_chunk` pgvector store had a DDL/code mismatch that
    raised `UndefinedColumn` on every ingest. The Django app's
    `GameConfig.ready()` swallowed engine-init exceptions silently.
    Pre-existing fixture-era game_session rows blocked a clean
    cutover.

  decision: |
    Four architectural decisions captured by this spec:

    1. **Cutover migration (FR-033)**: pre-spec-061 sessions are not
       migrated forward. Migration 0007_purge_fixture_sessions executes
       `DELETE FROM game_session;` cascading via FK to every
       session-scoped table. There is no partial-cutover recovery path.
    2. **Embedding model pin (FR-001, Constitution III.6)**:
       `sentence-transformers/all-mpnet-base-v2` is pinned to commit
       SHA `e8c3b32edf5434bc2275fc9bab85f82640a19130` (768-dim).
       Replaces the 1536-dim OpenAI-era default that caused the
       pgvector mismatch.
    3. **Hybrid retry-then-exit boot (FR-006, FR-007)**: three
       in-process retries (1s, 2s) inside `GameConfig._initialize_engine_with_retry`
       handle transient DB blips; on exhaustion `sys.exit(1)` so
       systemd's exponential `RestartSec`/`RestartSteps` backoff takes
       over for longer-timescale recovery (research R3 + R4).
    4. **DRF 404 obscurity via custom EXCEPTION_HANDLER (FR-009, R5)**:
       `health_obscuring_exception_handler` catches
       `NotAuthenticated`/`PermissionDenied` raised by `HealthDetailView`
       and returns a standard DRF 404 body. Avoids the DRF issue #7529
       footgun (where `Http404` from `has_permission()` bypasses the
       JSON renderer).

  rationale:
    cutover_purge: |
      The fixture-era and real-engine snapshot shapes are architecturally
      orthogonal. An in-place migrator would have to interpret each
      mock's snapshot_json blob, infer the spec 037 normalized
      equivalent, and reconcile inconsistencies — an effectively
      infinite tail of edge cases for data that was always
      placeholder. A clean purge is the boundary that closes the
      mock era.
    model_pin: |
      Constitution III.6 forbids floating-revision model references.
      `all-mpnet-base-v2` won over BGE-base-en-v1.5 and E5-base-v2
      because it requires no query-time prefix discipline, has 36M
      monthly downloads (operational maturity), and ships under
      Apache 2.0 with no provenance riders. The 768-dim contract
      matches the existing `embedding vector(768)` column DDL.
    hybrid_retry: |
      Pure in-process retry deadlocks on persistent outages requiring
      longer cool-down than the in-process budget. Pure systemd
      retry pays full restart latency on every transient sub-second
      blip. Two layers, two timescales: in-process for fast recovery,
      systemd for persistent failures.
    custom_exception_handler: |
      The initial draft used `IsStaffOrHide(BasePermission)` raising
      `NotFound` from `has_permission()`. Research surfaced DRF issue
      #7529: `BrowsableAPIRenderer` re-checks permissions with a
      narrower `APIException` catch that bypasses the JSON renderer
      when `Http404` is raised, producing a Django default HTML 404
      page. The exception-handler approach intercepts AFTER permission
      resolution, scopes the remap to `HealthDetailView` only, and
      preserves DRF's standard 401/403 behavior on every other
      endpoint.

  consequences:
    positive:
      - "Fixture and real-engine paths are no longer architecturally entangled — every snapshot from a post-061 session is structurally the same shape that the engine produces."
      - "Boot failures are loud: silent except-Exception swallow gone."
      - "DB-unreachability mid-session surfaces as HTTP 503 with a uniform error body instead of a Django 500 stack trace."
      - "76 new integration tests cover the cutover, atomicity, immutability, boot retry, mid-session 503, health detail obscurity, dimension preflight, event/org/territory/edge serialization, and unsupported-verbs filter."
      - "Embedding store is finally consistent (DDL and code agree on column names)."
    negative:
      - "Fixture-era sessions cannot be recovered. Players who had pre-061 sessions must restart."
      - "First-deploy adds ~440MB of sentence-transformers/torch dependencies."
      - "Mock-bridge tests deleted; coverage of mock-specific edge cases evaporates (intentional — the code under test no longer exists)."
      - "`web/frontend/src/fixtures/v2-mock-data.ts` is retained as a placeholder/verb-target catalog; full deletion deferred to a follow-up spec that replaces verb-target resolution with engine-sourced endpoints."

  follow_up_specs:
    - "T091 deeper inspector queries (query_org_recent_actions, query_edge_history, XGI community membership)"
    - "T070 get_org_status endpoint with full detail"
    - "T085 territory consciousness/solidarity/wealth derivation in the engine itself (currently bridge derives defaults)"
    - "Investigate/Move/Negotiate verb handlers (currently in UNSUPPORTED_VERBS)"
    - "ResultsPage tensor-diff panel (dropped from T102)"
    - "Supervisor → systemd cutover for Celery deployment topology"

