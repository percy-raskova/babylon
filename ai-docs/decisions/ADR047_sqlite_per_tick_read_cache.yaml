    data_model: "specs/069-sqlite-cache-optimization/data-model.md"
    cache_contract: "specs/069-sqlite-cache-optimization/contracts/reference_data_cache_contract.md"
    instrumentation_contract: "specs/069-sqlite-cache-optimization/contracts/instrumentation_contract.md"
    quickstart: "specs/069-sqlite-cache-optimization/quickstart.md"
    tasks: "specs/069-sqlite-cache-optimization/tasks.md"
    related_adrs:
