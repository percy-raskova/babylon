# Imperial Rent Calculation Specification
# Emmanuel-Amin Unequal Exchange Framework Implementation
#
# Context: Imperial rent (Phi) measures the structural subsidy of imperialism -
# the differential between First World wages and Third World reproduction costs.

meta:
  version: "1.0.0"
  created: "2026-01-29"
  updated: "2026-01-29"
  purpose: "Define the imperial rent calculation for Marxian value tensors"
  status: "COMPLETE - Simple Baseline Implementation"
  problem_statement: |
    The Marxian value tensor (ValueTensor4x3) provides county-level economic
    composition (c, v, s by department), but does not directly measure the
    imperial rent that defines the core-periphery relationship.

    Imperial rent = the systematic transfer of value from periphery to core
    that enables "super-wages" for core workers (labor aristocracy premium).

# =============================================================================
# THEORETICAL FOUNDATION (Emmanuel-Amin Framework)
# =============================================================================

theoretical_foundation:

  summary: |
    Imperial rent is NOT measured against an abstract biological minimum.
    It is measured against what it costs to reproduce a worker in the
    global periphery (Third World). The differential represents value
    transferred from periphery to core through unequal exchange.

  framework: "Emmanuel-Amin Unequal Exchange"

  key_texts:
    - "Emmanuel, A. (1972). Unequal Exchange"
    - "Amin, S. (1974). Accumulation on a World Scale"
    - "Cope, Z. (2012). Divided World Divided Class"

  core_insight: |
    First World wages vastly exceed peripheral reproduction costs.
    The differential is imperial rent - value extracted through unequal
    exchange. This rent is distributed across the entire value chain:
    - Peripheral bourgeoisie (factory owners, landlords)
    - Intermediary layers (logistics, finance, compradors)
    - Core bourgeoisie (corporate profits, dividends)
    - Core workers (labor aristocracy premium / super-wages)

  formula:
    simple_baseline: "Phi = W_actual - P_periphery"
    definition:
      Phi: "Imperial rent (gross differential)"
      W_actual: "Total variable capital (wages) in core county"
      P_periphery: "Cost to reproduce a worker in periphery (~$2000/year)"

  value_chain_reality: |
    IMPORTANT: The simple baseline OVERSTATES individual worker subsidy.
    The gross differential flows through multiple extraction layers before
    reaching core workers. Future implementations will model:

    Third World Worker (baseline: ~$3k/year)
           ↓
    Peripheral Bourgeoisie (extracts ~15-20%)
           ↓
    Intermediary Layers (extracts ~20-30%)
           ↓
    Core Bourgeoisie (extracts ~35-45%)
           ↓
    First World Worker (receives residual ~15-25%)

    Future formula: Phi_worker = (W_actual - P_periphery) × alpha
    Where alpha ≈ 0.20 (worker residual coefficient)

# =============================================================================
# CURRENT IMPLEMENTATION (Simple Baseline)
# =============================================================================

implementation:

  status: "COMPLETE"
  approach: "Simple baseline with documented limitations and extensibility path"

  files:
    reproduction_module:
      path: "src/babylon/economics/reproduction.py"
      classes:
        - name: "PeripheryReproductionBasket"
          description: "Configuration for peripheral reproduction costs (~$2000/year)"
          fields:
            - "annual_food_cost: 800.0  # ~$2.20/day"
            - "annual_shelter_cost: 600.0"
            - "annual_clothing_cost: 100.0"
            - "annual_healthcare_cost: 200.0"
            - "annual_other_cost: 300.0"
          computed_fields:
            - "annual_total: 2000.0  # Sum of components"

        - name: "ImperialRentCalculator"
          description: "Service that calculates Phi = W_actual - P_periphery"
          methods:
            - "calculate_imperial_rent(core_wages, fips_code, year) -> float"
            - "periphery_baseline property -> Currency"

        - name: "ImperialRentResult"
          description: "Result wrapper with tensor + imperial rent metrics"
          fields:
            - "tensor: ValueTensor4x3"
            - "periphery_baseline: Currency"
            - "core_wages: Currency"
            - "imperial_rent: float  # Can be negative for degenerate cases"
          computed_fields:
            - "wage_multiple: core_wages / periphery_baseline"
            - "imperial_rent_ratio: imperial_rent / core_wages"

    hydrator_integration:
      path: "src/babylon/economics/hydrator.py"
      changes:
        - "Added rent_calculator param to __init__"
        - "Added hydrate_with_rent() method returning ImperialRentResult"
        - "Original hydrate() unchanged (returns pure tensor)"

    tensor_extension:
      path: "src/babylon/economics/tensor.py"
      changes:
        - "Added total_v computed property for aggregate wages"

    configuration:
      path: "src/babylon/economics/data/periphery_basket.yaml"
      description: "YAML configuration with theoretical context and roadmap comments"

  exports:
    module: "babylon.economics"
    new_exports:
      - "PeripheryReproductionBasket"
      - "ImperialRentCalculator"
      - "ImperialRentResult"

# =============================================================================
# TEST COVERAGE
# =============================================================================

test_coverage:

  file: "tests/integration/economics/test_imperial_rent.py"

  test_classes:
    TestImperialRentGlobalContext:
      description: "US counties have positive imperial rent (Phi > 0)"
      tests:
        - "test_wayne_county_imperial_rent_positive"
        - "test_oakland_county_imperial_rent_positive"
      assertion: "All US workers paid above periphery baseline"

    TestImperialRentStratification:
      description: "Internal stratification within core"
      tests:
        - "test_affluent_suburb_higher_wage_multiple"
        - "test_both_counties_have_high_imperial_rent_ratio"
      assertion: "Both counties have >99% imperial rent ratio"

    TestImperialRentResult:
      description: "Computed fields work correctly"
      tests:
        - "test_wage_multiple_calculation"
        - "test_imperial_rent_ratio_calculation"
      assertion: "wage_multiple = W/P, ratio = Phi/W"

    TestImperialRentEdgeCases:
      description: "Edge cases handled correctly"
      tests:
        - "test_zero_wages_returns_zero_rent"
        - "test_tensor_preserved_in_result"
      assertion: "Degenerate cases return negative rent, tensor preserved"

  fixtures:
    file: "tests/integration/economics/conftest.py"
    new_fixtures:
      - "periphery_basket: Default basket (~$2000/year)"
      - "rent_calculator: Calculator with default basket"
      - "hydrator_with_rent: Hydrator configured for imperial rent"

  total_tests: 8
  pass_rate: "100%"

