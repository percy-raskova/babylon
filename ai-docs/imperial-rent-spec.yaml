# =============================================================================
# INTEGRATION WITH EXISTING SYSTEMS
# =============================================================================

integration:

  marxian_hydrator:
    relationship: "ImperialRentCalculator is optional dependency"
    pattern: |
      # Pure tensor (economic primitive)
      tensor = hydrator.hydrate(fips, year)

      # Tensor + imperial rent (derived corollary)
      result = hydrator.hydrate_with_rent(fips, year)

  imperial_circuit:
    reference: "ai-docs/epochs/epoch1/imperial-circuit.yaml"
    connection: |
      The imperial rent calculation provides the QUANTITATIVE measure
      for the qualitative model in imperial-circuit.yaml:
      - P_w (Periphery Worker) receives wages ≈ P_periphery
      - C_w (Core Worker) receives wages >> P_periphery
      - The differential is imperial rent, distributed via TRIBUTE edges

  consciousness_drift:
    formula: "dPsi/dt = k(1 - W/V) - lambda*Psi"
    connection: |
      Imperial rent explains WHY W > V for core workers:
      - W_actual includes imperial rent component
      - V_produced is local value only
      - W > V → consciousness decays (labor aristocracy effect)

# =============================================================================
# MANTRA
# =============================================================================

mantra: |
  "Even the 'poorest' American worker receives wages vastly exceeding
  what it costs to reproduce a worker in the global periphery.
  This is the structural subsidy of imperialism."
