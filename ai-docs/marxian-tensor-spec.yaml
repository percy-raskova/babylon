# Marxian Value Tensor Specification
# Machine-readable spec for the reproduction schema transformation layer
# Transforms QCEW employment/wage data into 4x3 Marxian value tensors

meta:
  version: "1.1.0"
  created: "2026-01-27"
  updated: "2026-01-28"
  purpose: "Document the Marxian tensor infrastructure for transforming QCEW data into reproduction schema tensors"
  principle: "Pure transformation: QCEW data in, ValueTensor4x3 out"
  status: "IMPLEMENTED & CALIBRATED (124 tests passing)"
  location: "src/babylon/economics/"
  tests: "tests/unit/economics/, tests/integration/economics/, tests/integration/tensors/"
  test_count: 124
  calibration_date: "2026-01-28"
  calibration_source: "ai-docs/brainstorms/bea2ratio.md"
  related_docs:
    - "ai-docs/formulas-spec.yaml - Mathematical formulas"
    - "ai-docs/architecture.yaml - System architecture"
    - "ai-docs/database-spec.yaml - SQLite schema"
    - "ai-docs/brainstorms/bea2ratio.md - BEA/CEX calibration framework"

# =============================================================================
# THEORETICAL FOUNDATION
# =============================================================================

theoretical_foundation:
  name: "Marxian Reproduction Schema"
  source: "Capital, Volume II - The Process of Circulation of Capital"
  principle: |
    Marx's reproduction schema models the economy as departments producing
    different categories of output based on END-USE DESTINATION (not production
    process). This enables analysis of class structure through the circuit of
    capital: M-C-M' (money-commodity-money').

  value_decomposition:
    description: |
      Every commodity's value decomposes into three parts:
      c + v + s = Total Value
    components:
      c:
        name: "Constant Capital"
        symbol: "c"
        meaning: "Dead labor: value transferred from machinery, raw materials"
        in_tensor: "Derived from BEA c/v ratios or YAML defaults"
      v:
        name: "Variable Capital"
        symbol: "v"
        meaning: "Living labor: wages paid to workers"
        in_tensor: "Direct from QCEW wage data"
      s:
        name: "Surplus Value"
        symbol: "s"
        meaning: "Unpaid labor: value extracted from workers beyond wages"
        in_tensor: "Derived from BEA s/v ratios or YAML defaults"

  departments:
    I:
      name: "Means of Production"
      purpose: "Output consumed productively by capital (machines, factories, raw materials)"
      examples: ["Mining (21)", "Industrial Machinery (3332)", "Semiconductors (3344)"]
      marxian_circuit: "Inputs to M-C...P...C'-M' for other departments"

    IIa:
      name: "Necessary Consumption"
      purpose: "Wage goods for proletariat reproduction (food, basic clothing, utilities)"
      examples: ["Grocery Stores (4451)", "Fast Food (722513)", "Basic Healthcare (621)"]
      marxian_circuit: "Reproduces labor power (variable capital regeneration)"

    IIb:
      name: "Luxury Consumption"
      purpose: "Surplus value sink, bourgeois consumption, status goods"
      examples: ["Jewelry Stores (44831)", "Fine Dining (722511)", "Golf Courses (71391)"]
      marxian_circuit: "Absorbs surplus value without expanding reproduction"

    III:
      name: "Social Reproduction"
      purpose: "Produces labor power itself (care work, education, domestic labor)"
      examples: ["Child Care (6244)", "Private Households (814)", "K-12 Schools (6111)"]
      marxian_circuit: "Maintains/creates workers outside commodity exchange"
      key_insight: |
        Department III is uniquely labor-intensive (low c/v = 0.5) and has
        suppressed surplus rates (s/v = 0.7) reflecting the undervaluation
        of care work in capitalist society.

  reproduction_conditions:
    simple_reproduction: "I(c+v+s) = Ic + IIa.c + IIb.c + III.c"
    expanded_reproduction: "I(v+s) > IIa.c + IIb.c + III.c (surplus for accumulation)"
    key_insight: |
      These equations express constraints on balanced economic reproduction.
      Violations indicate crisis tendencies or unsustainable accumulation.

# =============================================================================
# PACKAGE STRUCTURE
# =============================================================================

package_structure:
  root: "src/babylon/economics/"
  files:
    __init__.py:
      purpose: "Package exports"
      exports: ["DepartmentRow", "ValueTensor4x3", "MarxianHydrator", "DepartmentMapper", "Department"]

    tensor.py:
      purpose: "Pydantic models for 4x3 value tensors"
      classes:
        - "DepartmentRow"
        - "ValueTensor4x3"
      pattern: "Frozen immutable models with computed fields"

    hydrator.py:
      purpose: "Pure transformation service"
      classes:
        - "MarxianHydrator"
      pattern: "Dependency injection via protocols"

    department_mapper.py:
      purpose: "NAICS to Department classification"
      classes:
        - "Department (Enum)"
        - "DepartmentAllocation (frozen dataclass)"
        - "DefaultRatios (frozen dataclass)"
        - "DepartmentMapper"
      pattern: "Hierarchical lookup with YAML configuration"

    adapters.py:
      purpose: "Data source protocols for dependency injection"
      protocols:
        - "QCEWDataSource"
        - "BEADataSource"
      implementations:
        - "SQLAlchemyQCEWSource"
        - "SQLAlchemyBEASource"

    data/naics_to_dept.yaml:
      purpose: "NAICS to Department mapping configuration"
      sections:
        - "defaults: 18 two-digit sector allocations (BEA/CEX calibrated)"
        - "overrides: 60+ specific industry allocations"
        - "excluded: Government (NAICS 92)"
        - "default_ratios: Per-department c/v and s/v fallbacks (BEA calibrated)"
        - "sector_ratios: 2-digit NAICS sector-level ratios (NEW in v1.1.0)"

# =============================================================================
# CORE MODELS
# =============================================================================

models:

  DepartmentRow:
    location: "src/babylon/economics/tensor.py"
    description: "Value composition for a single Marxian department"
    frozen: true
    fields:
      c:
        type: "Currency"
        description: "Constant capital (dead labor: machinery, raw materials)"
        constraint: "Non-negative"
      v:
        type: "Currency"
        description: "Variable capital (living labor: wages)"
        constraint: "Non-negative"
      s:
        type: "Currency"
        description: "Surplus value (unpaid labor)"
        constraint: "Non-negative"
    computed_fields:
      total_value:
        formula: "c + v + s"
        type: "Currency"
        description: "Total commodity value"
      organic_composition:
        formula: "c / v"
        type: "float"
        description: |
          Marx's measure of capital intensity (OCC). Higher values indicate
          more mechanization. Returns inf if v=0.
      exploitation_rate:
        formula: "s / v"
        type: "float"
        description: |
          Rate of surplus extraction. A rate of 1.0 means workers spend
          equal time on paid vs unpaid labor. Returns inf if v=0.
    example: |
      >>> row = DepartmentRow(c=100.0, v=50.0, s=75.0)
      >>> row.total_value
      225.0
      >>> row.organic_composition  # c/v = 100/50
      2.0
      >>> row.exploitation_rate  # s/v = 75/50
      1.5

  ValueTensor4x3:
    location: "src/babylon/economics/tensor.py"
    description: "4x3 Marxian value tensor for a county-year"
    frozen: true
    fields:
      fips_code:
        type: "str"
        constraint: "Exactly 5 digits (validated with regex)"
        description: "5-digit FIPS county code (e.g., '26163' for Wayne County)"
      year:
        type: "int"
        constraint: ">= 1900"
        description: "Data year (QCEW data starts 1975)"
      dept_I:
        type: "DepartmentRow"
        description: "Department I: Means of Production (capital goods)"
      dept_IIa:
        type: "DepartmentRow"
        description: "Department IIa: Necessary Consumption (wage goods)"
      dept_IIb:
        type: "DepartmentRow"
        description: "Department IIb: Luxury Consumption (bourgeois goods)"
      dept_III:
        type: "DepartmentRow"
        description: "Department III: Social Reproduction (care work)"
      naics_granularity:
        type: "Probability [0, 1]"
        description: "Data quality: fraction of wages with 6-digit NAICS mapping"
      excluded_wages:
        type: "Currency"
        description: "Wages excluded from allocation (e.g., government NAICS 92)"
    computed_fields:
      total_value:
        formula: "sum(dept.total_value for dept in [I, IIa, IIb, III])"
        type: "Currency"
        description: "Total value across all departments"
      profit_rate:
        formula: "total_s / (total_c + total_v)"
        type: "float"
        description: "Economy-wide return on capital investment"
    validation:
      fips_code: "Must be exactly 5 numeric digits (regex: ^\\d{5}$)"
      weights_sum: "Department allocations must sum to 1.0"
    example: |
      >>> tensor = ValueTensor4x3(
      ...     fips_code="26163",  # Wayne County (Detroit)
      ...     year=2022,
      ...     dept_I=DepartmentRow(c=300.0, v=100.0, s=200.0),
      ...     dept_IIa=DepartmentRow(c=150.0, v=100.0, s=100.0),
      ...     dept_IIb=DepartmentRow(c=250.0, v=100.0, s=300.0),
      ...     dept_III=DepartmentRow(c=50.0, v=100.0, s=70.0),
      ...     naics_granularity=0.85,
      ...     excluded_wages=50000.0,
      ... )
      >>> tensor.profit_rate  # total_s / (total_c + total_v)
      0.5826086956521739

# =============================================================================
# NAICS MAPPING CONFIGURATION
# =============================================================================

naics_mapping:

  principle: |
    Classification is based on END-USE DESTINATION, not production process.
    A steel mill's output destination determines department allocation:
    - Structural materials for factories → Dept I
    - Car bodies for workers → Dept IIa
    - Yacht fittings for bourgeoisie → Dept IIb

  lookup_hierarchy:
    order: ["6-digit", "5-digit", "4-digit", "3-digit", "2-digit"]
    description: "Most specific match wins. Fallback to 2-digit sector default."
    example: |
      NAICS 336111 (Automobile Manufacturing):
      - Check 336111 in overrides → Found! Use {IIa: 0.65, IIb: 0.35}
      - If not found, check 33611, 3361, 336, 33

  default_sector_allocations:
    description: "18 two-digit NAICS sector defaults"
    examples:
      "11":
        name: "Agriculture, Forestry, Fishing and Hunting"
        allocation: {dept_I: 0.30, dept_IIa: 0.60, dept_IIb: 0.10}
        rationale: "Feed/seed (I), Food (IIa), Specialty foods (IIb)"
      "21":
        name: "Mining, Quarrying, Oil and Gas Extraction"
        allocation: {dept_I: 0.85, dept_IIa: 0.10, dept_IIb: 0.05}
        rationale: "Intermediate energy/materials for other production"
      "44-45":
        name: "Retail Trade"
        allocation: {dept_IIa: 0.75, dept_IIb: 0.25}
        rationale: "Mostly wage goods, some luxury retail"
      "61":
        name: "Educational Services"
        allocation: {dept_IIa: 0.20, dept_III: 0.80}
        rationale: "Social reproduction of labor power"
      "62":
        name: "Healthcare and Social Assistance"
        allocation: {dept_IIa: 0.30, dept_III: 0.70}
        rationale: "Both wage good (basic care) and reproduction"

  specific_overrides:
    count: 41
    description: "Industry-specific allocations for known end-use patterns"
    examples:
      "336111":
        name: "Automobile Manufacturing"
        allocation: {dept_IIa: 0.65, dept_IIb: 0.35}
        rationale: "Worker cars (IIa) vs luxury vehicles (IIb)"
      "44831":
        name: "Jewelry Stores"
        allocation: {dept_IIb: 1.00}
        rationale: "Pure luxury consumption"
      "722511":
        name: "Full-Service Restaurants (Fine Dining)"
        allocation: {dept_IIa: 0.20, dept_IIb: 0.80}
        rationale: "Luxury gentrification marker"
      "722513":
        name: "Limited-Service Restaurants (Fast Food)"
        allocation: {dept_IIa: 0.90, dept_IIb: 0.10}
        rationale: "Working class food reproduction"
      "6244":
        name: "Child Day Care Services"
        allocation: {dept_III: 1.00}
        rationale: "Pure social reproduction"
      "814":
        name: "Private Households"
        allocation: {dept_III: 1.00}
        rationale: "Domestic workers produce labor power"

  excluded_sectors:
    codes: ["92"]
    names: ["Public Administration (Government)"]
    rationale: |
      Government operates outside M-C-M' circuit via tax extraction rather
      than surplus value realization. Excluded from Marxian value analysis.

  default_ratios:
    description: "Per-department BEA-calibrated fallback ratios (updated 2026-01-28)"
    calibration_source: "BEA Use Tables, Value Added tables, CEX necessity index"
    validation: "Produces profit rates within Piketty 3-8% empirical bounds"
    dept_I:
      cv_ratio: 1.8
      sv_ratio: 0.12
      rationale: "BEA intermediate_inputs/compensation for capital goods sectors"
    dept_IIa:
      cv_ratio: 1.0
      sv_ratio: 0.08
      rationale: "BEA retail/service ratios, competitive wage goods markets"
    dept_IIb:
      cv_ratio: 1.5
      sv_ratio: 0.15
      rationale: "BEA luxury goods production with monopoly markup"
    dept_III:
      cv_ratio: 0.4
      sv_ratio: 0.05
      rationale: "Care work: minimal fixed capital, suppressed margins (Fortunati/Federici)"

  sector_ratios:
    description: "2-digit NAICS sector-level ratios for finer granularity (NEW in v1.1.0)"
    calibration_source: "BEA intermediate inputs (TII105-A), value added (TVA113-A)"
    purpose: "Override department defaults for specific sectors when BEA industry data unavailable"
    count: 22
    examples:
      "11":
        name: "Agriculture"
        cv_ratio: 1.4
        sv_ratio: 0.25
      "21":
        name: "Mining"
        cv_ratio: 2.5
        sv_ratio: 0.40
      "31":
        name: "Manufacturing"
        cv_ratio: 1.8
        sv_ratio: 0.14
      "44":
        name: "Retail Trade"
        cv_ratio: 0.8
        sv_ratio: 0.10
      "62":
        name: "Healthcare"
        cv_ratio: 0.5
        sv_ratio: 0.06
    full_list: "src/babylon/economics/data/naics_to_dept.yaml (sector_ratios section)"

# =============================================================================
# MARXIAN HYDRATOR
# =============================================================================

hydrator:
  location: "src/babylon/economics/hydrator.py"
  class: "MarxianHydrator"
  description: "Pure transformation service: QCEW data → ValueTensor4x3"
  pattern: "Dependency injection via Protocol interfaces"

  constructor:
    parameters:
      qcew_source:
        type: "QCEWDataSource (Protocol)"
        description: "Source for county-level wage data by NAICS"
      bea_source:
        type: "BEADataSource (Protocol)"
        description: "Source for industry-specific c/v and s/v ratios"
      dept_mapper:
        type: "DepartmentMapper"
        description: "NAICS to Department classifier"

  transformation_algorithm:
    method: "hydrate(fips_code: str, year: int) -> ValueTensor4x3"
    steps:
      1:
        name: "Fetch QCEW Data"
        description: "Get wages by NAICS code for county-year"
        output: "list[tuple[naics_code, wages, employment]]"
      2:
        name: "Allocate to Departments"
        description: "Use DepartmentMapper to split wages across departments"
        output: "dict[Department, float] (variable capital v per department)"
      3:
        name: "Track Excluded Wages"
        description: "Sum wages from excluded sectors (NAICS 92)"
        output: "Currency (excluded_wages metadata)"
      4:
        name: "Get Value Ratios (Three-Tier Lookup)"
        description: "Fetch ratios using hierarchical fallback chain"
        logic: |
          For each NAICS code in department allocation:
            1. Try BEA industry-specific ratio (most accurate)
               - bea_source.get_sv_ratio(naics_code, year)
            2. Fall back to sector-level ratio (2-digit NAICS)
               - dept_mapper.get_sector_sv_ratio(sector_code)
            3. Fall back to department default ratio
               - dept_mapper.get_default_sv_ratio(dept)

          Compute weighted average across all NAICS in department.
          This three-tier system provides graceful degradation from
          specific industry data down to broad theoretical defaults.
      5:
        name: "Compute c and s"
        description: "Derive constant capital and surplus value from wages"
        formulas:
          s: "s = v × sv_ratio"
          c: "c = v × cv_ratio"
      6:
        name: "Compute Quality Metric"
        description: "Calculate naics_granularity (fraction with 6-digit codes)"
        formula: "wages_with_6digit_naics / total_allocated_wages"
      7:
        name: "Return Tensor"
        description: "Construct immutable ValueTensor4x3"
        output: "ValueTensor4x3 (frozen Pydantic model)"

  conservation_law: |
    allocated_wages + excluded_wages = total_input_wages
    This invariant is validated in integration tests.

  usage_example: |
    >>> from babylon.economics.hydrator import MarxianHydrator
    >>> from babylon.economics.adapters import SQLAlchemyQCEWSource, SQLAlchemyBEASource
    >>> from babylon.economics.department_mapper import DepartmentMapper

    >>> mapper = DepartmentMapper.from_yaml("data/naics_to_dept.yaml")
    >>> qcew = SQLAlchemyQCEWSource(session)
    >>> bea = SQLAlchemyBEASource(session)
    >>> hydrator = MarxianHydrator(qcew, bea, mapper)

    >>> tensor = hydrator.hydrate("26163", 2022)  # Wayne County
    >>> print(f"Total value: ${tensor.total_value:,.0f}")
    >>> print(f"Profit rate: {tensor.profit_rate:.2%}")

# =============================================================================
# DATA SOURCE PROTOCOLS
# =============================================================================

protocols:

  QCEWDataSource:
    location: "src/babylon/economics/adapters.py"
    description: "Protocol for fetching county-level QCEW wage data"
    method: |
      def fetch_county_wages(
          self, fips_code: str, year: int
      ) -> list[tuple[str, float, int]]
      # Returns: [(naics_code, total_wages, employment), ...]
    implementations:
      SQLAlchemyQCEWSource:
        description: "Queries fact_qcew_annual + dimension tables"
        tables: ["fact_qcew_annual", "dim_county", "dim_industry", "dim_ownership"]
        filter: "is_private=True, 6-digit NAICS codes only"

  BEADataSource:
    location: "src/babylon/economics/adapters.py"
    description: "Protocol for fetching BEA industry ratios"
    methods:
      get_sv_ratio: "def get_sv_ratio(self, naics_code: str, year: int) -> float | None"
      get_cv_ratio: "def get_cv_ratio(self, naics_code: str, year: int) -> float | None"
    implementations:
      SQLAlchemyBEASource:
        description: "Queries fact_bea_national_industry via bridge_naics_bea"
        tables: ["fact_bea_national_industry", "bridge_naics_bea"]
        fallback: "Returns None if no match, triggering YAML default"

# =============================================================================
# VALIDATION & TESTING
# =============================================================================

testing:

  unit_tests:
    location: "tests/unit/economics/"
    count: 100
    coverage:
      tensor.py:
        - "DepartmentRow validation (positive values, computed fields)"
        - "Division by zero handling (v=0 for organic_composition)"
        - "ValueTensor4x3 computed totals and profit_rate"
        - "FIPS code pattern validation (5 digits only)"
        - "Serialization roundtrips (model_dump/model_validate)"
      department_mapper.py:
        - "Allocation weights sum to 1.0"
        - "Hierarchical lookup priority (6-digit -> 2-digit)"
        - "Excluded sectors return None"
        - "Default ratios loaded and accessible"
        - "YAML configuration parsing"
      hydrator.py:
        - "Pure transformation with mock data sources"
        - "Excluded wages tracked correctly"
        - "Quality metric calculation"

  integration_tests:
    location: "tests/integration/economics/, tests/integration/tensors/"
    count: 24
    key_tests:
      gentrification_signal:
        name: "test_gentrification_shifts_iia_to_iib"
        description: "Validates class geography detection"
        assertion: |
          Oakland County (affluent suburb) should have higher IIb/IIa ratio
          than Wayne County (Detroit industrial base).
        code: |
          wayne = hydrator.hydrate("26163", 2022)
          oakland = hydrator.hydrate("26125", 2022)
          wayne_ratio = wayne.dept_IIb.v / wayne.dept_IIa.v
          oakland_ratio = oakland.dept_IIb.v / oakland.dept_IIa.v
          assert oakland_ratio > wayne_ratio
      dept_iii_isolation:
        name: "test_dept_iii_social_reproduction_isolation"
        description: "Only NAICS 814 + 6244 allocate to Dept III"
        assertion: "Dept III contains only care work industries"
      surplus_rate_variation:
        name: "test_surplus_rates_vary_by_department"
        description: "Capital intensity and monopoly rents encoded correctly"
        assertion: "Dept I and IIb have higher s/v than Dept IIa and III"
      conservation_law:
        name: "test_allocation_plus_excluded_equals_total"
        description: "Validates wage accounting"
        assertion: "allocated_v + excluded_wages == total_input_wages"

    empirical_validation_tests:
      location: "tests/integration/tensors/test_empirical_validation.py"
      count: 12
      added_date: "2026-01-28"
      purpose: "Validate calibrated model against Piketty bounds and economic theory"
      test_classes:
        TestPikettyGuardrails:
          count: 3
          tests:
            - "test_profit_rate_within_piketty_bounds (3-8%)"
            - "test_sv_ratio_reasonable (0-1 range)"
            - "test_cv_ratio_reasonable (0.1-5.0 range)"
        TestDetroitGentrificationSignal:
          count: 3
          tests:
            - "test_gentrification_signal_direction (Oakland > Wayne)"
            - "test_luxury_ratio_magnitude_is_meaningful (>5% difference)"
            - "test_signal_robust_across_years"
        TestAccountingIdentity:
          count: 2
          tests:
            - "test_value_decomposition_sums_correctly"
            - "test_allocation_weights_sum_to_one"
        TestTemporalConsistency:
          count: 2
          tests:
            - "test_department_proportions_stable_over_time"
            - "test_profit_rates_stable_across_years"
        TestDetroitDeindustrialization:
          count: 2
          tests:
            - "test_wayne_county_has_dept_i_manufacturing"
            - "test_wayne_county_healthcare_growth (Dept III)"

# =============================================================================
# REAL DATA RESULTS
# =============================================================================

real_data_results:
  description: "Results from hydrating real QCEW 2022 data (post-calibration 2026-01-28)"
  source: "BLS Quarterly Census of Employment and Wages"
  calibration_note: |
    v1.1.0 calibration using BEA/CEX data brought profit rates into
    Piketty's empirical 3-8% bounds. Previous placeholder ratios
    produced unrealistic 50%+ profit rates.

  wayne_county:
    fips_code: "26163"
    location: "Detroit metropolitan area (industrial base)"
    class_character: "Working class, manufacturing heritage"
    results:
      total_wages: "$39B (allocated)"
      excluded_wages: "$142M-$150M (government)"
      profit_rate: "~4-6% (within Piketty 3-8% bounds)"
      luxury_necessary_ratio: "<1.0 (working-class predominance)"
      naics_granularity: "53.5%-18% (varies by run)"
      interpretation: |
        Low luxury/necessary ratio indicates working-class character.
        Motor vehicle manufacturing (NAICS 336) now correctly classified
        as 67% IIa (necessary goods) reflecting mass-market vehicles.

  oakland_county:
    fips_code: "26125"
    location: "Affluent northern Detroit suburb"
    class_character: "Upper-middle class, professional services"
    results:
      total_wages: "$48B (allocated)"
      excluded_wages: "$156M-$100M (government)"
      profit_rate: "~4-6% (within Piketty 3-8% bounds)"
      luxury_necessary_ratio: ">1.0 (affluent character)"
      naics_granularity: "7.8% (lower quality aggregated data)"
      interpretation: |
        Higher luxury/necessary ratio than Wayne County (5%+ difference).
        Indicates gentrified affluent suburb with luxury services.
        Professional services (NAICS 54) and finance (52) dominate.

  gentrification_signal:
    test: "test_gentrification_signal_direction"
    assertion: "Oakland IIb/IIa > Wayne IIb/IIa"
    status: "PASSING"
    threshold: "5% minimum difference"
    rationale: |
      The difference reflects consumption patterns, not production location.
      Oakland residents consume more luxury goods (made elsewhere);
      Wayne has manufacturing that produces necessary goods for workers.

  validation_insights:
    - "Conservation law validated: allocated + excluded = total input"
    - "Class geography clearly differentiated between counties"
    - "Profit rates within Piketty 3-8% bounds (was 50%+ before calibration)"
    - "Gentrification signal: Oakland > Wayne for luxury/necessary ratio"
    - "BEA/CEX calibration documented in ai-docs/brainstorms/bea2ratio.md"

# =============================================================================
# DESIGN PRINCIPLES
# =============================================================================

design_principles:

  pure_transformation:
    description: "Hydrator has no side effects, returns new immutable tensor"
    rationale: "Enables deterministic, reproducible, testable transformations"

  frozen_models:
    description: "All Pydantic models use ConfigDict(frozen=True)"
    rationale: "Matches babylon's functional transformation pattern"

  dependency_injection:
    description: "Data sources injected via Protocol interfaces"
    rationale: "Enables testing with mocks, swappable implementations"

  yaml_configuration:
    description: "All magic numbers in naics_to_dept.yaml, not code"
    rationale: "Transparent, auditable, version-controlled configuration"

  no_imperial_rent_constants:
    description: "Imperial rent formulas deferred to topology layer"
    rationale: "Tensor layer is pure data transformation, not simulation logic"

  hierarchical_lookup:
    description: "6-digit → 2-digit NAICS fallback chain"
    rationale: "Best available classification with graceful degradation"

  empirical_calibration:
    description: "Ratios derived from BEA/CEX data, not arbitrary placeholders"
    rationale: |
      Scientific approach: cv_ratio and sv_ratio must produce profit rates
      within Piketty's empirical 3-8% bounds. Calibration uses:
      - BEA Use Tables for intermediate vs final demand (Dept I/II split)
      - BLS Consumer Expenditure Survey necessity index (IIa/IIb split)
      - Fortunati/Federici framework for care work (Dept III)
    source: "ai-docs/brainstorms/bea2ratio.md"

  three_tier_ratio_lookup:
    description: "BEA source → sector_ratios → default_ratios hierarchy"
    rationale: |
      Graceful degradation from specific industry data to broad defaults.
      1. BEA industry-specific (most accurate when available)
      2. Sector-level (22 NAICS 2-digit sectors)
      3. Department default (4 Marxian departments)

# =============================================================================
# INTEGRATION POINTS
# =============================================================================

integration:

  data_sources:
    qcew:
      description: "BLS Quarterly Census of Employment and Wages"
      table: "fact_qcew_annual"
      loader: "src/babylon/data/qcew/loader_3nf.py"
      note: "Loader fixed to fetch county-level data (not state aggregates)"
    bea:
      description: "Bureau of Economic Analysis industry value-added"
      table: "fact_bea_national_industry"
      bridge: "bridge_naics_bea (NAICS to BEA concordance)"

  downstream_consumers:
    topology_layer:
      description: "ValueTensor4x3 feeds into graph-based simulation"
      usage: "Initialize SocialClass nodes with department-specific wealth"
    imperial_rent_system:
      description: "Uses profit_rate and department structure for rent extraction"
      location: "src/babylon/engine/systems/economic.py"
    class_composition_analysis:
      description: "Compare tensor structures across counties/years"
      metrics: ["luxury_necessary_ratio", "dept_III_share", "profit_rate"]

  verification_commands:
    run_tests: "mise run test:unit tests/unit/economics/"
    run_integration: "mise run test:int tests/integration/economics/ tests/integration/tensors/"
    run_empirical: "poetry run pytest tests/integration/tensors/test_empirical_validation.py -v"
    typecheck: "mise run typecheck"
    success_criteria:
      - "All 124 tests pass (unit + integration)"
      - "MyPy strict compliance"
      - "Gentrification Signal: Oakland IIb/IIa > Wayne IIb/IIa (>5% difference)"
      - "Piketty Bounds: Profit rates within 3-8% for Detroit metro counties"
      - "Conservation Law: allocated + excluded = total input wages"
      - "Temporal Stability: Department proportions stable across years"
