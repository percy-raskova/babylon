  spec_067_summary: |
    QCEW rollup-row normalization — closes the spec-066 follow-up
    item that flagged the fragile `WHERE industry_id = 1 AND
    ownership_id = 1` defensive filter pattern as a structural trap.

    Delivered (4 user stories, 70 tasks):
    - US1: `tools/normalize_qcew_rollups.py` migration tool with
      preflight assertions, atomic backup-then-DELETE commit,
      audit-report (Markdown + JSON sidecar) writers, dry-run /
      apply / rollback / drop-backup modes. Live --apply against
      the 43.3M-row reference DB removed ~28.2M rollup rows
      (naics_level != 6 OR own_code = '0'), leaving ~15.1M
      canonical leaves.
    - US3: `src/babylon/persistence/{hex_hydrator, county_aggregation}.py`
      refactored from `SELECT (rollup)` to `SUM (leaves)`. SC-004
      grep enforcement integrated as `test_post_067_no_filter_lines_remain_in_production_paths`.
    - US2: `test_state_rate_of_profit_in_relaxed_band` band tightened
      from spec-066's [0.05, 0.80] back to spec-original [0.05, 0.50].
      michigan-e2e baseline regenerated against the post-067 reference DB.
    - US4: `tests/integration/test_audit_report_validation.py` —
      contract harness enforcing
      `contracts/audit_report.schema.json` plus FR-007 / SC-008
      integrity-class accounting.

    Key finding (research.md T036): QCEW data has ~10-30% BLS
    confidentiality suppression at the 6-digit NAICS detail level.
    `SUM(leaves)` is systematically LOWER than the BLS Total Covered
    rollup by 14-30% per county-year. The spec's ±5% SC-001 / SC-007
    targets are deferred to a follow-up amendment (see ADR045
    negative consequences for mitigation options).

    Documented in ADR045 + research.md `T001 pre-flight verification`
    + research.md `T036 finding` sections.
  spec_066_summary: |
    Marx-coherence fixes — surfaces the 5 categorical bugs the spec-065
    e2e Michigan-Canada audit identified and fixes them. After spec-066
    the canonical run produces output that satisfies Marx's accounting
    identities AND drives consciousness evolution.

    Delivered (5 user stories, 79 tasks, ~30 files touched):
    - US1 (Bug A): hex_hydrator surplus value formula fix
      `s = max(0, GDP/52 - v)` per Marx Vol I Ch 9 + BEA value-added.
      Closes the bug where total_s was uniformly 0 across all 83 counties.
    - US2 (Bug E + Bug F): SimulationEngine.run_tick wired into the
      bridged runner. ServiceContainer constructed once before tick loop;
      bridge's event_bus/auditor/boundary_register patched in; fresh
      SimulationEngine(_DEFAULT_SYSTEMS) per run; graph mutated in place;
      world reconstituted via from_graph after each tick. EXPLOITATION
      edge seeded per county at tick 0 (no SOLIDARITY — those are
      strategic per Constitution III.5). Documented in ADR044.
    - US3 (Bug D): explicit ideology baseline placeholder
      (r=0.05, l=0.50, f=0.45) per ADR043. Factories accept
      `ideology=IdeologicalProfile`; bridge passes BASELINE_IDEOLOGY to
      every county entity.
    - US4 (Bug B): employment_proxy unit fix. QCEW `employment` column
      IS already BLS annual-average; removed /52 divisor entirely; added
      industry_id=1 + ownership_id=1 filters to prevent NAICS-hierarchy
      AND ownership-rollup double-counting. Wayne 2010 now returns ~660K
      (matches BLS publication).
    - US5 (Bug C): substrate apportionment split. New
      _fetch_per_county_substrate_apportionment helper JOINs
      dim_county_geometry.area_sq_km. energy_per_hex uses pop_factor;
      raw_material_per_hex uses area_factor. Graceful T067 fallback
      when area data missing.

    Cascade fixes surfaced during implementation:
    - hex_hydrator wages query gained the ownership_id=1 filter to
      mirror the new employment_proxy filter (avoids ownership-rollup
      double-counting in v).
    - consciousness.routing_scale bumped 0.1 → 0.2 (FR-027 + Phase 0 R4)
      for measurable consciousness drift visibility.
    - dynamic_relationship_state CHECK constraint mismatch: bridge
      now UPPERCASES edge_type before persisting (StrEnum.value is
      lowercase but migration 0024 requires uppercase).
    - test_state_rate_of_profit_in_relaxed_band band widened from
      [0.05, 0.50] to [0.05, 0.80] to accommodate the un-doubled v.
    - test_tick_over_tick_evolution loosened to "any column changes"
      (the strict ≥5% threshold is validated by the 520-tick slow-gate
      test_consciousness_evolution.py).

