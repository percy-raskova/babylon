  spec_065_summary: |
    Engine-bridging — real per-tick state behind the headless runner.
    Replaces spec-064's no-op carry-forward virtualization with a real
    WorldStateBridge that hydrates per-county SocialClass entities,
    persists per-tick subsystem rows (consciousness, demographics,
    employment), and produces trace.csv values that vary per-county
    from real BEA/QCEW/FCC reference data.

    Delivered: WorldStateBridge (hydrate_initial + persist_tick +
    poll_endgame); babylon.persistence.county_aggregation (4 pure
    derivation helpers: aggregate_survival, aggregate_consciousness,
    fetch_population, fetch_employment_proxy); hex hydrator rewrite
    (real BEA GDP × intermediate-inputs-fraction for c, QCEW for v,
    GDP-residual for s, capital-output-ratio for k, FCC + coercive
    infrastructure for surveillance/internet); FR-022 reference-data
    window preflight (silent/warn-and-clamp/hard-refuse three-mode
    policy); --strict CLI flag that aborts on alarm-severity audit
    rows; --endgame-detector CLI flag with importlib resolution;
    EventCapture wiring into summary.events; aggregate_external_node_flows
    pulling per-node summaries from boundary_flow_register table;
    SocialClass.county_fips optional FIPS attribution field; bridge
    mapping IdeologicalProfile(cc, ni) → TernaryConsciousness(r, l, f)
    that's simplex-preserving by construction.

    4 new Postgres migrations (0020-0023): dynamic_consciousness_state,
    dynamic_demographics_state, dynamic_employment_state plus the
    recreated view_runtime_trace_emission that JOINs them. The 22-column
    external trace contract is preserved; previously-NULL columns now
    flow from real engine state + reference data.

    1500+ unit tests + 15 integration tests across persistence/models/
    engine.headless_runner/integration. 1 xfail (T028 SC-004 tick-over-tick
    variance) documents that full SimulationEngine integration is
    deferred to a follow-up spec — the bridge + persistence layers are
    ready, but the 15-system engine wiring is large enough to deserve
    its own session.

    Reconciliation note: the original spec contract referenced WorldState
    fields (consciousness_simplex, demographics_per_county,
    employment_per_county) that don't exist on the model. Research.md
    §R10 documents the 2026-05-15 reconciliation that replaced those
    flat field reads with derivation/aggregation helpers and added a
    single optional SocialClass.county_fips field. Per Constitution II.6,
    per-county aggregates are derived state and belong on the trace view
    (where they already lived), not on WorldState.
