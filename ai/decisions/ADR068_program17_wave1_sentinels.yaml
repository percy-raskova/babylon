ADR068_program17_wave1_sentinels:
  status: "accepted"
  date: "2026-07-14"
  title: "Program 17 Wave 1 'Light the Seam' + the Sentinels family (babylon.sentinels, 5 declared-invariant gates) + seam close-out: per-county ő¶ lit end-to-end (31,688 IMPORT_USE rows), events 14‚Üí34, endgame wired, 5 inspectors real, live verb costs, 4 dynamic sentinels sharing one shared-tick fixture, 82-finding advisory punch-list as the honest UI-wiring backlog"
  context: |
    Program 17 "The Living Engine" is the ratified 3-wave plan (Light the
    Seam ‚Üí Topology/Hypergraph ‚Üí Game-feel) to turn the web‚ÜĒengine seam ‚ÄĒ
    assessed in the 2026-07-12 consolidation report as "the neglected seam"
    (engine + shell rich, adapter thin) ‚ÄĒ into a genuine 4X grand-strategy
    UI on top of the sim engine. Owner rulings pre-authorized the wave:
    D1 = both topology surfaces (map edge-lens + sigma canvas) for Wave 2,
    D2 = full Leontief now (not deferred), D3 = AI narration deferred and
    mocked. North star: `desired-end-state-for-ui.md` + the Program-16
    research corpus (Paradox/Tufte/Debord: click-to-pin, 5-state
    eligibility grammar, ő¶-default, edges-as-lens not node-dump).

    Entering Wave 1, four concrete symptoms of the neglected-seam thesis
    were live on `feature/17-living-engine` (off `dev@28bef52f`): the
    default ő¶ (imperial rent) lens read blank because the reference DB
    carried zero IMPORT_USE input-output coefficients; the bus‚Üípydantic
    event converter forwarded only 14 of 79 `EventType`s; all 5
    `get_inspector_*` bridge methods were stub `return {}`; and
    `EndgameDetector` computed outcomes every tick but was never wired
    into `resolve_tick`, so games could not end. A second, orthogonal need
    surfaced mid-wave: the same class of bug (blank ő¶, a `float +=
    Decimal` crash, the narrow event whitelist, several other silent
    no-ops) recurs structurally at this seam and is invisible to type
    checkers and unit tests that mock the boundary ‚ÄĒ Constitution VIII.12
    (no silent no-op) and III.11 (Loud Failure) call for a mechanically
    enforced gate, not vigilance.
  decision: |
    (1) WAVE 1 "LIGHT THE SEAM" ‚ÄĒ delivered in full on
    `feature/17-living-engine`, every step qa:regression 5/5
    byte-identical:
      - **1a** (`5e569fcf`) wired the genuinely-unwired
        tensor/Leontief(L=(I‚ąíA)‚ĀĽ¬Ļ)/MELT/ő≥ pipeline into TickDynamics +
        `engine_bridge`'s `_serialize_territory`/`_hex_state_row`. Found +
        fixed `DBImportShareSource` INNER-JOINing and dropping 36/107
        industries ‚Üí LEFT JOIN from `dim_bea_industry`.
      - **THE CROWN FIX**: ő¶ still computed 0 everywhere because the
        reference DB had NO IMPORT_USE coefficients at all
        (`dim_bea_io_table_type` = {USE, TOTAL_REQ} only). Owner
        authorized the load. Two traps caught pre-ship: the xlsx parser
        read title rows as headers (0 rows); and the USE table stores
        NORMALIZED coefficients (√∑gross_output), not dollars ‚ÄĒ a naive
        dollar load would have produced garbage `m_j` in the thousands
        while still passing the crown test. Correct load (`fb53debf`,
        `tools/ingest_bea_imports.py`): `import_coeff = import_$ŠĶĘ‚Īľ /
        gross_output_millions‚Īľ`. Loaded 31,688 rows (2010‚Äď2024); 2015
        `m_j` median 0.048 / mean 0.098 / max 0.382, zero >1 ‚ÄĒ textbook
        import-penetration profile (petroleum 0.38, autos 0.23,
        chemicals 0.19 vs housing 0.008, utilities 0.06). Also fixed a
        stale CHECK constraint forbidding IMPORT_USE.
      - **1b** (`a35c07cf`/`aa21a7fc`) widened the bus‚Üípydantic converter
        14‚Üí34 `EventType`s (+5 new payload files), fixed the 3rd
        `event_type` typo (`runtime_db.py:205`).
      - **1c** (`9d8a90b6`) wired `EndgameDetector` into web `resolve_tick`
        (per-session cache, durable `tick_event` read) ‚ÄĒ games can now
        END. Corrected: the live Chronicle wire is `get_endgame_state()`,
        not the dead `snapshot['endgame']`. Rewrote 4 tests that had
        faked `event.event_type == "RED_OGV"` (a false contract).
      - **1d** (`784ae0a6`) implemented all 5 `get_inspector_*` methods
        from raw-graph reads (were `return {}`); fixed
        `_social_class_stats` reading a nonexistent top-level
        `class_consciousness`.
      - **1e** (`2abc18fc`/`13e5fc4b`) live verb cost (5/9 static labels
        were WRONG) + grounded ‚Ė≤/‚Ėľ predicted-delta arrows for 7/9 verbs;
        investigate/negotiate left honest-null (zero scalar engine
        effect), pinned as a test contract.
      - **Seam-hardening** (`e7804cd7`): the live `hex_cell` table
        predated 4 columns (`county_name`/`bea_ea_code`/`msa_code`/
        `state_fips`); `CREATE TABLE IF NOT EXISTS` no-ops on a stale
        table, so a subsequent `CREATE INDEX` threw `UndefinedColumn`,
        which the bridge's catch-all swallowed as a non-fatal WARNING ‚ÄĒ
        silently aborting every DDL statement after it. Fixed with an
        idempotent `ALTER ‚Ä¶ ADD COLUMN IF NOT EXISTS` heal in
        `postgres_schema.py` + narrowed the bridge's catch to
        `(psycopg.Error, RuntimeError)` at ERROR (III.11). Red‚Üígreen
        regression: `test_bootstrap_heals_drifted_hex_cell`.
      - **float+=Decimal fix** (`db9cda51`): `_aggregate_hex_features` did
        `float += Decimal` (`hex_latest.imperial_rent` is Postgres
        NUMERIC) ‚ÄĒ invisible while ő¶ was NULL (`None or 0`‚Üíint), it
        500'd the county map the instant ő¶ went non-null. Cast the 5
        NUMERIC metrics to float + round ő¶ to 6dp (was 2dp, collapsing
        ~1e-5 values to 0.00 = a blank lens). Test:
        `tests/unit/web/test_map_aggregation.py`.
      - **Item 25** ("light the derived-rate lenses"): Fix A (`a8918338`)
        ‚ÄĒ the web bridge's `_carry_tick_dynamics_flows` re-applied only a
        subset of `tick_*` attrs after `step()`'s `WorldState` round-trip
        strips them; now carries `tick_profit_rate`/`tick_occ`/
        `tick_exploitation_rate` too, recomputed via
        `DerivedRateCalculator`. Fix B (`875ae76c`) ‚ÄĒ wired the REAL
        `CapitalStockCalculator(tensor_registry)`, hydrated 2010‚Äď2024
        from the reference DB, cached per FIPS-set (`K` had been 0,
        degenerately tying `profit_rate` to `exploitation_rate`). Fix C
        (`a2ab6e9e`) ‚ÄĒ wired real QCEW per-county employment via a
        symmetric `employment_source` on `ServiceContainer`/
        `ServicesProtocol`, falling back to 100k when unwired so
        headless/qa:regression stay byte-identical. Live (wayne_county):
        employment 100k‚Üí671,985, occ 138.6‚Üí20.6, profit_rate
        0.027‚Üí0.175, exploitation_rate 3.79 (employment-invariant),
        K=346B labor-hours ‚ÄĒ the falling rate of profit made visible.

    (2) THE SENTINELS FAMILY (`babylon.sentinels`, renamed from
    `babylon.seams` at `48f0d104`) ‚ÄĒ 5 declared-invariant gates
    formalizing "authentic game-engine-style abstraction‚Ä¶ mutant
    observability grows-with-your-codebase‚Ä¶ fails loudly" (owner
    directive), enforcing Constitution VIII.12/III.11:
      1. **Seam** (`sentinels/seam/`, `78a1679c`‚Üí`651b9151`) ‚ÄĒ Sensor 1
         static continuity: GATING `check_map_metrics`,
         `check_tick_payloads_exist`, `check_severity_vocabulary`;
         ADVISORY `check_tick_coverage`, `check_narrator_vocabulary`,
         `check_event_coverage`. Sensor 2 liveness =
         `tests/unit/sentinels/test_seam_liveness.py`.
      2. **Determinism** ‚ÄĒ `shared_tick.hash_a == hash_b` (III.7
         seed-identical replay).
      3. **Round-Trip** (`sentinels/roundtrip/`) ‚ÄĒ `from_graph(to_graph())`
         conserves a declared 16-field core set (incl. the tick-52-crash
         `county_fips`).
      4. **Economic-Conservation** (`sentinels/conservation/`) ‚ÄĒ 2
         identities across all 53 `imperial_circuit` rows: finiteness (no
         NaN/inf) + rent-pool reserve depletion (non-neg, bounded, non-
         increasing) within a derived 1e-9 tolerance (Amendment Q).
      5. **Data-Coverage** (`sentinels/coverage/`, `2b623a50`) ‚ÄĒ STATIC
         slice only (each declared reference-data requirement names a
         source-adapter class that exists); the 6GB actual-row probe is
         deferred, on-demand, never CI.
      Shared apparatus: `sentinels/base.py` (`run_sensor` two-tier
      gating/advisory runner, exit 0/1/2), `sentinels/_ast.py` (static
      helpers). Family CLI: `tools/sentinel_check.py <sensor> --check`.
      Layer 0.5, import-linter-pinned (imports nothing above
      models/config). THE OPTIMIZATION (`10250fe7`, `499b54a3`): the 4
      dynamic sentinels share ONE session-scoped `shared_tick` fixture
      (`tests/unit/sentinels/conftest.py`) ‚Üí run twice total (2nd run is
      Determinism's own seed-replay) instead of 5√ó ‚ÄĒ measured 1.5s for
      the whole 50-test suite. `regression_test.py` stayed UNTOUCHED.
      Layer-0.5 corollary the investigation spec missed: dynamic
      check-logic lives in the TEST layer (tests import anything); only
      declared registries live in the package.
      SENSOR 3 PROVENANCE (`aa2a7cc7`, `a32b2f2a`, `0bb2e0c9`) ‚ÄĒ 5
      pieces: rename-aware AST emission-diff
      (`_aggregate_hex_features` vs `AdminFeatureProperties`) that
      SELF-CORRECTED a prior "14 phantoms" plan claim to the true 4
      (`biocapacity`, `consciousness`, `rent`, `wealth` ‚ÄĒ the other 9 are
      group_key normalizations); a `StubBridge` production guard
      (raises `ImproperlyConfigured` instead of warning when serving
      fabricated values with `DEBUG` off); and 3 frontend guards
      (render-tree import ban on observatory/fixtures, an MSW
      bundle-honesty test, a golden field-value snapshot) ‚ÄĒ each
      efficacy-proven (reds on an injected defect).
      OWNER RULINGS: registry = frozen Pydantic; **NO nightly CI**
      (solo project ‚ÄĒ mutmut stays a manual on-demand command, no
      Parquet reference-DB CI plumbing, Sensor-2 reference-data checks
      republish-to-CI-first with no carve-out); drift = "fix now then
      gate"; "build all 5, optimize don't cut"; fast-gate ceiling = one
      real synthetic tick, no reference DB.
      CROWN HONEST FINDING (Seam Sensor-2): 0/6 MUST_BE_LIVE map
      observables are value-live on the bare-engine synthetic tick,
      because `/map/` is lit by the web `EngineBridge` against the
      hex/Postgres projection ‚ÄĒ a higher altitude than a 2-territory
      `to_graph()`. Refused to fake green; shipped a characterization
      contract (pins the true live/dark partition + probe
      discrimination) and deferred real value-liveness to the
      web-bridge altitude.

    (3) SEAM CLOSE-OUT ‚ÄĒ the punch-list (`reports/seam-wiring-
    punchlist.md`), delivered via `3d80bb0c` (typed endpoint manifest as
    the API-contract SoT), `285a477e` (autonomous bridge-serialization
