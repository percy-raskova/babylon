    emitted (crisis phase, financialization share, debt, unemployment
    rate ‚ÄĒ real economic signal thrown away); **Gap 2** ‚ÄĒ emitted/
    reachable but not consumed: 2a two possibly-dark endpoints
    (`get_org_network`, `get_hypergraph_communities` ‚ÄĒ undefined
    anywhere in `web/game`, investigate first) + `get_explain` stub-only
    dead code, 2b serializers with a working backend but `Untyped` in
    `endpoints.ts` (dashboards, inspectors, all 8 verb actions √ó2 routes,
    action lifecycle), 2c structurally opaque delegated returns
    (`get_snapshot`, `get_wire_feed`, `get_map_snapshot`); **Gap 3** ‚ÄĒ
    declared but never emitted: `EconomyDashboardPayload` 8 phantoms
    (`current_super_wage_rate`, `imperial_rent_pool`, `occ`,
    `profit_rate`, `tick`, `tribute_flow_total`, `wage_flow_total`,
    `wealth_by_class_role` ‚ÄĒ the single highest-value fix, since data
    and contract both already exist) and `AdminFeatureProperties` 4
    phantoms (`biocapacity`, `consciousness`, `rent`, `wealth`).
    **Adjacent**: 6 crafted-but-unreachable narrator templates and 45/79
    `EventType`s still dropping to `None` at the bus‚Üípydantic boundary
    (both product-scoped, kept advisory). None of these gate the build;
    the punch-list is a living, self-regenerating artifact (`mise run
    check:seams` / `tools/sentinel_check.py seam --check`) ‚ÄĒ the honest
    backlog the "proper UI" gets built on.
  consequences: |
    Program 17 Wave 1 is COMPLETE and every quantity the engine computes
    now has a documented disposition (emitted+consumed, emitted-untyped,
    declared-phantom, or unregistered-computed) ‚ÄĒ nothing falls on the
    floor unaccounted for, even where the honest disposition is
    "advisory backlog." Full suite held green throughout: 9588 passed at
    Wave-1-complete ‚Üí 9648 passed once all 5 sentinels landed; mypy/
    ruff/hygiene clean; qa:regression 5/5 byte-identical at every
    intermediate commit (Wave 1, seam-hardening, item-25 A/B/C,
    sentinels). The Sentinels family already proved its own value: Sensor
    3's adversarial AST diff caught and corrected a wrong "14 phantoms"
    plan claim down to the real 4 before it shipped as fact.

    DEFERRED, explicitly NOT closed by this work:
      (a) The IMPORT_USE reference-DB load is LOCAL-ONLY ‚ÄĒ
          `tools/ingest_bea_imports.py` mutated the local 5.7GB
          `data/sqlite/marxist-data-3NF.sqlite` directly. CI's
          `fetch-reference-db` action pulls a pre-built `ci-data-v1`
          subset that has never been regenerated with the load, so the
          crown integration test (`test_imperial_rent_real_wiring.py`)
          and the "map lights up" claim reproduce NOWHERE but this
          machine ‚ÄĒ not CI, not other devs, not the Hetzner deploy.
          Flagged CRITICAL / priority #1 in
          `ai/_inbox/deferred-repo-refactors.md` ¬ß1 (spec-086/097/098
          reference-DB remediation territory) ‚ÄĒ must be fixed before
          "lit ő¶" can be called shipped rather than local.
      (b) The 2-tier web‚ÜĒengine contract mechanism (a declared
          observable-field registry generalizing every seam bug fought
          this session, gated by continuity/liveness/provenance sensors
          beyond just the map lens) was DESIGNED by the owner
          (`archive/observability-seam-coverage-gate.md`) but NOT
          implemented ‚ÄĒ `deferred-repo-refactors.md` ¬ß2, "the
          highest-leverage anti-regression infra on the list."
      (c) Owner ruled NO nightly CI / no Parquet reference-DB CI
          plumbing for the sentinels (solo-project reasoning ‚ÄĒ "the
          owner IS the CI for deep checks"): mutmut stays manual
          on-demand, Data-Coverage stays a static AST-only slice, the
          6GB actual-row value-liveness probe is a local pre-deploy
          check, never a cron.
      (d) Narrator remediation (6 unreachable templates) and the 45/79
          `EventType` vocabulary triage are PENDING owner product
          decisions, kept advisory.
      (e) The bridge-serialization sweep exists and runs, but closing
          the 82 punch-list rows it produces (Gaps 1‚Äď3 above) is
          unstarted ‚ÄĒ that IS the remaining Wave-1-adjacent work.
      (f) Residual metric-design issues on the now-lit lenses, flagged
          for owner: `g33_visibility` NULL; Hickel-ERDI import data ends
          2017 so ő¶ freezes past that year; hex-level `imperial_rent`
          aggregation is a SUM, not a population-weighted mean.
    Two latent bugs were found and fixed purely as a side effect of
    lighting a previously-dark seam ‚ÄĒ both invisible while the seam was
    dark, both now covered by a regression test: the `float += Decimal`
    map crash, and the `hex_cell` schema-drift silent-DDL-abort.
