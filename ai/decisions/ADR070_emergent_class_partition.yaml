    - "src/babylon/domain/dialectics/core/opposition.py (GapReading/GapMeasure/OppositionRegistry._lead — the shapes and tie rule PoleReading inherits)"
    - "src/babylon/engine/systems/contradiction.py:184-223 (_build_graph_inputs — where per-node pole information currently dies in the aggregation mean)"
    - "project/programs/10-spectrum-of-unequal-exchange.md (Amendment N: per-node sigma computed-never-assigned; binaries as sigma-band quantizations — the imperial pole_measure landing seam)"
    - "ai/decisions/ADR059_fork_reconciliation.yaml item context: Feature 016 transition_engine + Feature 043 evaluate_class_shares (the two tested, unwired derive-don't-seed prototypes)"
    - "memory: direction-emergent-endgames.md + constitution-v2-10-0-amendments-r-s.md (the sibling statics-are-derived rulings this program unifies with)"
