    circuit_scenario x4 + create_two_node_scenario, defines-only
    overrides) + scenarios/_legacy.py builders (SocialClass + Territory
    only) — independently confirmed by the 21-agent ultracode review
    (2026-07-15 8pm), which also adversarially confirmed: exactly 6
    commits; registration at 14.7 in both _DEFAULT_SYSTEMS and
    CONSEQUENCE_SYSTEMS (partition-integrity assertion satisfied); no
    eval/exec anywhere in domain/doctrine/; in-memory round-trip of all
    three fields; zero TODO/placeholder across the 20 touched files; live
    gates green (96 doctrine tests, qa:regression 5/5, tsc, 1175/1175
    vitest, check:quick). Review-identified obligations (Postgres path
    test, org-bearing determinism, stub-bridge parity) are tracked as
    pre-merge/pre-Unit-6 work, not silently absorbed.
