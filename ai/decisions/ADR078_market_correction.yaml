    src/babylon/models/enums/events.py, src/babylon/config/defines/market.py, src/babylon/models/market.py, src/babylon/formulas/market.py, src/babylon/engine/systems/market_scissors.py, src/babylon/engine/systems/wealth_distribution.py, src/babylon/domain/dialectics/instances/catalog.py, src/babylon/models/world_state.py, src/babylon/persistence/migrations/0034_market_corrections.sql, src/babylon/persistence/postgres_schema.py, src/babylon/persistence/postgres_runtime/_legacy.py, web/game/map_contract.py, web/game/engine_bridge.py, src/frontend/src/lib/scissors.ts, src/frontend/src/components/timeseries/MarketTicker.tsx, src/frontend/src/components/timeseries/ScissorsChart.tsx, src/frontend/src/lib/lens.ts, tests/unit/formulas/test_market_calibration.py, tests/unit/config/test_market_defines.py, specs/115-market-scissors/spec.md, docs/superpowers/plans/2026-07-17-market-scissors-phase-2.md, ADR077_market_scissors.yaml, ADR075 (bracket fold ruling), spec-114 (FR-114-4 impulse form)
