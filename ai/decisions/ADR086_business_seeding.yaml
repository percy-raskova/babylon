ADR086_business_seeding:
  status: "accepted"
  date: "2026-07-19"
  title: "Seed real-QCEW Business organizations into the canonical playable scenarios (us_nationwide + wayne_county): a committed, hash-stamped deterministic seed artifact (business_seeds.json) generated from fact_qcew_annual private-sector employment, a single shared builder both scenario builders call (DRY), capped at K=5 top-2-digit-NAICS sectors per scope so the org count stays far under the engine's max_orgs=1000 cap; economic behaviour for businesses is explicitly future work"
  context: |
    Owner ruling 2026-07-19: the two canonical playable scenarios must seed
    `Business` organizations, from REAL data, never fabricated numbers. Before
    this, `create_us_scenario` seeded exactly ORG001 (the national Cadre
    Council) and `create_wayne_county_scenario` seeded ORG001 + ORG002 (Detroit
    PD) — zero businesses, so the whole Business machinery (the `Business`
    model, `from_graph` dispatch, the postgres 'business' CHECK, layer0
    metabolism, and the MOBILIZE verb's business-target path) was plumbed but
    never exercised by a real playthrough.

    FACTS VERIFIED against the reference DB (data/sqlite/marxist-data-3NF.sqlite),
    correcting two claims in the survey brief:

    1. County-grain QCEW is 6-digit-leaf only (survey CORRECT): for Wayne
       County (fips 26163, 2024) `fact_qcew_annual` carries only naics_level=6
       rows (860 private leaves). The naics_level=2 rows exist in dim_industry
       as dimension entries but are NOT populated at county grain, so 2-digit
       sector employment must be AGGREGATED from the 6-digit leaves via
       `dim_industry.sector_code`.
    2. `dim_industry.industry_title` is a generated placeholder ("Industry 62")
       — NEVER used. Real 2-digit titles come from the NAICS_2DIGIT_SECTORS
       comment vocabulary in `domain/economics/throughput/adapters.py`,
       promoted to accessible data in the generator's `_SECTOR_TITLES`.

    3. Scenario builders take NO reference-DB session at build time (they are
       pure geometry/hardcode: ~1118 H3 res-3 hexes for us_nationwide, ~81 for
       wayne_county), and those H3 hexes carry no county FIPS. So per-hex QCEW
       placement is impossible today (the known "USScenario res-3 inversion"
       county-keying gap), and DB access at build time would violate the
       deterministic-data-artifacts doctrine (CI never touches the drive).

    4. THE EVENT-FLOOD PREMISE WAS INACCURATE. The survey warned that "layer0
       emits one ORGANIZATIONAL_ACTION event per Business per tick." It does
       not. `OODASystem.step` (spec-116 FR-116-4.7, `engine/systems/ooda.py`
       :217-229) already AGGREGATES every per-Business layer0 ActionResult into
       ONE summary `ORGANIZATIONAL_ACTION` bus event per tick (payload =
       {layer0_count, action_count, org_count}); the per-business results ride
       `turn_resolution.layer0_results` (persistent_data), never the bus, and
       are NOT persisted as `action_result` rows (only player `pending` actions
       are). The only per-business cost that scales is the serialized
       turn_resolution payload + the per-tick layer0/OODA loops, both hard-
       capped at max_orgs=1000 (beyond which businesses are SILENTLY dropped).
  decision: |
    Ownership + placement. Employment is taken from PRIVATE ownership
    (own_code='5') only — a `Business` models privately-owned capital
    employing wage labour; government agencies are Institutions/StateApparatus.
    Aggregation REUSES the house consumer
    `SQLiteQCEWCountyNAICSSource.get_county_employment_by_naics` byte-for-byte
    for the county scope (6-digit leaves -> combined 2-digit labels via
    sector_code; INCLUDES BLS-imputed leaves — a suppressed cell is real
    employment the DB imputed, excluding it would undercount). The national
    scope mirrors that exact policy in one SQL GROUP BY over all counties.
    `class_character = BOURGEOIS` is a domain judgment (capital), not data.

    SEEDING SHAPE. A committed, hash-stamped artifact
    `src/babylon/data/game/business_seeds.json` (generated by
    `tools/generate_business_seeds.py`) holds, per scope, the top K=5 2-digit
    NAICS sectors by employment. Two scopes: "US" (national aggregate) and
    "26163" (Wayne County). A single shared runtime builder,
    `engine/scenarios/business_seeds.py::build_seeded_businesses(scope,
    territory_ids)` (DRY — one function, two call sites), constructs the frozen
    `Business` models: deterministic id (`BIZ_US_01`.., `BIZ_WAYNE_01`..),
    honest name from REAL components ("United States Healthcare", "Wayne County
    Manufacturing" = real geography + real sector, no invented firm names),
    real `employment_count`, `naics_2digit`, `sector`. Every absent-real-data
    field (revenue, surplus_extraction_rate, constant/variable capital) keeps
    its model default — no wages->revenue mapping, no invented surplus rates.
    us_nationwide seeds "US" businesses on the player's HQ territories;
    wayne_county seeds "26163" businesses on the player's Detroit periphery
    hexes. The player org is inserted FIRST so
    `list(organizations.values())[0]` stays the player org (bridge-pipeline /
    contract-parity ordering contract). Placement is a mechanical anchor so the
    businesses are MOBILIZE-eligible and fog-reachable (get_mobilize_targets
    walks the player's territory_ids); it is NOT a spatial-distribution claim
    (per-hex QCEW distribution is future work, gated on the county-keyed
    territory refactor). Determinism (III.7): ORDER BY employment DESC then
    label ASC everywhere; identical DB -> identical artifact (content_hash) ->
    identical org ids/order; no RNG.

    EVENT-FLOOD DECISION: CAP seeding at K=5 (an explicitly-sanctioned "cap
    seeding counts" design) AND rely on the pre-existing summary-event
    aggregation. No engine change. MEASURED on a real us_nationwide session
    (probe): 6 orgs total (1 player + 5 businesses); per tick exactly 1
    ORGANIZATIONAL_ACTION bus event (payload layer0_count=5, NOT 5 events),
    layer0_results length = 5, turn_resolution json = 4058 bytes (constant).
    The rejected naive per-hex alternative would be 1118 territories x 5 = 5590
    businesses, exceeding max_orgs=1000 by 4590 (silent drops = a correctness
    bug). Both the small-K cap and the summary aggregation are pinned by
    `tests/unit/engine/scenarios/test_business_seed_event_volume.py`.

    INERT-EMPLOY DISCLOSURE: layer0 emits an EMPLOY ActionResult per Business
    per tick that layer3 ignores (a NO-OP); Business NPCs are skipped in the
    action phase. So seeded businesses are, for now, MOBILIZE/fog/doctrine
    TARGETS with real material size, but have NO economic behaviour of their
    own. Wiring EMPLOY into wages/production/surplus is explicitly FUTURE WORK
    (it needs owner-ratified design: which classes a business employs, at what
    wage/surplus, feeding which system) — not smuggled in here.
  consequences: |
    - `create_us_scenario`: 1 -> 6 organizations. `create_wayne_county_scenario`:
      2 -> 7 organizations. Three exact-count tests updated to the honest new
      counts (each references `len(build_seeded_businesses(scope, []))`, not a
      magic number, so a future K change does not re-break them):
        * tests/unit/engine/scenarios/test_us_scenario_player_org.py (was == 1)
        * tests/integration/test_state_ai_wayne_county.py (was == 2)
        * tests/unit/test_contract_parity.py (was == 2)
    - A latent bug was SURFACED (not introduced) and fixed: adding Detroit
      businesses made a wayne_county territory's org-network degree centrality
      1/9, exposing that `web/game/engine_bridge.py::_centrality_by_territory`
      rounded to 4 places while the `get_org_network` endpoint (same
      `_org_network_centrality`) returns full precision — a drift the lens's
      own test (`test_aw4_centrality_lens.py`) declares must not exist. Fix:
      the lens now returns the full-precision reading (display rounding belongs
      at the render layer); no baseline captures centrality, so nothing moved.
    - qa:regression stays 5/5 BYTE-IDENTICAL: the 5 regression scenarios use
      only the two_node/imperial_circuit builders (zero orgs, zero businesses);
      headless e2e baselines hydrate via headless_runner/scopes.py, never these
      builders — so this change moves NO baseline, which is the proof of
      correct scoping.
    - Regeneration: `poetry run python tools/generate_business_seeds.py`
      (optional `--year`); commit the JSON and note the new content_hash.
  verification: |
    Data spot-verified against the raw DB: Wayne Healthcare(62) 2024 = 116,760;
    Wayne Manufacturing(31-33) = 89,659; US Healthcare(62) = 22,046,994 — all
    match the artifact exactly (real US private healthcare ~22M is realistic).
    Gates:
      - `mise run qa:regression` 5/5 byte-identical.
      - `mise run test:q -- tests/unit/engine/ tests/unit/web/
        tests/unit/organizations/ tests/integration/test_state_ai_wayne_county.py`
        green (3349 tests after the centrality fix).
      - New tests green: test_business_seeds.py (16, incl. drive-gated DB
        re-derivation through the house consumer), test_business_seed_event_volume.py,
        test_us_scenario_player_org.py::TestSeedsRealBusinesses, and the MOBILIZE
        integration in test_engine_bridge.py::TestMobilizeTargetsIncludeSeededBusinesses.
      - `poetry run mypy src` clean; `poetry run ruff check .` clean;
        `mise run check:sentinels` all 11.
  references:
    - "tools/generate_business_seeds.py (generator), src/babylon/data/game/business_seeds.json (artifact, content_hash cee4f198...)"
    - "src/babylon/engine/scenarios/business_seeds.py (shared runtime builder), _legacy.py + _legacy_wayne.py (two call sites)"
    - "src/babylon/domain/economics/throughput/adapters.py::SQLiteQCEWCountyNAICSSource.get_county_employment_by_naics (REUSED house consumer; NAICS_2DIGIT_SECTORS / _sector_codes_for)"
    - "src/babylon/engine/systems/ooda.py:217-229 (pre-existing summary-event aggregation, spec-116 FR-116-4.7) + ooda/layer0.py (inert EMPLOY)"
    - "web/game/engine_bridge.py::_centrality_by_territory (surfaced-drift fix), tests/unit/web/test_aw4_centrality_lens.py (the no-drift contract)"
    - "models/entities/organization.py::Business (fields id/name/class_character/sector required; revenue/surplus/capital keep defaults = future work)"
