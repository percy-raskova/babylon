  ADR099_archive_stack:
    title: 'Program 24 (The Archive) stack ADR: spike-evidenced TUI pins — Textual >=8.2,<8.3 direct (hover/palette/theme verified, 10k fuzzy 56.9ms), fenced-directives-ONLY markdown pipeline on markdown-it-py 4.2 (paired container tokens break the 8.2.8 walker; one MarkdownFence subclass dispatches on token.info; unknown directives fail loud), ~30-line wikilink inline rule emitting standard link tokens with babylon:// hrefs (redlink register for unknowns), Jinja2 3.1.6 ImmutableSandbox+StrictUndefined (dunder/mutation SecurityError tested), Postgres FTS epistemic search (fog = WHERE clause), dulwich 1.2 sim-time vault commits (identical shas across independent builds; stage/commit moved to WorkTree), half-block floor (200x50 full-repaint 58.2ms/frame headless) + kitty-graphics raster lane via textual-image 0.13 (detect-before-boot; sixel is not a target), snapshot lane REAL FINDING: pytest-textual-snapshot 1.1.0''s syrupy==4.8.0 pin IMPOSSIBLE beside pytest 9.1.1 — resolved with syrupy>=5.5 + dep-override install, SVG double-bake sha256-identical (III.13 render-lane evidence); deployment guardrails bound into the keel (DSN-from-config unix-socket, PG17 pin, Ollama->WorkersAI->mute, per-campaign embedding pin, telemetry cadence never in GameDefines). Three Kitty eyes-on items remain owner-verifiable (TGP/ssh, map feel, real-mouse hover)'
    status: accepted
    date: '2026-07-20'
    file: ADR099_archive_stack.yaml
  ADR098_parquet_canonical_reference:
    title: 'Parquet-canonical reference pipeline EXECUTED (Phase 6 cutover, #46): per-table parquet sources + schema.sql canonical, the SQLite reference DB a deterministic sha-pinned BUILD PRODUCT (double-build byte-identical on sqlite 3.53.1, product f760bab5...); working DB flipped with byte-verified pre-parquet backup; ci-data-v7 (subset DERIVED from the product, 80 parquet + schema.sql manifest-pinned); loaders produce sources only (tools/loader_to_sources.py) — the shared DB is never opened for write; D1-D4 as ruled, GOVERNED_PREFIXES single SoT, demotion-handoff law, index-order fidelity, ingest_checkpoint out of the estate; IMPORT_USE discovered ALREADY LANDED out-of-band so the dark-Φ consumers lit up with zero code changes; declared follow-ups: CI-devshell sqlite pinning for the nightly rebuild-verify leg (loud off-pin warning until then), auto-create-masks-absence sentinel still owed. NOTE: numbered 098 because 094-097 are claimed by the nix-player-channel packet on the concurrently-active dev line'
    status: accepted
    date: '2026-07-20'
    file: ADR098_parquet_canonical_reference.yaml
  ADR097_render_seam:
    title: 'The render seam under Amendment W: glyph canon (Tier 0) as the design target rather than the fallback (the entire fleet including GNOME Terminal/VTE and Windows Terminal has no pixel protocol -- everything the game communicates is communicated in character cells), the information-parity rule (Tier 1 pixel plates via textual-image+pillow re-render Tier-0 information and never carry unique content), Tier 2 SVG export through Textual''s native mechanism under the ratified III.13 determinism law, babylon doctor probe-once capability semantics (render_tier written to config, no mid-session re-probe, --render override, declared degradation), and the 256-color degraded palette as a DESIGN_BIBLE 9b row -- queue items 15 and 10'
    status: accepted
    date: '2026-07-20'
    file: ADR097_render_seam.yaml
  ADR096_inference_lane_mechanics:
    title: 'Inference lane mechanics under Amendment V: bundled CPU llama-server over Ollama as the local default (loopback-only, lifecycle owned by the babylon process, one binary serving /v1/chat/completions and /v1/embeddings from sha256-pinned local gguf weights), provider precedence bundled -> detected-external -> Cloudflare-if-keyed -> mute, the signed model manifest (weights outside the Nix store in ~/.local/share/babylon/models/, hosted in the babylon-data R2 bucket, per-campaign embedding pins), the babylon_intel least-privilege Postgres role (SELECT on Hoist projections + INSERT on narrator-prose/embedding tables only, one migration), and the embedding-dimension schema seam (bge-m3 vector(1024), bge-base-en-v1.5 vector(768)) -- queue items 11/12/13; item 6 resolved by A7.5 (sentence-transformers and torch leave the tree); item 9 premium metering deliberately deferred'
    status: accepted
    date: '2026-07-20'
    file: ADR096_inference_lane_mechanics.yaml
  ADR095_packaging_train:
    title: 'The Packaging Train opening moves: the babylon CLI entry-point contract ([project.scripts] babylon = babylon.cli:app with subcommands play/doctor/login/telemetry/self-update/uninstall), the dependency extras split (server extra absorbs ansible-dev-tools, rstcheck, doc8, boto3, Django, DRF, django-cors-headers, gunicorn) plus deletion of the stdlib-shadowing uuid ^1.30 relic, and the single-lock fork ruled U -- uv adopted at the packaging train with uv2nix consuming the same lock, Poetry-two-locks (K) recorded as the fallback -- queue items 4, 5, 8; untouched by Amendments V/W/X'
    status: accepted
    date: '2026-07-20'
    file: ADR095_packaging_train.yaml
  ADR094_nix_channel_deployment:
    title: 'Nix Player Channel deployment mechanics under X.8: ed25519 narinfo-signing keypair (secret to CI only, public key baked into install.sh CACHE_KEY), cache.babylon.percypedia.biz custom-domain target served through the cache-worker front door (workers.dev interim, r2.dev never), Terraform-import obligation for the hand-provisioned live Cloudflare state assigned to babylon-infra with a Terraform-owns-resources / wrangler-owns-Workers boundary, deploy-workers.yml wrangler pin as a deploy precondition (action default 3.90.0 predates wrangler.jsonc support), monthly regression-gated nixpkgs pin cadence under Amendment-L discipline, and hypergraph-rs as a pinned flake input gated on port parity -- queue items 1-2 recorded as executed by X.8/X.1, this ADR proposes only the mechanics'
    status: accepted
    date: '2026-07-20'
    file: ADR094_nix_channel_deployment.yaml
