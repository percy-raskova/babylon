  ADR087_mass_work_solidarity_producer:
    title: 'Wire the org->class SOLIDARITY producer for real (Unit 6, ADR073/ADR085 write side): EDUCATE/PROPAGANDIZE/PROVIDE_SERVICE create-or-strengthen a MASS_LINK-amplified edge (engine/actions/_mass_work.py), DoctrineSystem decays it per tick, ConsciousnessSystem''s read side is rewritten to gate org sources on solidarity_strength (not class_consciousness -- orgs have none); rebuilt doctrine-consciousness contract test against real graph shapes (PoliticalFaction/SocialClass -> WorldState.to_graph(), real resolve_campaign dispatch, never a hand-stamped edge); new vocabulary-sentinel rule (d) catches exactly the fixture-fabrication class that hid this gap; qa:regression 5/5 byte-identical (zero orgs in the 5 canonical scenarios)'
    status: accepted
    date: '2026-07-19'
    file: ADR087_mass_work_solidarity_producer.yaml
  ADR086_business_seeding:
    title: 'Seed real-QCEW Business organizations into the canonical playable scenarios (us_nationwide + wayne_county): a committed, hash-stamped deterministic seed artifact (business_seeds.json) generated from fact_qcew_annual PRIVATE-sector employment (6-digit leaves folded to 2-digit NAICS via sector_code, imputed leaves included per house policy, REUSING get_county_employment_by_naics), a single shared builder both scenario builders call (DRY), capped at K=5 top-sectors per scope so org count stays far under the engine max_orgs=1000 cap; honest names (real geography + real sector), only real-data fields set (employment/naics/sector), all others keep model defaults; event-flood a NON-ISSUE — the survey premise was wrong, OODA already aggregates per-business layer0 into ONE ORGANIZATIONAL_ACTION summary/tick (MEASURED: 6 orgs, 1 event/tick, 4058-byte payload; naive per-hex would be 5590 > cap); economic behaviour (EMPLOY) explicitly future work; surfaced+fixed a latent 4dp rounding drift in _centrality_by_territory; qa:regression 5/5 byte-identical (zero-org regression scenarios prove scope)'
    status: accepted
    date: '2026-07-19'
    file: ADR086_business_seeding.yaml
