        vintage: Quarterly
        granularity: National/Sector
        cadence: Quarterly
        class: Runtime
      - id: Census_Trade
        agency: Census Bureau
        dataset: USA Trade Online
        vintage: Annual
        granularity: Port/State
        cadence: Annual
        class: Runtime
      - id: PWT
        agency: University of Groningen
        dataset: Penn World Table
        vintage: Annual
        granularity: Country
        cadence: Annual
        class: Runtime
      - id: USAspending
        agency: Treasury
        dataset: USASpending.gov
        vintage: Quarterly
        granularity: Recipient/County
        cadence: Quarterly
        class: Runtime
