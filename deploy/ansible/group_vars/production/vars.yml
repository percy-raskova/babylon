---

# ---- Repository ----
git_repo: "https://github.com/percy-raskova/babylon.git"
git_branch: main
setup_git_repo: true

# ---- Project Naming ----
project_name: babylon
application_name: babylon_web

# ---- Python ----
# Debian 13 (trixie) ships Python 3.12+ natively
enable_deadsnakes_ppa: false
virtualenv_python_version: python3
base_python_package: python3

# ---- Security ----
server_user: root

# ---- Database ----
db_user: babylon
db_name: babylon
db_password: "{{ vault_db_password }}"
postgresql_version: 17

# ---- Gunicorn ----
gunicorn_num_workers: 3
gunicorn_max_requests: 1000
gunicorn_timeout_seconds: 120

# ---- Django ----
django_settings_file: "babylon_web.settings.production"
django_secret_key: "{{ vault_django_secret_key }}"
django_project_dir: "{{ project_path }}/web"
run_django_db_migrations: true
run_django_collectstatic: true
use_poetry: true

# ---- Django Environment (matches env vars Django reads in base.py) ----
django_environment:
  DJANGO_SETTINGS_MODULE: "{{ django_settings_file }}"
  DJANGO_SECRET_KEY: "{{ django_secret_key }}"
  POSTGRES_DB: "{{ db_name }}"
  POSTGRES_USER: "{{ db_user }}"
  POSTGRES_PASSWORD: "{{ db_password }}"
  POSTGRES_HOST: "/var/run/postgresql"
  POSTGRES_PORT: ""
  ALLOWED_HOSTS: "babylon.percypedia.biz"
  STATIC_ROOT: "{{ nginx_static_dir }}"

# ---- Nginx ----
nginx_server_name: "babylon.percypedia.biz"
nginx_use_letsencrypt: false
nginx_use_cloudflare_origin_pull: true
ssl_crt: "{{ vault_ssl_crt }}"
ssl_key: "{{ vault_ssl_key }}"

# ---- R2 Backup ----
r2_access_key_id: "{{ vault_r2_access_key_id }}"
r2_secret_access_key: "{{ vault_r2_secret_access_key }}"
r2_account_id: "{{ vault_r2_account_id }}"
r2_endpoint: "https://{{ r2_account_id }}.r2.cloudflarestorage.com"
r2_backup_bucket: babylon-backups
rclone_remote_name: r2

# ---- Firewall ----
# IMPORTANT: Replace OPERATOR_IP with your actual IP before deploying
firewall_ssh_allowed_ipv4:
  - "OPERATOR_IP/32"

firewall_ssh_allowed_ipv6: []

# ---- Cloudflare IP Ranges ----
cloudflare_authenticated_origin_pull_ca_url: "https://developers.cloudflare.com/ssl/static/authenticated_origin_pull_ca.pem"

