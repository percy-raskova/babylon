---
- name: Run backup smoke check
  hosts: webservers
  become: true
  gather_facts: true

  tasks:
    - name: Run backup script once
      ansible.builtin.command: "{{ backup_script_path | default('/usr/local/bin/backup-postgres.sh') }}"
      changed_when: true

    - name: Verify backup object exists in R2 daily prefix
      become_user: "{{ backup_user | default(server_user) }}"
      ansible.builtin.command: >-
        rclone lsf {{ rclone_remote_name | default('r2') }}:{{ r2_backup_bucket | default('babylon-backups') }}/daily/
        --include "babylon-{{ ansible_date_time.date }}.sql.zst"
      register: backup_smoke_lsf
      changed_when: false

    - name: Assert backup smoke check passed
      ansible.builtin.assert:
        that:
          - backup_smoke_lsf.stdout | trim != ""
        fail_msg: "Backup smoke check failed: today's backup object was not found in R2 daily/ prefix."
        success_msg: "Backup smoke check passed: today's backup object exists in R2 daily/ prefix."
