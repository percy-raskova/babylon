# playbooks/bootstrap.yml
- name: Initial server bootstrap
  hosts: webservers
  remote_user: root
  gather_facts: yes
  tasks:
    - name: Create deploy user
      user:
        name: deploy
        shell: /bin/bash
        groups: sudo
        append: yes

    - name: Deploy SSH key
      authorized_key:
        user: deploy
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Configure passwordless sudo
      copy:
        dest: /etc/sudoers.d/deploy
        content: "deploy ALL=(ALL) NOPASSWD: ALL"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Allow custom SSH port in UFW
      community.general.ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp

    - name: Allow HTTP and HTTPS
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ["80", "443"]

    - name: Set UFW defaults and enable
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Deploy hardened sshd_config
      template:
        src: ../roles/common/templates/sshd_config.j2
        dest: /etc/ssh/sshd_config
        validate: '/usr/sbin/sshd -t -f %s'
      notify: restart sshd

  handlers:
    - name: restart sshd
      service: name=sshd state=restarted
