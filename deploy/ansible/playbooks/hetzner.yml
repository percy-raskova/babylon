---
# Hetzner VPS Configuration Playbook
# Configures newly provisioned Hetzner VPS servers

- name: Configure Hetzner VPS Servers
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    timezone: "Asia/Jakarta"
    swap_size_mb: 2048
    docker_compose_version: "2.24.0"
    enable_dokploy: false
    dokploy_domain: ""

  pre_tasks:
    - name: Wait for system to be ready
      wait_for_connection:
        timeout: 300

    - name: Gather facts
      setup:

  tasks:
    # ============================================
    # SYSTEM CONFIGURATION
    # ============================================

    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Install essential packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - nano
          - htop
          - iotop
          - iftop
          - net-tools
          - dnsutils
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
          - apt-transport-https
          - build-essential
          - python3
          - python3-pip
          - unzip
          - jq
          - rsync
        state: present

    # ============================================
    # SWAP CONFIGURATION
    # ============================================

    - name: Check if swap exists
      stat:
        path: /swapfile
      register: swap_file

    - name: Create swap file
      command: fallocate -l {{ swap_size_mb }}M /swapfile
      when: not swap_file.stat.exists

    - name: Set swap file permissions
      file:
        path: /swapfile
        mode: '0600'
      when: not swap_file.stat.exists

    - name: Make swap
      command: mkswap /swapfile
      when: not swap_file.stat.exists

    - name: Enable swap
      command: swapon /swapfile
      when: not swap_file.stat.exists

    - name: Add swap to fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present
      when: not swap_file.stat.exists

    # ============================================
    # SECURITY HARDENING
    # ============================================

    - name: Install security packages
      apt:
        name:
          - ufw
          - fail2ban
          - unattended-upgrades
        state: present

    - name: Configure UFW default policies
      ufw:
        state: enabled
        policy: "{{ item.policy }}"
        direction: "{{ item.direction }}"
      loop:
        - { direction: 'incoming', policy: 'deny' }
        - { direction: 'outgoing', policy: 'allow' }

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow HTTPS through UFW
      ufw:
        rule: allow
        port: '443'
        proto: tcp

    - name: Configure fail2ban for SSH
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 5
          bantime = 3600
          findtime = 600
      notify: Restart fail2ban

    - name: Harden SSH configuration
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^PermitRootLogin', line: 'PermitRootLogin prohibit-password' }
        - { regexp: '^X11Forwarding', line: 'X11Forwarding no' }
        - { regexp: '^MaxAuthTries', line: 'MaxAuthTries 3' }
      notify: Restart SSH

    - name: Enable unattended upgrades
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}";
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";

    # ============================================
    # DOCKER INSTALLATION
    # ============================================

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Configure Docker daemon
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "storage-driver": "overlay2"
          }
      notify: Restart Docker

    # ============================================
    # DOKPLOY INSTALLATION (Optional)
    # ============================================

    - name: Install Dokploy
      shell: |
        curl -sSL https://dokploy.com/install.sh | bash
      when: enable_dokploy
      args:
        creates: /etc/dokploy/.installed

    - name: Configure Dokploy domain
      shell: |
        dokploy domain set {{ dokploy_domain }}
      when: enable_dokploy and dokploy_domain != ""

    # ============================================
    # MONITORING TOOLS (Optional)
    # ============================================

    - name: Install monitoring tools
      apt:
        name:
          - sysstat
          - iotop
          - nethogs
        state: present

  handlers:
    - name: Restart fail2ban
      systemd:
        name: fail2ban
        state: restarted

    - name: Restart SSH
      systemd:
        name: sshd
        state: restarted

    - name: Restart Docker
      systemd:
        name: docker
        state: restarted
