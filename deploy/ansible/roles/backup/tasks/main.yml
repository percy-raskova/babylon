---

- name: Install rclone and zstd
  ansible.builtin.apt:
    name:
      - rclone
      - zstd
    state: present
    update_cache: "{{ update_apt_cache | default(true) }}"

- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: "/home/{{ backup_user }}/.config/rclone"
    state: directory
    owner: "{{ backup_user }}"
    group: "{{ backup_group }}"
    mode: "0700"

- name: Deploy rclone config for Cloudflare R2
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "/home/{{ backup_user }}/.config/rclone/rclone.conf"
    owner: "{{ backup_user }}"
    group: "{{ backup_group }}"
    mode: "0600"

- name: Deploy backup script
  ansible.builtin.template:
    src: backup-postgres.sh.j2
    dest: "{{ backup_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Create daily backup cron job
  ansible.builtin.cron:
    name: babylon postgres backup
    minute: "{{ backup_daily_minute }}"
    hour: "{{ backup_daily_hour }}"
    user: "{{ backup_user }}"
    job: "{{ backup_script_path }} 2>&1 | logger -t babylon-backup"

- name: Create weekly backup copy cron job
  ansible.builtin.cron:
    name: babylon weekly backup copy
    minute: "{{ backup_weekly_minute }}"
    hour: "{{ backup_weekly_hour }}"
    weekday: "{{ backup_weekly_weekday }}"
    user: "{{ backup_user }}"
    job: >-
      rclone copy {{ rclone_remote_name }}:{{ r2_backup_bucket }}/daily/babylon-$(date +\%Y-\%m-\%d).sql.zst
      {{ rclone_remote_name }}:{{ r2_backup_bucket }}/weekly/ 2>&1 | logger -t babylon-backup-weekly
