---

- name: Add the PostgreSQL repository key to the apt trusted keys
  ansible.builtin.apt_key: url=https://www.postgresql.org/media/keys/ACCC4CF8.asc
           state=present

- name: Add the PostgreSQL repository to the apt sources list
  ansible.builtin.apt_repository:
    repo: >-
      deb http://apt.postgresql.org/pub/repos/apt/
      {{ ansible_distribution_release }}-pgdg main
    update_cache: "{{ update_apt_cache }}"
    state: present

- name: Ensure locale is available
  community.general.locale_gen: name=en_US.UTF-8

- name: Install PostgreSQL
  ansible.builtin.apt:
    update_cache: "{{ update_apt_cache }}"
    state: present
    name:
      - "postgresql-{{ postgresql_version | default(17) }}"
      - "postgresql-contrib-{{ postgresql_version | default(17) }}"
      - "postgresql-{{ postgresql_version | default(17) }}-postgis-3"
      - "postgresql-{{ postgresql_version | default(17) }}-pgvector"
      - "{{ base_python_package }}-psycopg2"
  tags: packages

- name: Ensure the PostgreSQL service is running
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Ensure database is created
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    encoding: UTF-8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present

- name: Ensure user has access to the database
  become: true
  become_user: postgres
  community.postgresql.postgresql_user: db={{ db_name }}
                   name={{ db_user }}
                   password={{ db_password }}
                   encrypted=yes
                   state=present

# If objs is omitted for type "database", it defaults to the database
# to which the connection is established
- name: Grant database privileges to the user.
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    db: "{{ db_name }}"
    privs: ALL
    type: database
    role: "{{ db_user }}"

- name: Grant schema public to the user.
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    db: "{{ db_name }}"
    privs: ALL
    type: schema
    objs: public
    role: "{{ db_user }}"

- name: Ensure user does not have unnecessary privileges
  become: true
  become_user: postgres
  community.postgresql.postgresql_user: name={{ db_user }}
                   role_attr_flags=NOSUPERUSER,NOCREATEDB
                   state=present

- name: Create PostGIS extension
  become: true
  become_user: postgres
  community.postgresql.postgresql_ext:
    name: postgis
    db: "{{ db_name }}"

- name: Create pgvector extension
  become: true
  become_user: postgres
  community.postgresql.postgresql_ext:
    name: vector
    db: "{{ db_name }}"

- name: Tune PostgreSQL for 8GB RAM
  become: true
  become_user: postgres
  community.postgresql.postgresql_set:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
  loop:
    - { name: shared_buffers, value: "2GB" }
    - { name: effective_cache_size, value: "6GB" }
    - { name: work_mem, value: "16MB" }
    - { name: maintenance_work_mem, value: "512MB" }
  notify: Restart postgresql
