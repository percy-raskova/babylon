---

- name: Export requirements.txt from Poetry
  ansible.builtin.command:
    cmd: /root/.local/bin/poetry export -f requirements.txt --without-hashes --without dev -o requirements.txt
    chdir: "{{ project_path }}"
  when: use_poetry | default(false) | bool
  changed_when: true

- name: Install packages required by the Django app inside virtualenv
  ansible.builtin.pip:
    virtualenv: "{{ virtualenv_path }}"
    requirements: "{{ requirements_file }}"
    extra_args: "{{ pip_use_upgrade_flag | ternary('--upgrade', omit) }}"
  notify: Restart application

- name: Run the Django syncdb command
  community.general.django_manage:
    command: syncdb
    app_path: "{{ django_project_dir | default(project_path) }}"
    virtualenv: "{{ virtualenv_path }}"
    settings: "{{ django_settings_file }}"
  environment: "{{ django_environment }}"
  when: run_django_syncdb is defined and run_django_syncdb
  tags: django.syncdb

- name: Run Django database migrations
  community.general.django_manage:
    command: migrate
    app_path: "{{ django_project_dir | default(project_path) }}"
    virtualenv: "{{ virtualenv_path }}"
    settings: "{{ django_settings_file }}"
  environment: "{{ django_environment }}"
  when: run_django_db_migrations is defined and run_django_db_migrations
  tags: django.migrate

- name: Run Django collectstatic
  community.general.django_manage:
    command: collectstatic
    app_path: "{{ django_project_dir | default(project_path) }}"
    virtualenv: "{{ virtualenv_path }}"
    settings: "{{ django_settings_file }}"
  environment: "{{ django_environment }}"
  when: run_django_collectstatic is defined and run_django_collectstatic
  notify: Restart application
  tags: django.collectstatic
