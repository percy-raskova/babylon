---
# spec 061 T022: install the babylon-web.service unit for systemd.
# Companion to setup_supervisor.yml (which remains in place per
# the spec 061 out-of-scope note in plan.md — Celery + supervisor
# topology is not migrated by this spec).

- name: Install babylon-web.service systemd unit (spec 061 X.4 compliance)
  ansible.builtin.template:
    src: babylon-web.service.j2
    dest: /etc/systemd/system/babylon-web.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
  tags:
    - systemd
    - deploy

- name: Enable babylon-web.service for boot
  ansible.builtin.systemd:
    name: babylon-web.service
    enabled: true
    daemon_reload: true
  tags:
    - systemd
