---
# Ansible Galaxy collection requirements for the live Babylon deployment tree.
#
# Install with:
#   ansible-galaxy collection install -r requirements.yml
#
# Use sites (verified 2026-07-11 against deploy/ansible/{site,dbservers,webservers}.yml,
# deploy/ansible/playbooks/{bootstrap,hetzner,backup-smoke}.yml, and the live roles
# base/firewall/web/nginx/backup/db):
collections:
  - name: ansible.posix
    # base role: create_swap_file.yml -> ansible.posix.mount
    version: ">=1.5.0"

  - name: community.general
    # bootstrap.yml + hetzner.yml -> community.general.ufw
    # db role -> community.general.locale_gen
    # web role -> community.general.supervisorctl, community.general.django_manage
    version: ">=8.0.0"

  - name: community.postgresql
    # db role -> postgresql_db, postgresql_user, postgresql_privs, postgresql_ext,
    # postgresql_set
    version: ">=3.0.0"
