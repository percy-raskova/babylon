# Babylon isolated Postgres — tuned config (spec-087 FR-004).
#
# Sized for a >=16 GB dev host running the canonical headless simulation
# (bulk per-tick INSERT workload, single writer, disposable data).
# Mounted read-only by docker-compose.yml and selected via
# `postgres -c config_file=...`. When overriding config_file the image's
# default listen_addresses is lost, so it MUST be set here.

listen_addresses = '*'
max_connections = 100

# --- Memory -----------------------------------------------------------------
shared_buffers = 4GB                  # ~1/8 of a 32 GB host
effective_cache_size = 12GB
maintenance_work_mem = 1GB
work_mem = 64MB

# --- WAL / checkpoints (bulk-insert friendly) ---------------------------------
max_wal_size = 8GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
wal_compression = zstd                # PG15+; cuts full-page-write volume

# --- Autovacuum ----------------------------------------------------------------
# Per-tick tables are append-only; insert-triggered vacuum (PG13+) keeps
# visibility maps fresh for index-only scans without waiting for 20% churn.
autovacuum_vacuum_insert_scale_factor = 0.05

# --- Observability (spec-087 S5) ----------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
track_io_timing = on
log_min_duration_statement = 1000     # log statements slower than 1s

# NOTE: synchronous_commit stays ON cluster-wide; it is switched off for the
# `test` role only (docker/postgres/initdb/01-babylon-init.sql, FR-005) —
# safe because per-tick writes are idempotent and crash-resume replays
# deterministically from the last committed tick (Constitution III.7).
