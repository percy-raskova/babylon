[build-system]
requires = [
    "poetry-core>=2.0.0,<3.0.0",
]
build-backend = "poetry.core.masonry.api"

[tool.pyright]
extraPaths = ["."]

# ── Import-boundary contracts (Program 14, Phase 1) ─────────────────────────
# Runtime layering law: kernel < models/formulas < domain < engine. Engine may
# import downward; nothing imports the engine back. TYPE_CHECKING imports are
# excluded — annotations may reference upward, the import graph may not.
# Run: poetry run lint-imports (wired into mise check + pre-commit + CI).
[tool.importlinter]
root_packages = ["babylon"]
exclude_type_checking_imports = true

[[tool.importlinter.contracts]]
name = "the domain must not import the engine (kernel abstractions only)"
type = "forbidden"
source_modules = ["babylon.domain"]
forbidden_modules = ["babylon.engine"]

[[tool.importlinter.contracts]]
name = "persistence must not import the engine"
type = "forbidden"
source_modules = ["babylon.persistence"]
forbidden_modules = ["babylon.engine"]

[[tool.importlinter.contracts]]
name = "formulas are pure math — no engine imports"
type = "forbidden"
source_modules = ["babylon.formulas"]
forbidden_modules = ["babylon.engine"]

[[tool.importlinter.contracts]]
name = "kernel is layer 0 — imports nothing above itself"
type = "forbidden"
source_modules = ["babylon.kernel"]
forbidden_modules = [
    "babylon.engine",
    "babylon.topology",
    "babylon.persistence",
    "babylon.models",
    "babylon.formulas",
    "babylon.config",
    "babylon.ooda",
    "babylon.intelligence",
    "babylon.domain",
]

[[tool.importlinter.contracts]]
name = "topology (graph substrate) must not import the engine"
type = "forbidden"
source_modules = ["babylon.topology"]
forbidden_modules = ["babylon.engine"]
