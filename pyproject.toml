[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "babylon_web.settings.testing"
pythonpath = [
    "src",
    "web",
]
testpaths = [
    "tests",
]
norecursedirs = [
    "mutants",
    ".mutmut-cache",
    "html",
    ".hypothesis",
]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
doctest_optionflags = [
    "NORMALIZE_WHITESPACE",
    "ELLIPSIS",
]
markers = [
    "unit: Fast unit tests for isolated components (no I/O, no AI)",
    "math: Deterministic mathematical formulas (fast, pure functions)",
    "ledger: Economic/Political state tests (fast, deterministic)",
    "topology: Graph/Network operations (fast, deterministic)",
    "integration: Database/Postgres tests (medium, I/O bound)",
    "ai: AI/RAG evaluation tests (slow, non-deterministic)",
    "red_phase: TDD RED phase tests (intentionally failing until GREEN phase)",
    "slow: Long-running scenario tests (2000+ ticks, multi-minute runtime)",
    "scenario: Full simulation scenario tests (multi-tick arcs, state verification)",
    "theory_rent: Imperial rent and unequal exchange mechanics",
    "theory_rift: Metabolic rift and ecological limits mechanics",
    "theory_solidarity: Solidarity transmission and consciousness mechanics",
    "property: Property-based tests using Hypothesis",
    "theory: Marxian theory validation tests (Capital Volume 2 reproduction schema)",
    "empirical: Empirical validation tests requiring real QCEW data (deselect with '-m \"not empirical\"')",
    "benchmark: Performance and memory benchmarks for tensor operations",
    "requires_postgres: Tests requiring a running PostgreSQL instance (skipped if unavailable)",
    "postgres: Tests using testcontainers ephemeral PostgreSQL (requires Docker)",
    "invariant: Marx value-form & software metamorphic invariant tests (spec-060)",
    "cross_scale: marks tests for spec 062 cross-scale integration",
    "contract: Contract tests pinning cross-boundary interfaces (tests/contract/)",
    "requires_reference_db: Tests needing the reference SQLite DB (data/sqlite/marxist-data-3NF.sqlite) — excluded on the dev CI tier; main/nightly include them via the CI subset artifact (item 40)",
]
# Enforce marker/config strictness via ini options: the --strict-markers /
# --strict-config addopts entries were a verified NO-OP under pytest 9.0.3
# (collecting a file with an unknown marker exited 0). The ini options are
# the working form — verified: unknown marker now fails collection (exit 2).
strict_markers = true
strict_config = true
addopts = [
    "-v",                      # Verbose output (already have)
    "--tb=short",              # Short traceback format (already have)
    "-ra",                     # Show summary of all test outcomes (already have)

    # Performance
    "--durations=10",          # Show 10 slowest tests

    # Coverage (when running with --cov)
    "--cov-report=term-missing",  # Show lines missing coverage
    "--cov-report=html",          # Generate HTML coverage report

    # Output control
    "--color=yes",             # Force colored output

    # Debugging aids
    "-l",                      # Show locals (shorter alias)

]

# JUnit XML reporting (no-ops unless --junit-xml is passed; the test:* mise
# tasks pass --junit-xml=reports/test-results/<task>/junit.xml).
# Verbose, machine-readable defaults for AI-agent consumption.
junit_suite_name = "babylon"
junit_family = "xunit2"            # Modern schema with richer per-testcase metadata
junit_logging = "all"              # Embed stdout, stderr, AND log records into the XML
junit_log_passing_tests = true     # Capture logs even for passing tests
junit_duration_report = "call"     # Test-call duration only (excludes setup/teardown noise)

[tool.ruff]
line-length = 100
target-version = "py312"
src = [
    "src",
    "web",
]
exclude = [
    "assets/music/",
    "specs/",
    "src/frontend/",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "C90",
    "UP",
    "ARG",
    "SIM",
    "S",
]
ignore = [
    "E501",
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = [
    "babylon",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "ARG001",
    "ARG002",
    "S101",  # asserts are pytest's language
    "S102",  # exec in import-surface tests is the point of the test
    "S103",  # chmod on fixtures (executable-bit setup)
    "S105",  # fixture passwords
    "S106",  # fixture passwords
    "S108",  # /tmp literals as nonexistent-path/scratch fixtures
    "S112",  # try/except/continue in property-test harnesses
    "S301",  # pickle round-trip tests exercise serialization deliberately
    "S311",  # seeded randomness in strategies
    "S603",  # subprocess smoke tests invoke our own CLIs with literal args
    "S607",  # subprocess smoke tests invoke our own CLIs with literal args
    "S608",  # SQL literals in test fixtures
]
"web/**" = [
    "ARG001",
]
# The DEBUG-mode fake bridge: random fake data + best-effort side writes are
# its design, not a defect (game/apps.py falls back to it without RUN_MAIN).
"web/game/stub_bridge.py" = [
    "S110",
    "S311",
]
"tools/**" = [
    "C901",
    "SIM",
    "S101",  # asserts in dev tooling (incl. the qa:regression harness)
    "S108",  # /tmp scratch in bootstrap tooling
    "S112",  # audit tooling skips unparseable entries by design
    "S311",  # seeded sim RNG in benches/monte-carlo — same III.7 rationale as src
    "S603",  # subprocess for dev tooling
    "S607",  # subprocess for dev tooling
    "S608",  # SQL literals in local loaders (operator-run, no external input)
]
"scripts/**" = [
    "C901",
    "SIM",
]
"src/**" = [
    "S311",  # seeded determinism IS the product (Constitution III.7) — sim RNG is never a security token
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
mypy_path = "src:web"
explicit_package_bases = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
exclude = [
    "tests/",
    "build/",
    "dist/",
    "assets/music/",
    "specs/",
    "src/frontend/",
    "src/babylon_data/",
]
plugins = [
    "pydantic.mypy",
    "mypy_django_plugin.main",
]

[[tool.mypy.overrides]]
module = [
    "alembic.*",
    "h3",
    "h3.*",
    "tomli",
    "pgvector.*",
    "gunicorn.*",
    "corsheaders.*",
]
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "babylon_web.settings.development"

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.3.0"
tag_format = "v$version"
version_files = [
    "pyproject.toml:version",
]
update_changelog_on_bump = true

