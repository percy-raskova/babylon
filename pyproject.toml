ignore_roles = [
    "hope",
    "hopedim",
]
ignore_directives = [
    "mermaid",
    "todo",
    "automodule",
    "autoclass",
    "autofunction",
    "autosummary",
    "toctree",
    "only",
]
ignore_substitutions = [
    "release",
    "version",
]

[tool.hypothesis]
deadline = 500
max_examples = 100

[tool.babylon.cross_scale]
# Spec 062 cross-scale integration tunables (FR-029 / FR-029a / FR-046 / FR-004a).
# These mirror the EconomyDefines fields and document the default values for
# YAML/CLI overrides. See specs/062-cross-scale-integration/data-model.md §2.5.
alpha_annual = 0.01            # FR-029: annual capital-equalization rate
epsilon_conservation = 1e-10   # FR-046: conservation-residual tolerance
scenario_length_years = 15     # FR-004a: immutable scenario length

[tool.babylon.logging]
