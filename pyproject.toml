[project]
name = "babylon"
version = "0.3.0"
description = "A Marxist text-based role playing game powered by Claude. It aims to educate and entertain by turning the immortal science of dialectical materialism into a game engine."
readme = "README.md"
license = "AGPL-3.0-or-later"
authors = [
    { name = "Persephone Raskova", email = "percy@babylonrpg.com" },
]
keywords = [
    "ai",
    "llm",
    "marxism",
    "rpg",
    "dystopian",
]
requires-python = ">=3.12,<4.0"
# Poetry 2.x hybrid mode (PEP 621 metadata + Poetry dependency tables):
# classifiers are auto-derived; dependencies stay under [tool.poetry.*].
dynamic = ["classifiers", "dependencies"]

[tool.poetry]
packages = [
    { include = "babylon", from = "src" },
    # babylon_data: thin Python wrapper around the data trove at
    # /media/user/data/babylon-data/. src/babylon_data is a symlink to that
    # path (committed in git). Restored from commit 4ce7c96a^ in the
    # post-Spec-059 skip-remediation pass. See ADR-037.
    { include = "babylon_data", from = "src" },
]

[project.urls]
Homepage = "https://babylonrpg.com"
Documentation = "https://github.com/bogdanscarwash/babylon#readme"
Issues = "https://github.com/bogdanscarwash/babylon/issues"
Source = "https://github.com/bogdanscarwash/babylon"

