openapi: 3.1.0
info:
  title: Babylon Health Endpoints
  version: 1.0.0
  description: |
    Two-tier health endpoints per FR-009 (clarified).
    Public `/health/` is suitable for orchestrator liveness probes (systemd, Cloudflare).
    Auth-gated `/health/detail/` exposes engine bridge identity and diagnostics
    to staff users only; unauthenticated callers receive 404 (security through obscurity).

paths:
  /health/:
    get:
      summary: Public liveness probe
      description: |
        Returns HTTP 200 with a minimal JSON payload whenever the Django process
        is responding to requests. Does not check engine bridge state — the
        intent is to confirm the worker process is alive, not to confirm the
        application is fully operational. Use `/health/detail/` for that.
      operationId: healthCheck
      security: []  # No authentication required.
      responses:
        "200":
          description: Worker process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicHealthResponse"
              examples:
                ok:
                  value:
                    status: "ok"

  /health/detail/:
    get:
      summary: Auth-gated engine diagnostic
      description: |
        Returns engine bridge identity, boot retry count, database pool state,
        embedding model pin, application version, and git SHA.
        Requires `request.user.is_staff == True`.
        Unauthenticated and non-staff callers receive HTTP 404 (NOT 401/403)
        to avoid disclosing the endpoint's existence.
      operationId: healthDetail
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Authenticated staff caller — full diagnostic payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthDetailResponse"
              examples:
                healthy:
                  value:
                    engine:
                      implementation: "EngineBridge"
                      boot_attempts: 1
                      boot_succeeded_at: "2026-05-11T15:00:00Z"
                      last_tick_resolved_at: "2026-05-11T15:30:42Z"
                    database:
                      reachable: true
                      pool_size:
                        min: 1
                        max: 4
                        active: 2
                    embedding_model:
                      model_id: "sentence-transformers/all-mpnet-base-v2"
                      dimension: 768
                    version: "0.61.0"
                    git_sha: "abc1234"
                degraded:
                  description: Engine booted but database connection lost mid-session.
                  value:
                    engine:
                      implementation: "EngineBridge"
                      boot_attempts: 1
                      boot_succeeded_at: "2026-05-11T15:00:00Z"
                      last_tick_resolved_at: "2026-05-11T15:25:00Z"
                    database:
                      reachable: false
                      pool_size:
                        min: 1
                        max: 4
                        active: 0
                    embedding_model:
                      model_id: "sentence-transformers/all-mpnet-base-v2"
                      dimension: 768
                    version: "0.61.0"
                    git_sha: "abc1234"
        "404":
          description: |
            Returned for ALL of: unauthenticated callers, authenticated non-staff
            callers, and (incidentally) genuinely missing routes. The body is
            byte-identical to DRF's standard 404 response (`{"detail": "Not found."}`),
            so no information is disclosed about whether the endpoint exists or what
            credential class is required.

            Implementation: a custom DRF `EXCEPTION_HANDLER` intercepts
            `NotAuthenticated`/`PermissionDenied` raised by `HealthDetailView` and
            rewrites the response to this 404. This pattern avoids DRF issue #7529
            (raising Http404 from has_permission() breaks BrowsableAPIRenderer).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundResponse"

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sessionid
      description: |
        Django session cookie. The user must additionally have `is_staff == True`.
        Failed permission check returns 404 per FR-009 clarification.

  schemas:
    PublicHealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: ["ok"]
      additionalProperties: false

    HealthDetailResponse:
      type: object
      required: [engine, database, embedding_model, version, git_sha]
      properties:
        engine:
          $ref: "#/components/schemas/EngineDiagnostic"
        database:
          $ref: "#/components/schemas/DatabaseDiagnostic"
        embedding_model:
          $ref: "#/components/schemas/EmbeddingModelDiagnostic"
        version:
          type: string
          description: Application semantic version.
          example: "0.61.0"
        git_sha:
          type: string
          description: Short git SHA of the running deployment.
          minLength: 7
          maxLength: 40
          example: "abc1234"

    EngineDiagnostic:
      type: object
      required: [implementation, boot_attempts, boot_succeeded_at]
      properties:
        implementation:
          type: string
          description: Class name of the active engine bridge.
          example: "EngineBridge"
        boot_attempts:
          type: integer
          description: Number of boot retry attempts at last successful initialization (1-3).
          minimum: 1
          maximum: 3
        boot_succeeded_at:
          type: string
          format: date-time
          description: UTC ISO 8601 timestamp of successful engine init.
        last_tick_resolved_at:
          type: ["string", "null"]
          format: date-time
          description: |
            UTC ISO 8601 timestamp of the most recent successful tick resolution,
            or null if no tick has been resolved since boot.

    DatabaseDiagnostic:
      type: object
      required: [reachable, pool_size]
      properties:
        reachable:
          type: boolean
          description: |
            False indicates a degraded post-boot state (DB connection lost mid-session).
            Endpoints that depend on the engine return 503 in this state per FR-010.
        pool_size:
          type: object
          required: [min, max, active]
          properties:
            min:
              type: integer
              minimum: 0
            max:
              type: integer
              minimum: 1
            active:
              type: integer
              minimum: 0
              description: Connections currently checked out from the pool.

    EmbeddingModelDiagnostic:
      type: object
      required: [model_id, dimension]
      properties:
        model_id:
          type: string
          description: Pinned sentence-transformers model identifier (Constitution III.6).
        dimension:
          type: integer
          enum: [768]
          description: Canonical embedding dimension.

    NotFoundResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          example: "Not found."
      additionalProperties: false
