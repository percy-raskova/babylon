openapi: 3.1.0
info:
  title: LODES Commute Matrix Loader Contract
  version: 1.0.0
  description: |
    Loader that reads the on-disk LODES Origin-Destination dataset for one
    simulated year and returns a `scipy.sparse.csr_matrix` indexed by H3 res-7
    hex cells.

    Implements FR-001 / FR-001a (JT00 only) / FR-001b (S000 only) /
    FR-002 (H3 res-7 indexing) / FR-003 (year-scoped) / FR-004 (year clamp) /
    FR-005 (deterministic) / FR-006 (immutable within a year) /
    FR-007 (study-area pruning).

    Constitution II.12 (Matrix Layer): the returned matrix is `csr_matrix`,
    not dense. Constitution III.7 (Determinism): repeated loads produce
    bit-identical matrices.

    Owner subsystem: economics. The loader is the engine's ONLY access path
    to the OD matrix; cross-subsystem callers MUST go through `load_year()`.

paths: {}

components:
  schemas:
    LODESLoaderConfig:
      type: object
      required:
        - lodes_root
        - crosswalk_path
        - study_area_hexes
        - study_area_states
      properties:
        lodes_root:
          type: string
          description: Absolute filesystem path to the LODES dataset root (contains od/ subdirectory).
          example: "/media/user/data/babylon-data/lodes"
        crosswalk_path:
          type: string
          description: Absolute filesystem path to us_xwalk.csv.gz.
          example: "/media/user/data/babylon-data/lodes/us_xwalk.csv.gz"
        study_area_hexes:
          type: array
          items: { type: string }
          description: >
            H3 res-7 cell IDs of the study area (loader prunes OD pairs
            that touch neither origin nor destination in this set per FR-007).
          minItems: 1
          example: ["872a307affffff7", "872a307a0ffffff"]
        study_area_states:
          type: array
          items:
            type: string
            pattern: "^[0-9]{2}$"
          description: 2-digit FIPS state codes (e.g. "26" for Michigan); used to scope `_main_` file selection.
          minItems: 1
          example: ["26"]

    LODESYearMatrix:
      type: object
      required:
        - year
        - matrix_shape
        - n_nonzero
        - origin_count
        - dest_count
        - dest_kind_breakdown
        - row_sums_summary
      properties:
        year:
          type: integer
          description: The simulated year this matrix represents (post-FR-004 clamp if applicable).
          example: 2010
        matrix_shape:
          type: array
          items: { type: integer }
          minItems: 2
          maxItems: 2
          description: (n_origins, n_destinations).
          example: [1700, 2400]
        n_nonzero:
          type: integer
          description: Count of nonzero entries in the CSR matrix (~10K-30K expected for tri-county).
          example: 28350
        origin_count:
          type: integer
          description: Number of distinct origin hexes (matrix rows).
          example: 1700
        dest_count:
          type: integer
          description: Number of distinct destination IDs (matrix cols), including external boundary buckets.
          example: 2400
        dest_kind_breakdown:
          type: object
          properties:
            hex: { type: integer }
            external: { type: integer }
          description: >
            Count of dest cols by NodeKind. (canada and rest_of_usa
            columns count as external.)
          example: { hex: 2398, external: 2 }
        row_sums_summary:
          type: object
          properties:
            min: { type: number }
            max: { type: number }
            mean: { type: number }
            zeros:
              type: integer
              description: >
                count of origin hexes with row_sum == 0 — these are
                FR-011 carry-forward cases
          example: { min: 0.0, max: 14823.0, mean: 412.6, zeros: 47 }

  responses:
    InvalidConfig:
      description: One or more LODESLoaderConfig fields failed validation.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "lodes_root path does not exist: /tmp/missing"

  parameters:
    YearParameter:
      name: year
      in: query
      required: true
      schema:
        type: integer
        minimum: 2010
        maximum: 2099
      description: >
        The simulated year to load. If outside available_years(), the
        loader applies FR-004 nearest-year clamp.

  examples:
    LoadYearReturn:
      summary: Successful load for Detroit tri-county 2010
      value:
        year: 2010
        matrix_shape: [1700, 2400]
        n_nonzero: 28350
        origin_count: 1700
        dest_count: 2400
        dest_kind_breakdown: { hex: 2398, external: 2 }
        row_sums_summary: { min: 0.0, max: 14823.0, mean: 412.6, zeros: 47 }

    YearClamp:
      summary: clamp_to_available(2025) for a dataset covering 2010-2021
      value:
        requested_year: 2025
        clamped_year: 2021
        audit_message: "LODES coverage ends at 2021; clamped 2025 → 2021 for session bb84c2a1-..."
