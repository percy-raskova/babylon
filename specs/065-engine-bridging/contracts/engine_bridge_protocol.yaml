contract: engine_bridge_protocol
contract_version: "1.0"
feature: 065-engine-bridging
description: >-
  The WorldState ↔ Postgres bridge protocol. Declares the surface
  the runner uses to hydrate the in-memory WorldState at session
  init, mutate it via existing engine systems each tick, and persist
  the delta back to Postgres per the spec-062 transaction envelope.

  The protocol is implemented by the new WorldStateBridge class in
  src/babylon/engine/headless_runner/bridge.py. Test doubles
  satisfying this protocol live in tests/integration/fixtures/.

protocol_class: "WorldStateBridge"
module_path: "babylon.engine.headless_runner.bridge"

constructor:
  signature: "__init__(self, runtime: PostgresRuntime, defines: GameDefines) -> None"
  preconditions:
    - "runtime.pool is open and has applied migrations 0001..0023"
    - "defines is a frozen Pydantic GameDefines instance"

methods:

  hydrate_initial:
    signature: "hydrate_initial(self, session_id: UUID, scope_fips: frozenset[str]) -> WorldState"
    purpose: >-
      Build the initial in-memory WorldState from the tick-0 hex_state
      that the upgraded hex hydrator wrote during initialize_session.
      Reads from view_runtime_trace_emission at tick = 0 to assemble
      county-level economic state, plus dynamic_external_node_state
      for boundary nodes (e.g., Canada).
    side_effects:
      - "Subscribes EventCapture.on_event to the engine's EventBus"
      - "Initializes BoundaryFlowRegister"
      - "If endgame_detector is configured, imports and instantiates it"
    returns: "WorldState (Pydantic frozen) — but mutable graph topology"
    raises:
      - "ReferenceDataMissingError if any county in scope_fips lacks a tick-0 hex_state row"
      - "PostgresUnreachableError on pool error"

  persist_tick:
    signature: "persist_tick(self, world: WorldState, tick: int, determinism_hash: str) -> None"
    purpose: >-
      Serialize the WorldState's per-county and per-hex state into
      a PerTickTransactionEnvelope, then call runtime.persist_tick_atomic.
      The envelope carries:
        - hex_state_rows  (from world.graph nodes of type 'hex')
        - external_node_rows  (from world.graph nodes of type 'external_node')
        - boundary_register_rows  (from BoundaryFlowRegister.flush())
        - audit_rows  (from ConservationAuditor.audit_log_buffer)
        - consciousness_state_rows  (NEW; from world.consciousness_simplex)
        - demographics_state_rows   (NEW; from world.demographics_per_county)
        - employment_state_rows     (NEW; from world.employment_per_county)
    determinism_hash:
      description: >-
        SHA-256 of canonical-JSON of all envelope row contents,
        plus the tick number and session_id. Stored alongside the
        audit log row for replay verification (Constitution III.7).
    atomicity: >-
      The whole envelope writes inside a single Postgres transaction
      via spec-062's persist_tick_atomic; partial writes are rolled
      back on any constraint violation or exception.

  refresh_event_log:
    signature: "refresh_event_log(self) -> tuple[EngineEvent, ...]"
    purpose: >-
      Drain the EventCapture buffer accumulated since the last call.
      Returns events in emission order per FR-018.
    invariant: "Idempotent: calling twice in a row returns empty the second time"

  set_endgame_detector:
    signature: "set_endgame_detector(self, dotted_path: str) -> None"
    purpose: >-
      Resolves dotted_path via importlib + getattr, validates that
      the resolved object satisfies the EndgameDetector Protocol,
      and stores it for poll_endgame() to check each tick.
    raises:
      - "ConfigError if dotted_path doesn't resolve or doesn't implement EndgameDetector"

  poll_endgame:
    signature: "poll_endgame(self, world: WorldState, tick: int) -> EndgameEvent | None"
    purpose: >-
      If an EndgameDetector is configured, invoke its check on the
      current WorldState. Return the detected end-game event (with
      tick, condition, details), or None if no detector or no event.
    called_by: "runner._tick_loop after persist_tick"
    halt_behavior: "Runner halts the loop and sets exit_reason='early_terminated' on positive return"

state_invariants:

  - name: bridge_one_session_one_lifetime
    rule: "A WorldStateBridge instance is bound to a single session_id at construction time"
    enforced_by: "session_id frozen as instance attribute; mutating it raises AttributeError"

  - name: hydrate_initial_called_once
    rule: "hydrate_initial may only be called once per bridge instance"
    enforced_by: "internal _hydrated flag; second call raises RuntimeError"

  - name: post_tick_world_unchanged_until_next_tick
    rule: "After persist_tick(world, tick), the bridge does NOT re-read from Postgres until the next persist_tick"
    rationale: >-
      The engine systems mutate world in-place between ticks; the
      bridge trusts the in-memory state as canonical between persists.
      This is the hydrate-once cost amortization per R3.

  - name: determinism_hash_includes_engine_systems_invoked
    rule: >-
      The determinism_hash passed to persist_tick MUST include the
      ordered list of engine system class names invoked during the
      tick (per data-model §4.1). This makes engine-system add/remove
      between runs visible as hash drift, satisfying III.7.

forbidden_operations:

  - "Direct table writes outside persist_tick_atomic"
  - "Reading from any dynamic_county_*_state table OUTSIDE view_runtime_trace_emission (II.11)"
  - "Mutating WorldState fields the bridge wrote at hydrate_initial during the tick loop"
  - "Persisting partial state when an engine system raised an exception"

test_doubles:

  fake_world_state_bridge:
    location: "tests/integration/fixtures/fake_bridge.py"
    purpose: "Unit-test the runner's tick loop without Postgres"
    behavior: >-
      Builds a fixed WorldState from a JSON fixture; persist_tick is a
      no-op; refresh_event_log returns a configured event list per
      tick. Used by tests/unit/engine/headless_runner/test_runner_with_fake_bridge.py.

interaction_diagram:

  description: >-
    Sequence per tick, from the runner's perspective. See
    data-model.md §6 for the runner state-diagram view.
  steps:
    - "runner._tick_loop iter T begins"
    - "event_capture.set_tick(T)"
    - "engine.run_tick(world.graph, services, context_T)"
    - "engine systems fire EventBus.publish(...) → event_capture.on_event(...) appends"
    - "auditor.audit_end_of_tick(world, T) → populates audit_log_buffer"
    - "if endgame_detector: detector.check(world, T) → maybe halt"
    - "bridge.persist_tick(world, T, determinism_hash)"
    - "    → envelope with hex/external/boundary/audit/consciousness/demographics/employment rows"
    - "    → runtime.persist_tick_atomic(envelope) — one Postgres transaction"
    - "if --strict and any audit row severity='critical': runner exits 1"
    - "runner._tick_loop iter T ends"
