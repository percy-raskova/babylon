  equity_factor: 0.6  # Feature 043: Absolute threshold test on equity required for LA classification. Formerly a population-level numeric scaler. (>= 0.0, <= 1.0)
  base_class_solidarity:  # Game design: symmetric 5x5 class-pair base solidarity matrix. 15 unique values (upper triangle including diagonal). Class proximity yields higher base solidarity.
