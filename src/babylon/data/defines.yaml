# =====================================================================
# Babylon — Canonical Game Configuration (defines.yaml)
# =====================================================================
#
# This is THE single source of truth for every tunable game coefficient.
# It is the player-moddable config file: change a value below, restart the
# simulation, and the game behaves differently — the way Paradox grand-strategy
# games expose their rules (but YAML, not INI).
#
# HOW TO MOD:
#   1. Edit any value below. Keep the YAML structure, key names, and value types
#      intact — the inline comment on each line gives its meaning and valid range.
#   2. Restart the simulation. `GameDefines.load_default()` reads this file
#      (src/babylon/data/defines.yaml) and applies your values.
#   3. To revert to the shipped defaults, delete this file OR regenerate it:
#        poetry run python tools/generate_defines_config.py
#
# NOTES:
#   * This file is GENERATED from the `GameDefines` Pydantic schema. Do not add
#     new keys by hand — add the field to the schema and regenerate. Hand-edited
#     VALUES are honored; hand-added structure may be ignored by the loader.
#   * A category omitted here falls back to its schema defaults; a value omitted
#     within a present category falls back to that field's default.
#   * See docs/how-to/modding-defines.rst for the full modding guide.
#
# Generated by tools/generate_defines_config.py — do not edit the structure by hand.
# =====================================================================


# ---------------------------------------------------------------------
# crisis — Crisis and Devaluation Mechanics coefficients (Feature 018).
# ---------------------------------------------------------------------
crisis:
  crisis_period_ticks: 13  # Game design: ticks per crisis evaluation period (13 = quarterly, prime for desync). (>= 1, <= 52)
  r_threshold: 0.05  # Profit rate threshold below which crisis accumulates (> 0, <= 1)
  n_consecutive: 3  # Game design: consecutive below-threshold periods for crisis onset. (>= 1, <= 20)
  m_recovery: 2  # Game design: consecutive above-threshold periods for recovery start. (>= 1, <= 20)
  r_cap: 8  # Game design: maximum recovery duration (periods). (>= 1, <= 52)
  hysteresis_coefficient: 0.5  # Game design: recovery hysteresis: effective = normal * (1 - h^k). (> 0, < 1)
  wage_compression_rate: 0.02  # Game design: per-period wage compression during DEEP crisis. (>= 0, <= 0.5)
  wage_compression_floor_ratio: 0.8  # Game design: wage floor as fraction of subsistence (below = accumulation halt). (>= 0, <= 1)
  bifurcation_solidarity_weight: 1.0  # Game design: weight for solidarity density in bifurcation formula (w_s). (>= 0)
  bifurcation_burden_weight: 1.0  # Game design: weight for class burden ratio in bifurcation formula (w_b). (>= 0)
  class_burden_epsilon: 0.001  # Engineering: division-by-zero guard for class burden ratio. Must be > 0 and small relative to burden values. (> 0, <= 0.1)
  bifurcation_event_threshold: 0.5  # Game design: |score| threshold for BIFURCATION_THRESHOLD event emission. (>= 0, <= 1)
  dispossession_cascade_milestones:  # Game design: LA share decline milestones for DISPOSSESSION_CASCADE events.
  - 0.05
  - 0.1
  - 0.15
  stagnation_credit_growth: 0.01  # Credit expansion rate threshold for stagnation phase diagnosis (>= 0.0, <= 0.5)

# ---------------------------------------------------------------------
# mobilize — Configuration for MOBILIZE verb organizational actions.
# ---------------------------------------------------------------------
mobilize:
  mobilize_cl_cost: 0.2  # [M] Consciousness Layer cost to initiate mobilization. (>= 0.0)
  min_consciousness: 0.4  # [M] Minimum target consciousness required to sustain mobilization. (>= 0.0, <= 1.0)
  turnout_per_sl: 0.01  # [M] Percentage of population mobilized per Solidarity Level invested. (>= 0.0)
  solidarity_amplification_per_edge: 0.05  # [M] Solidarity multiplier applied per inbound solidaristic edge. (>= 0.0)
  heat_generation_per_demonstrator: 0.001  # [M] Heat generated per mobilized person. (>= 0.0)
  base_agitation_gain: 0.05  # [M] Base agitation level added to target territory on success. (>= 0.0)
  strike_value_disruption_factor: 0.1  # [M] Percentage of extracted value disrupted by strike action. (>= 0.0, <= 1.0)
  max_demonstrators_before_backfire: 100000  # [M] Maximum demonstrators before backfire dynamic engages. (>= 0)
  backfire_heat_multiplier: 2.0  # [M] Heat penalty multiplier when mobilization backfires. (>= 1.0)
  backfire_agitation_gain: 0.15  # [M] Reverse agitation added due to backfire effect. (>= 0.0)

# ---------------------------------------------------------------------
# economy — Economic system coefficients.
# ---------------------------------------------------------------------
economy:
  extraction_efficiency: 0.8  # α = 0.8: imperial extraction capacity (Amin/Emmanuel unequal exchange theory). (>= 0.0, <= 1.0)
  comprador_cut: 0.9  # Fraction of wealth kept by comprador class (prevents Comprador Liquidation) (>= 0.0, <= 1.0)
  base_labor_power: 1.0  # Base value produced per tick by worker with full biocapacity (>= 0.0)
  super_wage_rate: 0.2  # Fraction of tribute paid as super-wages (>= 0.0, <= 1.0)
  superwage_multiplier: 1.0  # PPP multiplier for labor aristocracy purchasing power (>= 0.0)
  superwage_ppp_impact: 0.5  # How much extraction translates to PPP bonus (>= 0.0, <= 1.0)
  initial_rent_pool: 100.0  # Starting imperial rent pool (>= 0.0)
  pool_high_threshold: 0.7  # Pool ratio for prosperity mode (>= 0.0, <= 1.0)
  pool_low_threshold: 0.3  # Pool ratio for austerity mode (>= 0.0, <= 1.0)
  pool_critical_threshold: 0.1  # Pool ratio for ECONOMIC_CRISIS (>= 0.0, <= 1.0)
  min_wage_rate: 0.05  # Minimum super-wage rate during crisis (>= 0.0, <= 1.0)
  max_wage_rate: 0.35  # Maximum super-wage rate during prosperity (>= 0.0, <= 1.0)
  subsidy_conversion_rate: 0.1  # Rate at which wealth converts to repression (>= 0.0, <= 1.0)
  subsidy_trigger_threshold: 0.8  # P(S|R)/P(S|A) ratio threshold for subsidy (>= 0.0, <= 1.0)
  shadow_wage_hourly: 15.43  # Shadow labor hourly rate (BLS 31-1120 home health aide median, May 2023) (>= 0.0)
  negligible_rent: 0.01  # Engineering: noise filter. Rent below this threshold skips event emission to prevent bus saturation. (>= 0.0)
  negligible_subsidy: 0.01  # Engineering: noise filter. Subsidy below this threshold skips processing to prevent bus saturation. (>= 0.0)
  base_subsistence: 0.0005  # Biological floor: fixed cost per tick (LINEAR), scaled by class multiplier (>= 0.0, <= 0.5)
  death_threshold: 0.001  # Engineering: zombie prevention failsafe. Entities below this wealth threshold are removed to prevent infinite-deficit accumulation. (>= 0.0)
  trpf_coefficient: 0.0005  # Rate at which extraction efficiency declines per tick (TRPF surrogate) (>= 0.0, <= 0.01)
  rent_pool_decay: 0.002  # Background evaporation rate of imperial rent pool per tick (>= 0.0, <= 0.01)
  bribery_wage_delta: 0.05  # Wage increase during prosperity (BRIBERY policy) (>= -1.0, <= 1.0)
  austerity_wage_delta: -0.05  # Wage cut during low pool (AUSTERITY policy) (>= -1.0, <= 1.0)
  iron_fist_repression_delta: 0.1  # Repression increase during high tension (IRON_FIST policy) (>= 0.0, <= 1.0)
  crisis_wage_delta: -0.15  # Emergency wage cut during crisis (>= -1.0, <= 1.0)
  crisis_repression_delta: 0.2  # Emergency repression spike during crisis (>= 0.0, <= 1.0)
  bribery_tension_threshold: 0.7  # Maximum capital_labor opposition gap for bribery policy (C1.5). (>= 0.0, <= 1.0)
  iron_fist_tension_threshold: 0.5  # Minimum capital_labor opposition gap for iron fist policy (C1.5). (>= 0.0, <= 1.0)
  trpf_efficiency_floor: 0.1  # Minimum extraction efficiency after TRPF decay (>= 0.0, <= 1.0)
  leontief_rent:  # Tunables for the Leontief imperial-rent integration (Spec 057)
    qcew_carry_forward_max_years: 5  # Maximum look-back window in years for the QCEW carry-forward fallback in the industry-to-county allocator; 0 disables carry-forward (strict no-data semantics). (>= 0, <= 20)
    phi_hour_outlier_threshold_low: -1000.0  # Per-county phi_hour values below this trigger a PhiHourOutlierEvent via EventBus (Spec 057 / FR-008). Pre-clamp negative values cannot reach phi_hour because of the two-layer axiom enforcement (research.md §R5); this threshold is defense-in-depth and validation only.
    phi_hour_outlier_threshold_high: 1000.0  # Per-county phi_hour values above this trigger a PhiHourOutlierEvent via EventBus (Spec 057 / FR-008).
  alpha_annual: 0.01  # Annual capital-equalization rate alpha (Spec 062, FR-029). Geometric weekly form derived via alpha_weekly(alpha_annual). Default 0.01 matches HexEqualizationComputer's prior calibration. (>= 0.0, < 1.0)
  epsilon_conservation: 1.0e-10  # Conservation-residual tolerance epsilon (Spec 062, FR-046 / SC-002). Audit rows with |residual| <= epsilon receive severity='ok'. (> 0.0, <= 0.001)
  scenario_length_years: 15  # Immutable scenario length in years (Spec 062, FR-004a). Reference-series copy spans [start_year, start_year + scenario_length_years]. (>= 1, <= 200)
  coefficient_lookup_policies:  # Per-series lookup policies for the immutable_reference_* family (Spec 062, FR-011 / data-model.md §2.5). The default registry covers the 11 canonical series enumerated in data-model.md §2.5.
    bea_io_intermediate:
      series_id: bea_io_intermediate
      policy: slowly_varying
      canonical_reference: BEA Make-Use 2010-2024
    bea_io_imports:
      series_id: bea_io_imports
      policy: slowly_varying
      canonical_reference: BEA Imports Matrix 2010-2024
    melt_tau:
      series_id: melt_tau
      policy: slowly_varying
      canonical_reference: MELT τ annual aggregate
    basket_gamma:
      series_id: basket_gamma
      policy: slowly_varying
      canonical_reference: Basket visibility γ
    erdi_ratio:
      series_id: erdi_ratio
      policy: slowly_varying
      canonical_reference: ERDI productivity ratios
    hickel_drain:
      series_id: hickel_drain
      policy: slowly_varying
      canonical_reference: Hickel et al. Φ_year
    qcew_wages:
      series_id: qcew_wages
      policy: slowly_varying
      canonical_reference: BLS QCEW annual wages
    bea_reis_rent:
      series_id: bea_reis_rent
      policy: slowly_varying
      canonical_reference: BEA REIS rent series
    fred_fed_funds_rate:
      series_id: fred_fed_funds_rate
      policy: event_discrete
      canonical_reference: FRED FEDFUNDS
    regulatory_regime:
      series_id: regulatory_regime
      policy: event_discrete
      canonical_reference: Federal regulatory regime
    datacenter_came_online:
      series_id: datacenter_came_online
      policy: event_discrete
      canonical_reference: Datacenter commission events
  initial_c_to_v_ratio: 2.0  # Initial organic composition of capital used by the hex hydrator: per-hex c = v * initial_c_to_v_ratio. Default 2.0 is a mid-range Marxist OCC; downstream specs can re-calibrate empirically. (>= 0.0, <= 10.0)
  initial_k_to_v_ratio: 10.0  # Initial capital-stock to variable-capital ratio used by the hex hydrator: per-hex K = v * initial_k_to_v_ratio. Default 10.0 approximates a ~10-year accumulated K relative to annual wages. (>= 0.0, <= 50.0)
  border_commute_share: 0.5  # Spec 063, FR-034 — fraction of Detroit-Windsor personal-vehicle crossings attributable to commuters (vs tourists/shoppers). Default 0.50 traces to Workforce WindsorEssex 2017 Cross-Border Employment Report: ~6,120 commuters / ~12K daily personal-vehicle crossings. Constitution III.1: cited, not magic. (> 0.0, <= 1.0)
  enable_border_commute_synthesis: false  # Spec 063, FR-031 — opt-in flag for the Option B border-commute synthesis loader (BTS + StatCan + WWE share anchor). When True, session init reads BTS Border Crossing CSV from data-trove/border_crossings/ and merges synthesized weekly Canadian-bound aggregate rows into the LODES year matrix. When False, behavior is identical to the LODES-only path.

# ---------------------------------------------------------------------
# survival — Survival calculus coefficients.
# ---------------------------------------------------------------------
survival:
  steepness_k: 10.0  # Game design: sigmoid sharpness in acquiescence probability. (> 0.0)
  default_subsistence: 0.3  # Game design: minimum wealth for survival through compliance. (>= 0.0, <= 1.0)
  default_organization: 0.1  # Game design: fallback organization value. (>= 0.0, <= 1.0)
  default_repression: 0.5  # Game design: fallback repression value. (>= 0.0, <= 1.0)
  revolution_threshold: 1.0  # Game design: tipping point for P(S|R) formula. (> 0.0)
  repression_base: 0.5  # Game design: base resistance to revolution in denominator. (>= 0.0, <= 1.0)

# ---------------------------------------------------------------------
# vitality — Mortality coefficients for Mass Line population dynamics.
# ---------------------------------------------------------------------
vitality:
  base_mortality_factor: 0.01  # Game design: fraction of at-risk population that dies per tick. (>= 0.0, <= 1.0)
  inequality_impact: 1.0  # Game design: how strongly inequality affects marginal wealth (1.0=full effect). (>= 0.0, <= 2.0)
  attrition_base_factor: 0.5  # Base multiplier in grinding attrition: deficit * (factor + inequality) (>= 0.0, <= 2.0)

# ---------------------------------------------------------------------
# solidarity — Solidarity and consciousness transmission coefficients.
# ---------------------------------------------------------------------
solidarity:
  scaling_factor: 0.5  # = consciousness.sensitivity (k=0.5): solidarity transmission at same scale as material sensitivity. (>= 0.0, <= 2.0)
  activation_threshold: 0.3  # p_c ≈ 0.3: network percolation threshold for social graphs with ⟨k⟩ ≈ 3-4. (>= 0.0, <= 1.0)
  mass_awakening_threshold: 0.6  # Game design: target consciousness for MASS_AWAKENING event. (>= 0.0, <= 1.0)
  negligible_transmission: 0.01  # Engineering: noise filter. Transmissions below this threshold are skipped to prevent O(n^2) edge saturation. (>= 0.0)
  superwage_impact: 1.0  # Game design: how much imperial extraction affects Core wealth. (>= 0.0)

# ---------------------------------------------------------------------
# behavioral — Behavioral economics coefficients.
# ---------------------------------------------------------------------
behavioral:
  loss_aversion_lambda: 2.25  # Game design: Kahneman-Tversky loss aversion coefficient (empirical ~2.25). (> 0.0)

# ---------------------------------------------------------------------
# tension — Tension dynamics coefficients.
# ---------------------------------------------------------------------
tension:
  accumulation_rate: 0.05  # Game design: rate at which tension accumulates from wealth gaps. (>= 0.0, <= 1.0)
  aspect_flip_threshold: 1.0  # Threshold of aspect_balance to trigger an aspect flip. (>= 0.0)
  antagonistic_intensity_threshold: 0.8  # Intensity threshold where a contradiction becomes antagonistic. (>= 0.0, <= 1.0)
  resolution_intensity_threshold: 1.0  # Maximum intensity indicating rupture/resolution. (>= 0.0, <= 1.0)
  rupture_gap_threshold: 0.9  # Principal-opposition gap above which — AND while rising — a RUPTURE fires. 0.9 keeps the pacified bridged decade (empirical capital_labor gap band ~[0.03, 0.67]) rupture-free (hegemony holds per project/02 §3); genuine extreme asymmetry (gap > 0.9) still ruptures. The rising-gate replaces the old fire-on-hitting-1.0 ceiling. (>= 0.0, <= 1.0)
  principal_rate_weight: 10.0  # Weight of |rate| in the principal-contradiction score gap*(1 + rate_weight*|rate|) (Mao: the fast-developing contradiction leads). Passed to OppositionRegistry; default matches its own. (>= 0.0)
  regime_rate_epsilon: 0.0001  # Phase E fixed-point regime classifier (§9.4): the principal opposition's |rate| at or below this counts as CONVERGED — the self-consistency search settled and the social form REPRODUCES. Above it the gap is developing: CRISIS (diverging within the level) or SUBLATION (resolved at a higher level). 1e-4 keeps float jitter from reading as a live contradiction. (>= 0.0)

# ---------------------------------------------------------------------
# consciousness — Consciousness drift coefficients.
# ---------------------------------------------------------------------
consciousness:
  sensitivity: 0.5  # k = λ/(1-α) = 0.1/0.2: consciousness drift ODE sensitivity. Full consciousness at full exploitation. (>= 0.0, <= 1.0)
  decay_lambda: 0.1  # λ = ln(2)/7 ≈ 0.099: COIN political half-life of 7 weeks (FM 3-24). (> 0.0)
  routing_scale: 0.2  # Agitation -> consciousness routing rate per tick. Spec-066 bumped this from 0.1 to 0.2 (FR-027 + Phase 0 R4): at decay_lambda=0.1 the empirical spec-065 e2e run showed <0.1% ideology drift across 520 ticks, well below the SC-005 >=5% threshold. Doubling routing_scale to 0.2 makes drift visible within the 10-year canonical horizon while staying below the 0.3 'mass awakening' regime documented in SolidarityDefines. (>= 0.0, <= 1.0)
  agitation_decay_rate: 0.1  # = decay_lambda: agitation entropy on same 7-week half-life (FM 3-24). (>= 0.0, <= 1.0)
  exploitation_sensitivity: 0.15  # Δ(s/v) → agitation conversion. How strongly exploitation rate changes generate crisis energy. (>= 0.0, <= 1.0)
  rent_decline_sensitivity: 0.2  # Δ(Φ) → agitation conversion. How strongly imperial rent decline generates crisis in core. (>= 0.0, <= 1.0)
  reproduction_visibility_coefficient: 0.1  # Δ(g₃₃) → agitation. How strongly changes in reproductive labor visibility generate crisis. (>= 0.0, <= 1.0)
  repression_backfire: 0.3  # Agitation generated from state REPRESS/EXCESSIVE_FORCE events (backfire effect). (>= 0.0, <= 1.0)
  rent_opacity_factor: 1.0  # How much imperial rent (Φ) dampens exploitation visibility. Higher = more obscured. (>= 0.0)
  agitation_consumption_rate: 0.6  # Fraction of agitation consumed per tick by ternary routing. (>= 0.0, <= 1.0)
  liberal_drift_rate: 0.02  # Per-tick drift toward liberal (l) tendency under stable material conditions. (>= 0.0, <= 1.0)
  educate_base_effect: 0.05  # Base education_pressure increase per EDUCATE verb invocation. (>= 0.0, <= 1.0)
  agitation_education_threshold: 0.3  # Agitation level at which EDUCATE reaches full effectiveness (practice-first gate). (>= 0.0, <= 1.0)
  education_pressure_decay: 0.1  # Per-tick exponential decay of education_pressure on community hyperedges. (>= 0.0, <= 1.0)

# ---------------------------------------------------------------------
# territory — Territory dynamics coefficients.
# ---------------------------------------------------------------------
territory:
  heat_decay_rate: 0.1  # = decay_lambda: heat entropy on same 7-week half-life (FM 3-24). (>= 0.0, <= 1.0)
  high_profile_heat_gain: 0.15  # = rent_spike × heat_decay = 1.5 × 0.1: FM 3-24 clear-phase convergence in 6-8 weeks. (>= 0.0, <= 1.0)
  eviction_heat_threshold: 0.8  # = α (extraction_efficiency): eviction triggers at full extraction capacity. (>= 0.0, <= 1.0)
  rent_spike_multiplier: 1.5  # 1.5×: Census/HUD gentrification rent premium (UCLA Urban Displacement Project). (> 0.0)
  displacement_rate: 0.1  # Population displacement during eviction (>= 0.0, <= 1.0)
  heat_spillover_rate: 0.05  # = heat_decay_rate / 2: ink-spot spillover at half the decay rate. (>= 0.0, <= 1.0)
  clarity_profile_coefficient: 0.3  # Clarity bonus for HIGH_PROFILE territories (>= 0.0, <= 1.0)
  concentration_camp_decay_rate: 0.2  # Population decay rate in CONCENTRATION_CAMP territories (elimination) (>= 0.0, <= 1.0)
  displacement_priority_mode: EXTRACTION  # Sink routing mode: EXTRACTION (prison first), CONTAINMENT (reservation first), ELIMINATION (camp first)
  elimination_rent_threshold: 0.1  # Imperial rent ratio below which ELIMINATION mode activates (>= 0.0, <= 1.0)
  elimination_tension_threshold: 0.8  # Tension threshold above which ELIMINATION mode activates (>= 0.0, <= 1.0)
  containment_rent_threshold: 0.3  # Imperial rent ratio below which CONTAINMENT mode activates (>= 0.0, <= 1.0)
  containment_tension_threshold: 0.5  # Tension threshold above which CONTAINMENT mode activates (>= 0.0, <= 1.0)
  initial_biocapacity_per_hex: 1000.0  # Initial biocapacity stock per H3 res-7 cell at session init (uniform allocation). Default 1000 units is a placeholder; spec-066 (metabolic-rift dynamics) will replace with empirical per-hex values from Natural Earth biocapacity overlays. (>= 0.0)
  initial_energy_per_hex: 500.0  # Initial energy stock per H3 res-7 cell at session init (uniform allocation). Placeholder until per-hex energy data lands. (>= 0.0)
  initial_raw_material_per_hex: 500.0  # Initial raw-material stock per H3 res-7 cell at session init (uniform allocation). Placeholder until per-hex extractive-data loaders land. (>= 0.0)
  initial_internet_access_pct: 0.7  # Initial internet-access penetration per H3 res-7 cell at session init. Default 0.7 ≈ US national broadband-access average. (>= 0.0, <= 1.0)
  initial_surveillance_coupling: 0.3  # Initial surveillance-state coupling per H3 res-7 cell at session init. Default 0.3 is a mid-range placeholder; spec-068 (surveillance dynamics) will replace with empirical loadings. (>= 0.0, <= 1.0)

# ---------------------------------------------------------------------
# topology — Phase transition coefficients for solidarity network analysis.
# ---------------------------------------------------------------------
topology:
  gaseous_threshold: 0.1  # Game design: percolation ratio below this = atomized (no collective action). (>= 0.0, <= 1.0)
  condensation_threshold: 0.5  # Game design: percolation ratio for phase transition (gaseous→liquid/solid). (>= 0.0, <= 1.0)
  vanguard_density_threshold: 0.5  # Game design: cadre density threshold for vanguard party (liquid→solid). (>= 0.0, <= 1.0)
  brittle_multiplier: 2.0  # Game design: potential > actual * this = brittle network (fragile solidarity). (>= 1.0, <= 10.0)
  solidarity_sympathizer_threshold: 0.1  # Game design: minimum SOLIDARITY edge strength for sympathizer classification. (>= 0.0, <= 1.0)
  solidarity_cadre_threshold: 0.5  # Game design: minimum SOLIDARITY edge strength for cadre classification. (>= 0.0, <= 1.0)
  resilience_removal_rate: 0.2  # Game design: fraction of nodes removed during resilience test (default 20%). (>= 0.0, <= 1.0)
  resilience_survival_threshold: 0.4  # Game design: L_max must survive at this fraction of original after removal. (>= 0.0, <= 1.0)

# ---------------------------------------------------------------------
# metabolism — Metabolic rift coefficients (Slice 1.4 - Ecological Limits).
# ---------------------------------------------------------------------
metabolism:
  entropy_factor: 1.2  # Game design: extraction costs more than it yields (thermodynamic inefficiency). (> 1.0, <= 3.0)
  overshoot_threshold: 1.0  # Game design: consumption/biocapacity ratio triggering ECOLOGICAL_OVERSHOOT. (> 0.0, <= 2.0)
  max_overshoot_ratio: 999.0  # Engineering: overflow cap. Prevents division-by-near-zero when biocapacity approaches 0. (> 0.0)

# ---------------------------------------------------------------------
# struggle — Struggle dynamics coefficients (Agency Layer - "George Floyd" Dynamic).
# ---------------------------------------------------------------------
struggle:
  spark_probability_scale: 0.1  # Game design: base 10% chance scaled by repression_faced for EXCESSIVE_FORCE. (>= 0.0, <= 1.0)
  resistance_threshold: 0.1  # Game design: minimum agitation level for uprising to trigger. (>= 0.0, <= 1.0)
  wealth_destruction_rate: 0.05  # Game design: fraction of wealth destroyed during uprising (riot damage). (>= 0.0, <= 1.0)
  solidarity_gain_per_uprising: 0.2  # ΔS = 0.2: Pew Research 2020 George Floyd solidarity shift (20pp white BLM support). (>= 0.0, <= 1.0)
  consciousness_solidarity_boost: 0.5  # Fraction of solidarity gain that converts to consciousness boost (>= 0.0, <= 1.0)
  jackson_threshold: 0.4  # Game design: revolutionary capacity threshold (org * consciousness) for organized response. (>= 0.0, <= 1.0)
  revolutionary_agitation_boost: 0.5  # Game design: agitation boost for periphery proletariat during revolutionary offensive. (>= 0.0, <= 2.0)
  fascist_identity_boost: 0.2  # Game design: national identity boost for core workers during fascist turn. (>= 0.0, <= 1.0)
  fascist_acquiescence_boost: 0.2  # Game design: acquiescence boost for core workers during fascist turn. (>= 0.0, <= 1.0)

# ---------------------------------------------------------------------
# carceral — Carceral equilibrium coefficients (Terminal Crisis Dynamics).
# ---------------------------------------------------------------------
carceral:
  control_capacity: 4  # Game design: prisoners one enforcer can control (1:N). US average ~4, crisis >15. (>= 1, <= 20)
  enforcer_fraction: 0.15  # Game design: after SUPERWAGE_CRISIS: % of former LA who BECOME guards/cops. (>= 0.05, <= 0.5)
  proletariat_fraction: 0.85  # Game design: after SUPERWAGE_CRISIS: % of former LA who BECOME prisoners. (>= 0.5, <= 0.95)
  revolution_threshold: 0.5  # Game design: average prisoner organization threshold for revolution (vs genocide). (>= 0.0, <= 1.0)
  decomposition_delay: 52  # Game design: ticks to wait after SUPERWAGE_CRISIS before CLASS_DECOMPOSITION (1 year default). (>= 0, <= 520)
  control_ratio_delay: 52  # Game design: ticks to wait after CLASS_DECOMPOSITION before checking control ratio (1 year default). (>= 0, <= 520)
  terminal_decision_delay: 1  # Game design: ticks to wait after CONTROL_RATIO_CRISIS before TERMINAL_DECISION. (>= 0, <= 52)

# ---------------------------------------------------------------------
# endgame — Configuration for endgame detection thresholds (Slice 1.6).
# ---------------------------------------------------------------------
endgame:
  revolutionary_percolation_threshold: 0.7  # Game design: percolation ratio threshold for revolutionary victory (70%). (>= 0.0, <= 1.0)
  revolutionary_consciousness_threshold: 0.8  # Game design: average consciousness threshold for revolutionary victory (80%). (>= 0.0, <= 1.0)
  ecological_overshoot_threshold: 2.0  # Game design: overshoot ratio threshold for ecological collapse tracking. (> 0.0)
  ecological_sustained_ticks: 5  # Game design: consecutive ticks of overshoot before collapse triggers. (>= 1, <= 100)
  fascist_majority_threshold: 3  # Game design: minimum nodes with national_identity > class_consciousness. (>= 1, <= 100)

# ---------------------------------------------------------------------
# initial — Initial condition coefficients.
# ---------------------------------------------------------------------
initial:
  worker_wealth: 0.5  # Starting wealth for periphery worker (>= 0.0)
  owner_wealth: 0.5  # Starting wealth for core owner (>= 0.0)
  default_population: 1  # Game design: default population for test entities. pop=1 ensures per-capita survival mechanics are tested without large denominators masking issues. (>= 1)

