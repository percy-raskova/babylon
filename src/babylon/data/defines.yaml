  arterial_commuter: 0.7  # SYNTHETIC (>= 0.0)
  arterial_value: 0.3  # SYNTHETIC (>= 0.0)
  arterial_consciousness: 0.2  # SYNTHETIC (>= 0.0)
  local_road_freight: 0.2  # SYNTHETIC (>= 0.0)
  local_road_commuter: 0.4  # SYNTHETIC (>= 0.0)
  local_road_value: 0.1  # SYNTHETIC (>= 0.0)
  local_road_consciousness: 0.3  # SYNTHETIC (>= 0.0)
  rail_freight: 1.2  # SYNTHETIC (>= 0.0)
  rail_commuter: 0.3  # SYNTHETIC (>= 0.0)
  rail_value: 0.2  # SYNTHETIC (>= 0.0)
  rail_consciousness: 0.1  # SYNTHETIC (>= 0.0)
  pipeline_energy: 1.5  # SYNTHETIC (>= 0.0)
  transmission_energy: 1.0  # SYNTHETIC (>= 0.0)
  shipping_lane_freight: 1.5  # SYNTHETIC (>= 0.0)
  air_link_freight: 0.3  # SYNTHETIC (>= 0.0)
  air_link_commuter: 0.8  # SYNTHETIC (>= 0.0)
  air_link_value: 0.5  # SYNTHETIC (>= 0.0)
  air_link_consciousness: 0.5  # SYNTHETIC (>= 0.0)
  natural_capacity_coefficient: 0.1  # SYNTHETIC: Base natural capacity for LAND-LAND edges without infrastructure. Applied to COMMUTER and CONSCIOUSNESS only. (>= 0.0)
  minimum_capacity_threshold: 0.01  # SYNTHETIC: Minimum edge capacity below which flow is zero. Prevents numerical noise from near-zero weights. (>= 0.0)
  opsec_tradeoff_ratio: 0.5  # SYNTHETIC: Ratio of surveillance coupling reduction to consciousness throughput loss when applying COUNTER_INTEL. (>= 0.0, <= 1.0)
  throttle_throughput_fraction: 0.3  # SYNTHETIC: Fraction of consciousness throughput remaining when state sets THROTTLE response mode. (>= 0.0, <= 1.0)
  snap_buffer_fraction: 0.3  # SYNTHETIC: Buffer around shared boundary as fraction of hex diameter for spatial snapping of linear features. (>= 0.0, <= 1.0)
  local_ratio_threshold: 3.0  # SYNTHETIC: Distance/hex_diameter ratio below which edge is classified as LOCAL. (> 0.0)
  semi_local_ratio_threshold: 20.0  # SYNTHETIC: Distance/hex_diameter ratio below which edge is classified as SEMI_LOCAL. Above = NONLOCAL. (> 0.0)

