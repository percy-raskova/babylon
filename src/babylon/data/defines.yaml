  base_cost_vigilantism: 2  # AP cost: VIGILANTISM (>= 1)
  base_cost_red_brown_coup: 1  # AP cost: RED_BROWN_COUP (auto-triggered; nominal) (>= 1)
  repress_heat_delta: 0.15  # [A] = territory.high_profile_heat_gain: repression IS high-profile attention. (>= 0.0, <= 1.0)
  surveil_heat_delta: 0.05  # [A] = territory.heat_spillover_rate: passive surveillance = background state attention. (>= 0.0, <= 1.0)
  build_infrastructure_delta: 0.1  # Infrastructure increase per BUILD action (>= 0.0, <= 1.0)
  attack_infrastructure_delta: 0.1  # Infrastructure decrease per ATTACK action (>= 0.0, <= 1.0)
  orient_time_floor: 0.1  # Minimum orient phase duration (>= 0.0)

# ---------------------------------------------------------------------
# bifurcation — Bifurcation Topology Analysis coefficients (Feature 033).
# ---------------------------------------------------------------------
bifurcation:
  consciousness_sigmoid_midpoint: 0.4  # Behavior-tuned: CI value at sigmoid inflection. Below-center so breakage cliff catches assimilated communities (CI<0.4). Analogous to SurvivalDefines.default_subsistence=0.3. (>= 0.0, <= 1.0)
  consciousness_sigmoid_steepness: 10.0  # Codebase precedent: matches SurvivalDefines.steepness_k=10.0. Slope at inflection (higher = sharper cliff). (> 0.0, <= 50.0)
  consciousness_filter_threshold: 0.2  # Derived: sigmoid(CI=0.27, midpoint=0.4, k=10)~0.21. Minimum sigmoid output to include edge in filtered subgraph. (>= 0.0, <= 1.0)
  indeterminate_dead_zone: 0.2  # Game design: score within [-x, +x] of threshold = indeterminate. Analogous to CrisisDefines.bifurcation_event_threshold=0.5. (>= 0.0, <= 1.0)
  axis_tendency_epsilon: 0.001  # Engineering: matches CrisisDefines.class_burden_epsilon=0.001. Division guard for cross/lateral ratio. (> 0.0, <= 0.1)
  legitimation_amplifier_scale: 2.0  # Behavior-tuned: at zero legitimation, crisis intensity doubles. Conservative start vs legacy _DEFAULT_CRISIS_AMPLIFIER=2.5. (>= 1.0, <= 10.0)
  wage_ceiling_high_ratio: 10.0  # Theoretical: 10x wage gap = qualitatively different material conditions (core bourgeoisie vs periphery proletariat). (>= 1.0)
  wage_ceiling_low_ratio: 2.0  # Theoretical: <2x wage gap = roughly similar material conditions (within same class fraction). (>= 1.0)
  wage_ceiling_min: 0.3  # Theoretical: extreme wage gaps severely limit but don't eliminate solidarity potential. (>= 0.0, <= 1.0)
  wage_ceiling_max: 0.9  # Theoretical: similar wages allow strong but not unlimited solidarity (other factors still matter). (>= 0.0, <= 1.0)
  shared_exploitation_bonus: 0.2  # Theoretical: matches _REPRO_EXTERNALIZATION_FACTOR=0.2. Shared enemy raises solidarity potential. (>= 0.0, <= 1.0)
  purge_removal_rate: 0.2  # Codebase precedent: matches TopologyDefines.resilience_removal_rate=0.2. Fraction removed during bifurcation-specific purge test. (>= 0.0, <= 1.0)

# ---------------------------------------------------------------------
# infra_terrain — Terrain classification and biocapacity coefficients (Feature 036).
# ---------------------------------------------------------------------
infra_terrain:
  majority_coverage_threshold: 0.5  # SYNTHETIC: Coverage fraction above which a hex is classified as WATER or RESOURCE. 0.5 = majority rule. (>= 0.0, <= 1.0)
  initial_freshwater: 100.0  # SYNTHETIC: Initial FRESHWATER stock for WATER hexes. (>= 0.0)
  initial_fishery: 80.0  # SYNTHETIC: Initial FISHERY stock for WATER hexes. (>= 0.0)
  initial_shipping_access: 50.0  # SYNTHETIC: Initial SHIPPING_ACCESS stock for WATER hexes. (>= 0.0)
  initial_mineral: 120.0  # SYNTHETIC: Initial MINERAL stock for RESOURCE hexes. (>= 0.0)
  initial_timber: 90.0  # SYNTHETIC: Initial TIMBER stock for RESOURCE hexes. (>= 0.0)
  initial_hydroelectric: 60.0  # SYNTHETIC: Initial HYDROELECTRIC stock for RESOURCE hexes. (>= 0.0)
  depletion_freshwater: 0.05  # SYNTHETIC: Per-tick depletion rate for FRESHWATER. (>= 0.0, <= 1.0)
  depletion_fishery: 0.04  # SYNTHETIC: Per-tick depletion rate for FISHERY. (>= 0.0, <= 1.0)
  depletion_shipping_access: 0.02  # SYNTHETIC: Per-tick depletion rate for SHIPPING_ACCESS. (>= 0.0, <= 1.0)
  depletion_mineral: 0.03  # SYNTHETIC: Per-tick depletion rate for MINERAL. (>= 0.0, <= 1.0)
  depletion_timber: 0.04  # SYNTHETIC: Per-tick depletion rate for TIMBER. (>= 0.0, <= 1.0)
  depletion_hydroelectric: 0.01  # SYNTHETIC: Per-tick depletion rate for HYDROELECTRIC. (>= 0.0, <= 1.0)
  internet_access_threshold: 0.5  # SYNTHETIC: Minimum FCC broadband penetration percentage / 100 for internet_access=True. 0.5 = 50% coverage required. (>= 0.0, <= 1.0)
  default_surveillance_coupling: 0.3  # SYNTHETIC: Default fraction of consciousness flow visible to state apparatus at internet-connected hexes. (>= 0.0, <= 1.0)

# ---------------------------------------------------------------------
# infrastructure — Infrastructure capacity and internet operation coefficients (Feature 036).
# ---------------------------------------------------------------------
infrastructure:
  highway_freight: 1.0  # SYNTHETIC (>= 0.0)
  highway_commuter: 1.0  # SYNTHETIC (>= 0.0)
