# PeripheryReproductionBasket: Cost to reproduce a worker in the global periphery
#
# =============================================================================
# THEORETICAL CONTEXT (Emmanuel-Amin Unequal Exchange)
# =============================================================================
#
# Imperial rent is the differential between First World wages and Third World
# reproduction costs. This basket represents the baseline - what it costs to
# keep a worker alive and working in peripheral economies.
#
# Key insight: The differential is NOT individual worker subsidy, but rather
# the TOTAL value transferred through unequal exchange. This value flows through
# multiple intermediary layers (peripheral bourgeoisie, compradors, logistics,
# finance) before partially reaching core workers as the "labor aristocracy" premium.
#
# =============================================================================
# CURRENT IMPLEMENTATION: Simple Baseline
# =============================================================================
#
# These values are rough estimates based on:
# - World Bank extreme poverty line: ~$2.15/day (2023), ~$785/year
# - ILO minimum wage data for peripheral economies
# - Peripheral cost-of-living estimates
#
# The simple baseline uses:
#   Phi = W_actual - P_periphery
#
# This overstates individual worker subsidy but correctly captures the
# structural relationship of unequal exchange.
#
# =============================================================================
# FUTURE ROADMAP (Document Now, Implement Later)
# =============================================================================
#
# Phase 2: Regional Differentiation
#   - Sub-Saharan Africa baseline (~$1,500/year)
#   - South Asia baseline (~$2,000/year)
#   - Latin America baseline (~$3,000/year)
#   - MENA baseline (~$2,500/year)
#
# Phase 3: World Bank/ILO Integration
#   - Real peripheral wage data by country
#   - PPP-adjusted reproduction costs
#   - Temporal adjustment for inflation
#
# Phase 4: Value Chain Layers
#   - Model peripheral bourgeoisie extraction (est. 15-20%)
#   - Model comprador/intermediary extraction (est. 20-30%)
#   - Model core bourgeoisie extraction (est. 35-45%)
#   - Worker residual coefficient alpha (est. 15-25%)
#
# Example future formula:
#   Phi_worker = (W_actual - P_periphery) * alpha
#   where alpha = 0.20 (20% of gross differential reaches core workers)
#
# =============================================================================
# CONFIGURATION
# =============================================================================

periphery_reproduction:
  # Food cost (USD/year)
  # Source: World Bank extreme poverty line ~$2.15/day = ~$785/year
  # We use $800/year (~$2.20/day) as round number baseline
  annual_food_cost: 800.0

  # Basic housing (USD/year)
  # Source: ILO housing cost estimates for peripheral economies
  # Urban informal housing, shared accommodation typical
  annual_shelter_cost: 600.0

  # Minimal clothing (USD/year)
  # Source: Consumer expenditure surveys, peripheral economies
  # Work clothing, basic apparel needs
  annual_clothing_cost: 100.0

  # Basic healthcare access (USD/year)
  # Source: WHO out-of-pocket healthcare costs, LMICs
  # Primary care, generic medications, emergency care
  annual_healthcare_cost: 200.0

  # Transport, miscellaneous (USD/year)
  # Source: Consumer expenditure surveys, peripheral economies
  # Public transit, basic communications, sundries
  annual_other_cost: 300.0

  # TOTAL: ~$2,000/year baseline peripheral reproduction cost
  # This is conservative (higher than extreme poverty line)
  # to account for LABOR reproduction (must be able to work)
  # not just survival reproduction.

# =============================================================================
# FUTURE: VALUE CHAIN EXTRACTION COEFFICIENTS
# =============================================================================
# Uncomment and implement when value chain modeling is added:
#
# value_chain:
#   # Peripheral bourgeoisie extraction (factory owners, landlords)
#   peripheral_bourgeoisie_extraction: 0.15
#
#   # Intermediary extraction (logistics, finance, compradors)
#   intermediary_extraction: 0.25
#
#   # Core bourgeoisie extraction (corporate profits, dividends)
#   core_bourgeoisie_extraction: 0.40
#
#   # Worker residual - what reaches core workers as premium wages
#   # alpha coefficient for: Phi_worker = gross_differential * alpha
#   worker_residual: 0.20
#
#   # Validation: sum should equal 1.0
#   # 0.15 + 0.25 + 0.40 + 0.20 = 1.0

