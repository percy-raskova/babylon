# =============================================================================
# EXCLUDED SECTORS
# =============================================================================
# These NAICS codes are excluded from the M-C-M' circuit analysis.
# Government (92) is the primary exclusion - operates outside commodity exchange.

excluded:
  - "92"  # Public Administration (all government)

# =============================================================================
# DEFAULT RATIOS (BEA Fallbacks)
# =============================================================================
# When BEA industry-level data is unavailable, these default c/v and s/v
# ratios are used for each department. These encode structural differences
# in capital composition and exploitation rates across the reproduction schema.
#
# Dept I (Means of Production): High c/v (capital-intensive), high s/v (extractive)
# Dept IIa (Necessary Consumption): Low c/v (labor-intensive retail/services), moderate s/v
# Dept IIb (Luxury Consumption): High c/v (monopoly rents), very high s/v
# Dept III (Social Reproduction): Very low c/v (care work), low s/v (suppressed wages)

default_ratios:
  # BEA-calibrated ratios derived from IntermediateInputs.xlsx and ValueAdded.xlsx
  # cv_ratio = intermediate_inputs / compensation
  # sv_ratio = gross_operating_surplus / compensation
  # Target: Profit rate r = s/(c+v) within Piketty's 3-8% empirical bounds
  dept_I:
    cv_ratio: 1.8    # BEA: intermediate/compensation for capital goods sectors
    sv_ratio: 0.12   # BEA: gross_operating_surplus/compensation

  dept_IIa:
    cv_ratio: 1.0    # BEA: retail/service intermediate costs
    sv_ratio: 0.08   # BEA: competitive wage goods, low margins

  dept_IIb:
    cv_ratio: 1.5    # BEA: luxury goods production
    sv_ratio: 0.15   # BEA: monopoly markup on luxuries

  dept_III:
    cv_ratio: 0.4    # BEA: care work, minimal fixed capital
    sv_ratio: 0.05   # BEA: suppressed care worker margins

# =============================================================================
# SECTOR RATIOS (BEA Industry-Level Calibration)
# =============================================================================
# These sector-level ratios are derived from BEA national accounts data:
# - cv_ratio: intermediate_inputs / compensation (from TII105-A)
# - sv_ratio: gross_operating_surplus / compensation (from TVA113-A)
#
# These override department defaults for better sector-specific accuracy.
# Lookup order: BEA source -> sector_ratios -> default_ratios (by department)

sector_ratios:
  "11":  # Agriculture, forestry, fishing, hunting
    cv_ratio: 1.4
    sv_ratio: 0.25
  "21":  # Mining, quarrying, oil & gas
    cv_ratio: 2.5
