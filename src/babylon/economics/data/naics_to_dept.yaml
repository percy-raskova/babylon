# =============================================================================
# EXCLUDED SECTORS
# =============================================================================
# These NAICS codes are excluded from the M-C-M' circuit analysis.
# Government (92) is the primary exclusion - operates outside commodity exchange.

excluded:
  - "92"  # Public Administration (all government)

# =============================================================================
# DEFAULT RATIOS (BEA Fallbacks)
# =============================================================================
# When BEA industry-level data is unavailable, these default c/v and s/v
# ratios are used for each department. These encode structural differences
# in capital composition and exploitation rates across the reproduction schema.
#
# Dept I (Means of Production): High c/v (capital-intensive), high s/v (extractive)
# Dept IIa (Necessary Consumption): Low c/v (labor-intensive retail/services), moderate s/v
# Dept IIb (Luxury Consumption): High c/v (monopoly rents), very high s/v
# Dept III (Social Reproduction): Very low c/v (care work), low s/v (suppressed wages)

default_ratios:
  dept_I:
    cv_ratio: 3.0    # Capital-intensive: mining, machinery, construction materials
    sv_ratio: 2.0    # High extraction from productivity gains

  dept_IIa:
    cv_ratio: 1.5    # Labor-intensive: food retail, basic services
    sv_ratio: 1.0    # Moderate exploitation, competitive markets

  dept_IIb:
    cv_ratio: 2.5    # Monopoly capital in luxury goods
    sv_ratio: 3.0    # High markups, brand rents, status goods

  dept_III:
    cv_ratio: 0.5    # Very labor-intensive: care work, domestic labor
    sv_ratio: 0.7    # Suppressed wages, often unpaid domestic labor equivalent
