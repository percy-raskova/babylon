# NAICS to Marxian Department Mapping Configuration
#
# Maps NAICS industry codes to the four Marxian reproduction schema departments:
#   I   = Means of Production (capital goods consumed by other industries)
#   IIa = Necessary Consumption (wage goods for working class reproduction)
#   IIb = Luxury Consumption (surplus value sink, bourgeois consumption)
#   III = Social Reproduction (care work that produces labor power)
#
# Classification is based on END-USE DESTINATION, not production process.
# A steel mill making I-beams for construction = Dept I (means of production)
# A steel mill making car frames for consumers = Dept IIa/IIb (consumption goods)

# =============================================================================
# 2-DIGIT SECTOR DEFAULTS
# =============================================================================
# These are fallbacks when no more specific override exists.
# Most sectors are dual-use and get rough allocations based on end-use patterns.

defaults:
  # Agriculture, Forestry, Fishing, Hunting (11)
  # BEA: 34% of grains → animal feed, majority to food processing
  # USDA: only 33% of farm sales are direct-to-consumer
  11:
    dept_I: 0.62
    dept_IIa: 0.33
    dept_IIb: 0.05

  # Mining, Quarrying, Oil & Gas (21)
  # Almost entirely intermediate inputs for manufacturing/construction
  21:
    dept_I: 0.95
    dept_IIa: 0.05

  # Utilities (22)
  # Split between industrial use and residential consumption
  22:
    dept_I: 0.40
    dept_IIa: 0.55
    dept_IIb: 0.05

  # Construction (23)
  # Commercial/industrial vs residential split
  23:
    dept_I: 0.55
    dept_IIa: 0.40
    dept_IIb: 0.05

  # Manufacturing (31-33)
  # Varies wildly by 3-6 digit; specific overrides below
  # BEA shows total manufacturing at 63.8% intermediate use
  31:
    # Food/beverage/textiles - mostly final consumption
    dept_I: 0.05
    dept_IIa: 0.85
    dept_IIb: 0.10
  32:
    # Wood, paper, chemicals - high intermediate use
    # Chemical manufacturing (3251 basic): ~95% Dept I
    dept_I: 0.57
    dept_IIa: 0.33
    dept_IIb: 0.10
  33:
    # Metal, machinery, electronics - mostly intermediate
    # BEA: Computer/electronics shows 61.9% intermediate use
    dept_I: 0.58
    dept_IIa: 0.30
    dept_IIb: 0.12

  # Wholesale Trade (42)
  # Primarily INTERMEDIATE trade - moves goods between producers
  # Not consumer-facing like retail
  42:
    dept_I: 0.85
    dept_IIa: 0.15

  # Retail Trade (44-45)
  # Final consumption; CEX income quintile data: 72% IIa, 28% IIb
  44:
    dept_IIa: 0.72
    dept_IIb: 0.28
  45:
    dept_IIa: 0.72
    dept_IIb: 0.28

  # Transportation & Warehousing (48-49)
  # Mix of freight (intermediate) and passenger (consumption)
  # Rail: 95% freight. Trucking: 95% freight. Air: 15% freight.
  48:
    dept_I: 0.60
    dept_IIa: 0.35
    dept_IIb: 0.05
  49:
    # Warehousing - primarily intermediate storage
    dept_I: 0.70
    dept_IIa: 0.25
    dept_IIb: 0.05

  # Information (51)
  # Mix of B2B services and consumer media
  51:
    dept_I: 0.30
    dept_IIa: 0.45
    dept_IIb: 0.25

  # Finance & Insurance (52)
  # Facilitates all circuits; weighted toward consumption
  52:
    dept_I: 0.25
    dept_IIa: 0.55
    dept_IIb: 0.20

  # Real Estate (53)
  # Commercial (~45% = $27T) → Dept I
  # Residential (~55% = $33T): 85% workforce housing (IIa), 15% luxury (IIb)
  53:
    dept_I: 0.38
    dept_IIa: 0.52
    dept_IIb: 0.10

  # Professional, Scientific, Technical Services (54)
  # Primarily B2B intermediate services
  54:
    dept_I: 0.60
    dept_IIa: 0.30
    dept_IIb: 0.10

  # Management of Companies (55)
  # Holding companies - allocate to I
  55:
    dept_I: 0.80
    dept_IIa: 0.15
    dept_IIb: 0.05

  # Administrative & Waste Services (56)
  # Mix of B2B and consumer services
  56:
    dept_I: 0.45
    dept_IIa: 0.45
    dept_IIb: 0.10

  # Educational Services (61)
  # K-12 and community colleges produce general work capacity (Dept III)
  # Professional training leans Dept I; private schools = luxury (IIb)
  # Fortunati/Federici: education produces labor power itself
  61:
    dept_IIa: 0.30
    dept_IIb: 0.20
    dept_III: 0.50

  # Health Care & Social Assistance (62)
  # CDC/CMS data: most healthcare maintains/restores labor power
  # Cosmetic/elective procedures represent <1% of total spending (~$26B of $4.5T)
  # Nursing facilities (4.5%) and home health (3.0%) = Dept III
  62:
    dept_IIa: 0.75
    dept_IIb: 0.05
    dept_III: 0.20

  # Arts, Entertainment, Recreation (71)
  # Primarily luxury consumption
  71:
    dept_IIa: 0.30
    dept_IIb: 0.70

  # Accommodation & Food Services (72)
  # Worker meals replace home cooking (Dept III reproductive function)
  # Fine dining = luxury (IIb); everyday eating = necessary (IIa)
  72:
    dept_IIa: 0.50
    dept_IIb: 0.40
    dept_III: 0.10

  # Other Services (81)
  # Repair, personal services, etc.
  81:
    dept_IIa: 0.70
    dept_IIb: 0.20
    dept_III: 0.10

