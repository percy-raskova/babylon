# BEA Summary-level industry to Marxian Department mapping
# Feature: 025-tensor-hierarchy
# Date: 2026-02-26
#
# Maps ~71 BEA Summary-level industries to the 4 Marxian departments:
#   I   = Means of Production (capital goods, producer durables, construction)
#   IIA = Necessary Consumption (wage goods: food, housing, basic services)
#   IIB = Luxury Consumption (bourgeois consumption, discretionary)
#   III = Social Reproduction (care, education, health, household services)
#
# Sources:
#   - BEA GDP-by-Industry accounts (Summary level, ~71 industries)
#   - Marx, Capital Vol. II, Department schema (reproduction schema)
#   - Shaikh & Tonak (1994) for US department mappings
#
# BEA codes follow the 2007 NAICS-based BEA classification.
# Codes available from: BEA I-O Use tables column headers.

[departments]
# Department I: Means of Production
# Sectors producing capital goods consumed productively by other industries.
# Includes mining, manufacturing (producer goods), construction, utilities.
I = [
    "1100A1",   # Farms
    "1130A1",   # Forestry, fishing, and related activities
    "211",      # Oil and gas extraction
    "212",      # Mining (except oil and gas)
    "213",      # Support activities for mining
    "2200A0",   # Utilities
    "23",       # Construction
    "3210A0",   # Wood products
    "327",      # Nonmetallic mineral products
    "331",      # Primary metals
    "332",      # Fabricated metal products
    "333",      # Machinery
    "3340A0",   # Computer and electronic products
    "335",      # Electrical equipment and appliances
    "3360A0",   # Motor vehicles, bodies and trailers, and parts
    "3370A0",   # Other transportation equipment
    "3390A0",   # Miscellaneous manufacturing
    "324",      # Petroleum and coal products
    "325",      # Chemical products (industrial chemicals)
    "326",      # Plastics and rubber products
    "321",      # Wood products (overlap, structural)
    "4200",     # Wholesale trade
    "481",      # Air transportation
    "482",      # Rail transportation
    "483",      # Water transportation
    "484",      # Truck transportation
    "485",      # Transit and ground passenger transportation
    "486",      # Pipeline transportation
    "487OS",    # Other transportation and support activities
    "493",      # Warehousing and storage
    "5110A0",   # Publishing industries
    "5120A0",   # Motion picture and sound recording industries
    "5130A0",   # Broadcasting and telecommunications
    "5140A0",   # Data processing, internet publishing, and other
    "521CI",    # Federal Reserve banks, credit intermediation
    "523",      # Securities, commodity contracts
    "524",      # Insurance carriers
    "525",      # Funds, trusts, and other financial vehicles
    "5311A0",   # Rental and leasing services
    "FIRE0",    # Housing (owner-occupied residential - boundary case)
    "5411",     # Legal services (producer services)
    "5412",     # Accounting, tax preparation, bookkeeping
    "5413",     # Architectural, engineering, and related services
    "5414",     # Specialized design services
    "5415",     # Computer systems design and related services
    "5416",     # Management, scientific, and technical consulting
    "5417",     # Scientific research and development
    "5418",     # Advertising and related services
    "5419",     # Other professional, scientific, and technical services
    "5500A0",   # Management of companies and enterprises
    "5611",     # Administrative and support services
    "5612",     # Waste management and remediation
    "811",      # Repair and maintenance
    "GSLE",     # Federal government enterprises
    "GFG",      # Federal general government
    "GSLG",     # State and local general government
]

# Department IIa: Necessary Consumption
# Wage goods required to reproduce labor power (food, clothing, basic shelter).
IIA = [
    "311FT",    # Food and beverage and tobacco products
    "313TT",    # Textile mills and textile product mills
    "315AL",    # Apparel and leather and allied products
    "4400",     # Retail trade (general - includes food retail)
    "7211",     # Traveler accommodation (hotels - basic lodging)
    "FOOD",     # Food services and drinking places (basic consumption)
]

# Department IIb: Luxury Consumption
# Discretionary consumer goods consumed by bourgeoisie and labor aristocracy.
IIB = [
    "334",      # Computer and electronic products (consumer electronics)
    "336",      # Motor vehicles (consumer autos - boundary case with Dept I)
    "337",      # Furniture and related products
    "339",      # Miscellaneous manufacturing (consumer goods)
    "4481",     # Clothing stores
    "4521",     # Department stores
    "4529",     # Other general merchandise stores
    "4530",     # Miscellaneous store retailers
    "713",      # Amusements, gambling, and recreation
    "7211A0",   # Hotels and motels (luxury travel)
    "7212",     # RV parks, recreational camps, rooming/boarding
    "7213",     # Dry cleaning and laundry
    "AREP",     # Arts, entertainment, recreation (consumer)
]

# Department III: Social Reproduction
# Sectors producing labor power itself (care, education, health).
# Most labor is naturalized as unwaged domestic work (low g_33).
III = [
    "621",      # Ambulatory health care services
    "622",      # Hospitals
    "623",      # Nursing and residential care
    "624",      # Social assistance
    "6111",     # Elementary and secondary schools
    "6112",     # Junior colleges
    "6113",     # Colleges, universities, and professional schools
    "6114",     # Business schools and computer training
    "6115",     # Technical and trade schools
    "6116",     # Other schools and instruction
    "6117",     # Educational support services
    "814",      # Private households (domestic service workers)
    "8139",     # Religious, grant-making, civic organizations
    "8131",     # Religious organizations
]

[metadata]
# Mapping version and sources
version = "1.0.0"
date = "2026-02-26"
bea_classification = "2007 NAICS-based BEA Summary level"
reference = "Marx (1885) Capital Vol. II; Shaikh & Tonak (1994) Measuring the Wealth of Nations"
notes = """
Industry codes follow BEA Summary-level classification (~71 industries).
Some industries span multiple departments (e.g., retail trade includes both
necessary and luxury goods). The mapping above places each industry in its
primary Marxian department based on the dominant use of its output.

Motor vehicles (3360A0) are in Dept I (producer goods aspect dominates:
commercial vehicles, supply chain). Consumer autos are boundary case.

Housing (FIRE0/owner-occupied) is in Dept I because the rental income
attribution treats it as capital, not consumption.

Future refinement: Use BEA commodity-by-industry bridge to split mixed
industries by output shares. For MVP, use dominant-use mapping.
"""
